1\u0442\u0440\u0430\u043d\u0438\u0442\u044c \u043e\u0442 \u0441\u043b\u0443\u0436\u0431\u044b; \u0438\u0441\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043e\u0440\u0443\u0436\u0438\u044e \u0438 \u0431\u043e\u0435\u043f\u0440\u0438\u043f\u0430\u0441\u0430\u043c; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043e\u0432\u0430\u0442\u044c \u0437\u0430\u043c\u0435\u043d\u0443; \u043c\u0435\u0434\u043e\u0441\u043c\u043e\u0442\u0440; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430. \u0412.66 \u0421\u0423\u0418\u0426\u0418\u0414\u0410\u041b\u042c\u041d\u0410\u042f \u041f\u0420\u041e\u0424\u0418\u041b\u0410\u041a\u0422\u0418\u041a\u0410. \u041b\u0438\u0446\u0430 \u0433\u0440\u0443\u043f\u043f\u044b \u0440\u0438\u0441\u043a\u0430: \u0441 \u0442\u044f\u0436\u0451\u043b\u044b\u043c\u0438 \u0441\u0435\u043c\u0435\u0439\u043d\u044b\u043c\u0438 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430\u043c\u0438; \u043f\u043e\u0442\u0435\u0440\u0435\u0439 \u0431\u043b\u0438\u0437\u043a\u0438\u0445; \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u044b\u043c\u0438 \u0442\u0440\u0443\u0434\u043d\u043e\u0441\u0442\u044f\u043c\u0438; \u0437\u0430\u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c\u044e; \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430\u0440\u043d\u044b\u043c\u0438 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0430\u043c\u0438; \u0437\u043b\u043e\u0443\u043f\u043e\u0442\u0440\u0435\u0431\u043b\u0435\u043d\u0438\u0435\u043c \u0430\u043b\u043a\u043e\u0433\u043e\u043b\u0435\u043c; \u0438\u0437\u043e\u043b\u044f\u0446\u0438\u0435\u0439 \u0432 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0435; \u0440\u0430\u043d\u0435\u0435 \u0441\u043e\u0432\u0435\u0440\u0448\u0430\u0432\u0448\u0438\u0435 \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u0435 \u043f\u043e\u043f\u044b\u0442\u043a\u0438. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0440\u0438\u0441\u043a\u0430: \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u044b \u043e \u0441\u043c\u0435\u0440\u0442\u0438 \u0438 \u0431\u0435\u0441\u0441\u043c\u044b\u0441\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0436\u0438\u0437\u043d\u0438; \u043f\u0440\u043e\u0449\u0430\u043b\u044c\u043d\u044b\u0435 \u0444\u0440\u0430\u0437\u044b; \u0440\u0430\u0437\u0434\u0430\u0447\u0430 \u043b\u0438\u0447\u043d\u044b\u0445 \u0432\u0435\u0449\u0435\u0439; \u0440\u0435\u0437\u043a\u0438\u0435 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u0437\u0430\u043c\u043a\u043d\u0443\u0442\u043e\u0441\u0442\u044c; \u0443\u0442\u0440\u0430\u0442\u0430 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u0430 \u043a \u0441\u043b\u0443\u0436\u0431\u0435; \u0434\u0435\u043f\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u0431\u0435\u0441\u0441\u043e\u043d\u043d\u0438\u0446\u0430; \u0442\u0440\u0435\u0432\u043e\u0433\u0430; \u0431\u0435\u0437\u043d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c; \u0437\u043b\u043e\u0443\u043f\u043e\u0442\u0440\u0435\u0431\u043b\u0435\u043d\u0438\u0435 \u0430\u043b\u043a\u043e\u0433\u043e\u043b\u0435\u043c; \u0430\u0443\u0442\u043e\u0430\u0433\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u044b\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f; \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f. \u041f\u0440\u0438 \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u0443\u0433\u0440\u043e\u0437\u0435: \u043d\u0435\u043b\u044c\u0437\u044f \u043e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u043e\u0434\u043d\u043e\u0433\u043e; \u0438\u0441\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043e\u0440\u0443\u0436\u0438\u044e, \u043b\u0435\u043a\u0430\u0440\u0441\u0442\u0432\u0430\u043c, \u043e\u043f\u0430\u0441\u043d\u044b\u043c \u043f\u0440\u0435\u0434\u043c\u0435\u0442\u0430\u043c; \u043f\u043e\u0441\u0442\u043e\u044f\u043d\u043d\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0430 \u0438 \u043c\u0435\u0434\u0440\u0430\u0431\u043e\u0442\u043d\u0438\u043a\u0430; \u043f\u0440\u0438 \u043d\u0435\u043e\u0431\u0445\u043e\u0434\u0438\u043c\u043e\u0441\u0442\u0438 \u2014 \u0441\u0440\u043e\u0447\u043d\u0430\u044f \u0433\u043e\u0441\u043f\u0438\u0442\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u044f. \u0412.67 \u0418\u0413\u0420\u041e\u041c\u0410\u041d\u0418\u042f \u0418 \u0417\u0410\u041a\u0420\u0415\u0414\u0418\u0422\u041e\u0412\u0410\u041d\u041d\u041e\u0421\u0422\u042c. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0438\u0433\u0440\u043e\u043c\u0430\u043d\u0438\u0438: \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u044b \u043e \u0441\u0442\u0430\u0432\u043a\u0430\u0445 \u0438 \u043a\u0430\u0437\u0438\u043d\u043e; \u0441\u043a\u0440\u044b\u0442\u043d\u043e\u0441\u0442\u044c \u043f\u0440\u0438 \u0442\u0435\u043b\u0435\u0444\u043e\u043d\u0435; \u043d\u043e\u0447\u043d\u0430\u044f \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u043f\u0435\u0440\u0435\u043f\u0430\u0434\u044b \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u043e\u0442 \u0432\u044b\u0438\u0433\u0440\u044b\u0448\u0430; \u043f\u043e\u043f\u044b\u0442\u043a\u0438 \u00ab\u043e\u0442\u044b\u0433\u0440\u0430\u0442\u044c\u0441\u044f\u00bb; \u0447\u0430\u0441\u0442\u044b\u0435 \u0437\u0430\u0439\u043c\u044b; \u043b\u043e\u0436\u044c \u043e \u0440\u0430\u0441\u0445\u043e\u0434\u0430\u0445; \u0443\u0442\u0440\u0430\u0442\u0430 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u0430 \u043a \u0441\u043b\u0443\u0436\u0431\u0435 \u0438 \u0434\u043e\u0441\u0443\u0433\u0443. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0437\u0430\u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u0438: \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432 \u0438 \u043c\u0438\u043a\u0440\u043e\u0437\u0430\u0439\u043c\u043e\u0432; \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u044b\u0435 \u043f\u0440\u043e\u0441\u044c\u0431\u044b \u0437\u0430\u043d\u044f\u0442\u044c; \u0443\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u044f \u0438 \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u0434\u0441\u0442\u0432\u0430; \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u044b \u0432 \u0441\u0435\u043c\u044c\u0435 \u043d\u0430 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u043e\u0439 \u043f\u043e\u0447\u0432\u0435; \u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u044c, \u0431\u0435\u0437\u044b\u0441\u0445\u043e\u0434\u043d\u043e\u0441\u0442\u044c; \u0437\u0432\u043e\u043d\u043a\u0438 \u043e\u0442 \u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0440\u043e\u0432. \u0412.68 \u041a\u0414\u0420 \u041d\u0410 \u0412\u042b\u0425\u041e\u0414\u041d\u042b\u0415. \u0417\u041a\u0420 \u043f\u043e \u0412\u041f\u0420 \u0434\u043e\u043a\u043b\u0430\u0434\u044b\u0432\u0430\u0435\u0442 \u043d\u0430 \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438 \u043d\u0435 \u043f\u043e\u0437\u0434\u043d\u0435\u0435 \u0447\u0435\u043c \u0437\u0430 4 \u0441\u0443\u0442\u043e\u043a. \u0412 \u043f\u043b\u0430\u043d\u0435 \u0432\u044b\u0445\u043e\u0434\u043d\u043e\u0433\u043e \u0434\u043d\u044f \u2014 \u0432\u0440\u0435\u043c\u044f \u0438 \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439, \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439. \u0417\u0410\u041f\u0420\u0415\u0429\u0415\u041d\u041e \u0432\u043a\u043b\u044e\u0447\u0430\u0442\u044c \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043e\u0431\u0449\u0435\u0433\u043e \u0440\u0430\u0441\u043f\u043e\u0440\u044f\u0434\u043a\u0430 \u0434\u043d\u044f. \u0412.69 \u0412\u0418\u041a\u0422\u041e\u0420\u0418\u041d\u0410. 10\u201315 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432. \u041e \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0438 \u043e\u0431\u044a\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0437\u0430\u0440\u0430\u043d\u0435\u0435 (\u0442\u0435\u043c\u0430, \u0432\u0440\u0435\u043c\u044f, \u043c\u0435\u0441\u0442\u043e). \u0412\u043e\u043f\u0440\u043e\u0441\u044b \u043d\u0430\u0437\u044b\u0432\u0430\u044e\u0442\u0441\u044f \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u043d\u0430 \u0432\u0435\u0447\u0435\u0440\u0435. \u0423\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u043a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0445 \u043e\u0442\u0432\u0435\u0442\u043e\u0432 \u0438 \u0433\u043b\u0443\u0431\u0438\u043d\u0430 \u043e\u0442\u0432\u0435\u0442\u0430. \u041f\u043e\u0431\u0435\u0434\u0438\u0442\u0435\u043b\u0438 \u043d\u0435\u0440\u0435\u0434\u043a\u043e \u043d\u0430\u0433\u0440\u0430\u0436\u0434\u0430\u044e\u0442\u0441\u044f. \u0412.70 \u0412\u0415\u0420\u0423\u042e\u0429\u0418\u0415 \u0412\u041e\u0415\u041d\u041d\u041e\u0421\u041b\u0423\u0416\u0410\u0429\u0418\u0415. \u041c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f\u043c \u0412\u041f\u0420: \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430 \u2014 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u043e-\u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043f\u0440\u0438\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0437\u0430 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u044b\u0439 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c, \u0424\u0417-114 \u00ab\u041e \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0438 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0443\u00bb; \u0410\u041f\u0420 \u2014 \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u043e \u0432\u0440\u0435\u0434\u0435 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0433\u043e \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0430, \u0424\u0417-125 \u00ab\u041e \u0441\u0432\u043e\u0431\u043e\u0434\u0435 \u0441\u043e\u0432\u0435\u0441\u0442\u0438\u00bb, \u0418\u0412\u0420 \u0441 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u043c\u0438; \u0441\u043e\u0446\u0440\u0430\u0431\u043e\u0442\u0430 \u2014 \u0437\u0430\u0449\u0438\u0442\u0430 \u043f\u0440\u0430\u0432 \u0438 \u0441\u0432\u043e\u0431\u043e\u0434 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u0445; \u041a\u0414\u0420 \u2014 \u043f\u043e\u0441\u0435\u0449\u0435\u043d\u0438\u0435 \u0445\u0440\u0430\u043c\u043e\u0432, \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043f\u0440\u043e\u0441\u0432\u0435\u0442\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0435 \u0431\u0435\u0441\u0435\u0434\u044b, \u044d\u043a\u0441\u043a\u0443\u0440\u0441\u0438\u0438, \u043f\u043e\u0434\u0431\u043e\u0440\u043a\u0430 \u0434\u0443\u0445\u043e\u0432\u043d\u043e\u0439 \u043b\u0438\u0442\u0435\u0440\u0430\u0442\u0443\u0440\u044b \u0432 \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u043a\u0435.\n\n=== \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 2: \u0412\u041e\u0415\u041d\u041d\u0410\u042f \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f ===\n\n\u0412.\u041c\u041f1 \u041c\u0415\u0422\u041e\u0414\u041e\u041b\u041e\u0413\u0418\u042f \u0418 \u041c\u0415\u0422\u041e\u0414\u042b. 8 \u041f\u0420\u0418\u041d\u0426\u0418\u041f\u041e\u0412: \u0434\u0435\u0442\u0435\u0440\u043c\u0438\u043d\u0438\u0437\u043c\u0430; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u044f; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0430 \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f \u0438 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u0441\u0438\u0441\u0442\u0435\u043c\u043d\u043e\u0441\u0442\u0438; \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438; \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u043e\u0433\u043e \u043f\u043e\u0434\u0445\u043e\u0434\u0430; \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u0438\u0441\u0442\u043e\u0440\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043e\u0431\u0443\u0441\u043b\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0430 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0438 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0433\u043e. 12 \u041c\u0415\u0422\u041e\u0414\u041e\u0412: \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u044d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442; \u0431\u0435\u0441\u0435\u0434\u0430 \u0438 \u0438\u043d\u0442\u0435\u0440\u0432\u044c\u044e; \u043e\u043f\u0440\u043e\u0441 \u0438 \u0430\u043d\u043a\u0435\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u044d\u043a\u0441\u043f\u0435\u0440\u0442\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430; \u0441\u043e\u0446\u0438\u043e\u043c\u0435\u0442\u0440\u0438\u044f; \u043c\u043e\u0434\u0435\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0442\u0440\u0435\u043d\u0438\u043d\u0433.\n\u0412.\u041c\u041f2 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u0425\u0410\u0420\u0410\u041a\u0422\u0415\u0420\u0418\u0421\u0422\u0418\u041a\u0410 \u0412\u041e\u0419\u041d\u042b. 3 \u0443\u0440\u043e\u0432\u043d\u044f: \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u043e (\u043c\u0430\u0441\u0441\u043e\u0432\u044b\u0435 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f, \u043e\u0431\u0440\u0430\u0437 \u0432\u0440\u0430\u0433\u0430); \u0430\u0440\u043c\u0438\u044f (\u0431\u043e\u0435\u0432\u043e\u0439 \u0434\u0443\u0445, \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430, \u0434\u043e\u0432\u0435\u0440\u0438\u0435); \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u044c (\u0441\u043c\u044b\u0441\u043b\u044b, \u043c\u043e\u0442\u0438\u0432\u044b, \u0441\u0442\u0440\u0430\u0445, \u043c\u0443\u0436\u0435\u0441\u0442\u0432\u043e). \u0414\u0432\u043e\u0439\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u044d\u0444\u0444\u0435\u043a\u0442: \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a \u0442\u044f\u0436\u0435\u043b\u0435\u0439\u0448\u0438\u0445 \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432 + \u043c\u043e\u0449\u043d\u0430\u044f \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u044f \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u0441\u0438\u043b. \u041e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0438: \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u0432\u043e\u0441\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u0432\u0440\u0435\u043c\u0435\u043d\u0438 \u0438 \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0430; \u0443\u0441\u0438\u043b\u0435\u043d\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0444\u0430\u043a\u0442\u043e\u0440\u043e\u0432; \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0431\u043e\u0440\u0441\u0442\u0432\u043e. \u041f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f: \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 (\u043e\u0441\u0442\u0440\u044b\u0435 \u0440\u0435\u0430\u043a\u0446\u0438\u0438); \u043e\u0442\u0441\u0440\u043e\u0447\u0435\u043d\u043d\u044b\u0435 (\u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u044c, \u043a\u043e\u0448\u043c\u0430\u0440\u044b); \u043e\u0442\u0434\u0430\u043b\u0451\u043d\u043d\u044b\u0435 (\u041f\u0422\u0421\u0420, \u0434\u0435\u043f\u0440\u0435\u0441\u0441\u0438\u044f, \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438).\n\u0412.\u041c\u041f3 \u0424\u0410\u041a\u0422\u041e\u0420\u042b \u0411\u041e\u0415\u0412\u041e\u0419 \u0410\u041a\u0422\u0418\u0412\u041d\u041e\u0421\u0422\u0418. \u0421\u043c\u044b\u0441\u043b\u043e\u0432\u044b\u0435 \u0438 \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u0438\u044f; \u0432\u043e\u0435\u043d\u043d\u043e-\u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u044c; \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0438 \u043b\u0438\u0434\u0435\u0440\u0441\u0442\u0432\u043e; \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0433\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430 (\u0441\u043f\u043b\u043e\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c, \u0434\u043e\u0432\u0435\u0440\u0438\u0435, \u0432\u0437\u0430\u0438\u043c\u043e\u0432\u044b\u0440\u0443\u0447\u043a\u0430); \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u044b\u0435 \u0438 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0439\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u043e-\u0442\u0435\u0445\u043d\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0438 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0431\u043e\u0435\u0432\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u0438 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; \u0431\u043e\u0435\u0432\u043e\u0439 \u043e\u043f\u044b\u0442.\n\u0412.\u041c\u041f4 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f \u0412\u041e\u0418\u041d\u0421\u041a\u041e\u0419 \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u042b. \u041f\u0440\u043e\u0447\u043d\u0430\u044f \u043e\u0441\u043d\u043e\u0432\u0430 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u2014 \u043e\u0441\u043e\u0437\u043d\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0443\u0431\u0435\u0436\u0434\u0451\u043d\u043d\u043e\u0441\u0442\u044c, \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0430 \u043a \u043f\u043e\u0440\u044f\u0434\u043a\u0443, \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435 \u043a \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u044f\u043c, \u0441\u0430\u043c\u043e\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u2014 \u0430 \u043d\u0435 \u0441\u0442\u0440\u0430\u0445 \u043d\u0430\u043a\u0430\u0437\u0430\u043d\u0438\u044f. \u041a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c \u2014 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0435 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430: \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c, \u043f\u043e\u0434\u0447\u0438\u043d\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u043e\u0431\u0449\u0438\u043c \u0446\u0435\u043b\u044f\u043c, \u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u044c \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0438\u0432\u0430\u0442\u044c \u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u043d\u043e\u0440\u043c.\n\u0412.\u041c\u041f5 \u0411\u041e\u0415\u0412\u041e\u0419 \u0421\u0422\u0420\u0415\u0421\u0421. \u041d\u0435 \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0430\u0442\u043e\u043b\u043e\u0433\u0438\u044f \u2014 \u0432 \u0443\u043c\u0435\u0440\u0435\u043d\u043d\u044b\u0445 \u043f\u0440\u0435\u0434\u0435\u043b\u0430\u0445 \u0432\u044b\u043f\u043e\u043b\u043d\u044f\u0435\u0442 \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0443\u044e\u0449\u0443\u044e \u0444\u0443\u043d\u043a\u0446\u0438\u044e. \u0414\u0435\u0437\u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0443\u0435\u0442 \u043f\u0440\u0438 \u043f\u0440\u0435\u0432\u044b\u0448\u0435\u043d\u0438\u0438 \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0445 \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e\u0441\u0442\u0435\u0439. \u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0438: \u0443\u0433\u0440\u043e\u0437\u0430 \u0436\u0438\u0437\u043d\u0438, \u0433\u0438\u0431\u0435\u043b\u044c \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0435\u0439, \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0435 \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435, \u0434\u0435\u0444\u0438\u0446\u0438\u0442 \u0441\u043d\u0430, \u043d\u0435\u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0451\u043d\u043d\u043e\u0441\u0442\u044c. \u0423\u0440\u043e\u0432\u043d\u0438 \u043f\u043e\u0440\u0430\u0436\u0435\u043d\u0438\u044f: \u043f\u043e\u0437\u043d\u0430\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 (\u0441\u0443\u0436\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f, \u043e\u0448\u0438\u0431\u043a\u0438); \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 (\u0441\u0442\u0440\u0430\u0445, \u0442\u0440\u0435\u0432\u043e\u0433\u0430, \u043e\u0446\u0435\u043f\u0435\u043d\u0435\u043d\u0438\u0435); \u0432\u043e\u043b\u0435\u0432\u043e\u0439 (\u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u044f \u0438\u043b\u0438 \u0441\u0442\u0443\u043f\u043e\u0440); \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0447\u0435\u0441\u043a\u0438\u0439 (\u0441\u043a\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0438\u043c\u043f\u0443\u043b\u044c\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c); \u0444\u0438\u0437\u0438\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0439 (\u0442\u0440\u0435\u043c\u043e\u0440, \u043f\u043e\u0442\u043b\u0438\u0432\u043e\u0441\u0442\u044c). \u0424\u0430\u0437\u044b: \u043f\u0435\u0440\u0432\u0438\u0447\u043d\u0430\u044f \u0440\u0435\u0430\u043a\u0446\u0438\u044f \u2192 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0442\u0438\u0432\u043b\u0435\u043d\u0438\u0435 \u2192 \u0438\u0441\u0442\u043e\u0449\u0435\u043d\u0438\u0435. \u041f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f: \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435; \u043e\u0442\u0441\u0440\u043e\u0447\u0435\u043d\u043d\u044b\u0435; \u043e\u0442\u0434\u0430\u043b\u0451\u043d\u043d\u044b\u0435 (\u041f\u0422\u0421\u0420). \u0412\u043e\u0437\u043c\u043e\u0436\u043d\u043e \u043f\u043e\u0441\u0442\u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432\u043e\u0435 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u043e\u0435 \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043f\u0440\u0438 \u0431\u043b\u0430\u0433\u043e\u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0445 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445.\n\u0412.\u041c\u041f6 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u041f\u041e\u0414\u0413\u041e\u0422\u041e\u0412\u041a\u0410 \u041a \u0421\u0411\u0417. 4 \u0412\u0418\u0414\u0410: \u043e\u0431\u0449\u0430\u044f (\u043d\u0430 \u043f\u0440\u043e\u0442\u044f\u0436\u0435\u043d\u0438\u0438 \u0432\u0441\u0435\u0433\u043e \u043f\u0435\u0440\u0438\u043e\u0434\u0430 \u0441\u043b\u0443\u0436\u0431\u044b); \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f (\u043f\u043e \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u0438); \u0446\u0435\u043b\u0435\u0432\u0430\u044f (\u043f\u043e \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u0439 \u0437\u0430\u0434\u0430\u0447\u0435); \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u0430\u044f (\u043f\u0435\u0440\u0435\u0434 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u0435\u043c \u0437\u0430\u0434\u0430\u0447\u0438). \u041f\u0440\u0438\u043d\u0446\u0438\u043f \u0440\u0435\u0430\u043b\u0438\u0441\u0442\u0438\u0447\u043d\u043e\u0441\u0442\u0438 \u2014 \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u0435\u043d. \u0421\u043e\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043c\u044b\u0441\u043b\u043e\u0432\u0430\u044f; \u043a\u043e\u0433\u043d\u0438\u0442\u0438\u0432\u043d\u0430\u044f (\u043e\u0431\u0440\u0430\u0437 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438); \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0432\u043e\u043b\u0435\u0432\u0430\u044f; \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f. \u041c\u0435\u0442\u043e\u0434\u044b \u0441\u0430\u043c\u043e\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u0438: \u0434\u044b\u0445\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u0438\u0451\u043c\u044b; \u043c\u044b\u0448\u0435\u0447\u043d\u0430\u044f \u0440\u0435\u043b\u0430\u043a\u0441\u0430\u0446\u0438\u044f; \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437; \u0441\u0430\u043c\u043e\u0432\u043d\u0443\u0448\u0435\u043d\u0438\u0435; \u0438\u0434\u0435\u043e\u043c\u043e\u0442\u043e\u0440\u043d\u0430\u044f \u0442\u0440\u0435\u043d\u0438\u0440\u043e\u0432\u043a\u0430; \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f; \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0438\u0439 \u0440\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u0434\u0438\u0430\u043b\u043e\u0433.\n\u0412.\u041c\u041f7 \u0412\u041e\u0418\u041d\u0421\u041a\u0418\u0419 \u041a\u041e\u041b\u041b\u0415\u041a\u0422\u0418\u0412 \u041a\u0410\u041a \u0420\u0415\u0421\u0423\u0420\u0421. 6 \u041c\u0415\u0425\u0410\u041d\u0418\u0417\u041c\u041e\u0412 \u0440\u0435\u0441\u0443\u0440\u0441\u043d\u043e\u0441\u0442\u0438: 1)\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f \u0438\u0434\u0435\u043d\u0442\u0438\u0444\u0438\u043a\u0430\u0446\u0438\u044f; 2)\u0434\u043e\u0432\u0435\u0440\u0438\u0435; 3)\u0441\u043f\u043b\u043e\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c; 4)\u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 \u043d\u043e\u0440\u043c\u044b \u0438 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u043c\u043d\u0435\u043d\u0438\u0435; 5)\u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0435 \u0437\u0430\u0440\u0430\u0436\u0435\u043d\u0438\u0435 \u0438 \u0432\u0437\u0430\u0438\u043c\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; 6)\u0440\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0438. \u041a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432 \u2014 \u0440\u0435\u0441\u0443\u0440\u0441 \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0440\u0438 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445: \u0430\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442\u043d\u043e\u0433\u043e \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u044f, \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0439 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b, \u044f\u0441\u043d\u044b\u0445 \u0446\u0435\u043b\u0435\u0439, \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u044f \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0435\u0433\u043e \u0440\u0430\u0441\u043a\u043e\u043b\u0430.\n\u0412.\u041c\u041f8 \u0417\u0410\u0429\u0418\u0422\u0410 \u041e\u0422 \u0418\u041f\u0412\u041f. 8 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419: \u0441\u0432\u043e\u0435\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e\u0435 \u043f\u0440\u0430\u0432\u0434\u0438\u0432\u043e\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u0439 \u0438 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u0438; \u043a\u0440\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043c\u044b\u0448\u043b\u0435\u043d\u0438\u0435 \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f \u0431\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c; \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0433\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430; \u0440\u0430\u0431\u043e\u0442\u0430 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u043e\u0432 \u0438 \u0412\u041f\u041e; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430; \u0430\u0434\u0440\u0435\u0441\u043d\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c \u0443\u044f\u0437\u0432\u0438\u043c\u044b\u043c; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0435 \u0440\u0435\u0433\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0439 \u0441\u0440\u0435\u0434\u044b.\n\u0412.\u041c\u041f9 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f \u0412\u0417\u0410\u0418\u041c\u041e\u041e\u0422\u041d\u041e\u0428\u0415\u041d\u0418\u0419. \u041e\u0444\u0438\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0435 (\u0443\u0441\u0442\u0430\u0432\u043d\u044b\u0435) \u0438 \u043d\u0435\u043e\u0444\u0438\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0435; \u0434\u0435\u043b\u043e\u0432\u044b\u0435 \u0438 \u043b\u0438\u0447\u043d\u044b\u0435; \u0432\u0435\u0440\u0442\u0438\u043a\u0430\u043b\u044c\u043d\u044b\u0435 (\u0441\u0443\u0431\u043e\u0440\u0434\u0438\u043d\u0430\u0446\u0438\u044f) \u0438 \u0433\u043e\u0440\u0438\u0437\u043e\u043d\u0442\u0430\u043b\u044c\u043d\u044b\u0435. \u041c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u044b: \u0432\u043e\u0441\u043f\u0440\u0438\u044f\u0442\u0438\u0435, \u044d\u043c\u043f\u0430\u0442\u0438\u044f, \u0430\u0442\u0442\u0440\u0430\u043a\u0446\u0438\u044f, \u0430\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442, \u0432\u043d\u0443\u0448\u0435\u043d\u0438\u0435, \u043f\u043e\u0434\u0440\u0430\u0436\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u0438\u043c\u043e\u0441\u0442\u044c. \u0417\u0434\u043e\u0440\u043e\u0432\u044b\u0435: \u0432\u0437\u0430\u0438\u043c\u043d\u043e\u0435 \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435, \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0435\u0441\u0442\u0432\u043e, \u0434\u043e\u0432\u0435\u0440\u0438\u0435, \u0432\u0437\u0430\u0438\u043c\u043d\u0430\u044f \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c. \u041d\u0435\u0431\u043b\u0430\u0433\u043e\u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0435: \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0438, \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u0435, \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043d\u043e\u0441\u0442\u044c, \u0431\u0435\u0437\u0440\u0430\u0437\u043b\u0438\u0447\u0438\u0435, \u0444\u043e\u0440\u043c\u0430\u043b\u0438\u0437\u043c. \u0410\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430 \u0441\u0442\u0430\u0431\u0438\u043b\u0438\u0437\u0438\u0440\u0443\u0435\u0442 \u0432\u0437\u0430\u0438\u043c\u043e\u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f \u0438 \u0441\u043d\u0438\u0436\u0430\u0435\u0442 \u0432\u0435\u0440\u043e\u044f\u0442\u043d\u043e\u0441\u0442\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432.\n\u0412.\u041c\u041f10 \u041a\u041e\u041d\u0424\u041b\u0418\u041a\u0422\u042b \u0412 \u041c\u041d\u041e\u0413\u041e\u041d\u0410\u0426\u0418\u041e\u041d\u0410\u041b\u042c\u041d\u042b\u0425 \u041a\u041e\u041b\u041b\u0415\u041a\u0422\u0418\u0412\u0410\u0425. \u041f\u0440\u0438\u0447\u0438\u043d\u044b: \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u043d\u0435\u0434\u043e\u0441\u0442\u0430\u0442\u043a\u0438 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438, \u043f\u0435\u0440\u0435\u0433\u0440\u0443\u0437\u043a\u0430, \u043d\u0435\u0441\u043f\u0440\u0430\u0432\u0435\u0434\u043b\u0438\u0432\u043e\u0441\u0442\u044c) \u0438 \u0441\u0443\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440, \u0437\u0430\u0432\u044b\u0448\u0435\u043d\u043d\u0430\u044f \u0441\u0430\u043c\u043e\u043e\u0446\u0435\u043d\u043a\u0430, \u043f\u0440\u0435\u0434\u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f). 4 \u0422\u0418\u041f\u0410: \u043c\u0435\u0436\u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u044b\u0435; \u0432\u043d\u0443\u0442\u0440\u0438\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u044b\u0435; \u043c\u0435\u0436\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u044b\u0435; \u0440\u043e\u043b\u0435\u0432\u044b\u0435. \u0420\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0435: \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u043c\u0435\u0440\u044b; \u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435; \u043f\u0440\u0430\u0432\u043e\u0432\u044b\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435. \u0412 \u041c\u041d\u041e\u0413\u041e\u041d\u0410\u0426\u0418\u041e\u041d\u0410\u041b\u042c\u041d\u042b\u0425: \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435 \u043d\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0434\u043e\u0441\u0442\u043e\u0438\u043d\u0441\u0442\u0432\u0430; \u0435\u0434\u0438\u043d\u043e\u043e\u0431\u0440\u0430\u0437\u0438\u0435 \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0439; \u0438\u0441\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0444\u0430\u0432\u043e\u0440\u0438\u0442\u0438\u0437\u043c\u0430; \u043e\u043f\u043e\u0440\u0430 \u043d\u0430 \u043e\u0431\u0449\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0435 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043e\u0431\u0449\u0435\u0433\u043e \u00ab\u043c\u044b\u00bb.\n\u0412.\u041c\u041f12 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u041c\u041e\u0414\u0415\u041b\u042c \u0421\u0411\u0414. 8 \u0421\u0422\u0420\u0423\u041a\u0422\u0423\u0420\u041d\u042b\u0425 \u0411\u041b\u041e\u041a\u041e\u0412: 1)\u0441\u0443\u0431\u044a\u0435\u043a\u0442\u043d\u044b\u0439; 2)\u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0446\u0435\u043b\u0435\u0432\u043e\u0439; 3)\u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u043e\u0447\u043d\u043e-\u043a\u043e\u0433\u043d\u0438\u0442\u0438\u0432\u043d\u044b\u0439; 4)\u043e\u043f\u0435\u0440\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0439; 5)\u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0432\u043e\u043b\u0435\u0432\u043e\u0439; 6)\u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u043e\u0439; 7)\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u043e\u043d\u043d\u043e-\u0440\u0435\u0444\u043b\u0435\u043a\u0441\u0438\u0432\u043d\u044b\u0439; 8)\u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438\u0432\u043d\u044b\u0439. 8 \u0424\u0423\u041d\u041a\u0426\u0418\u0419: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043c\u044b\u0441\u043b\u043e\u0432\u0430\u044f; \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u043e\u0447\u043d\u0430\u044f; \u043f\u0440\u043e\u0433\u043d\u043e\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f; \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f; \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0430\u044f; \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u043a\u043e\u043e\u0440\u0434\u0438\u043d\u0438\u0440\u0443\u044e\u0449\u0430\u044f; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c\u043d\u043e-\u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u043e\u043d\u043d\u0430\u044f; \u0437\u0430\u0449\u0438\u0442\u043d\u043e-\u043a\u043e\u043c\u043f\u0435\u043d\u0441\u0430\u0442\u043e\u0440\u043d\u0430\u044f.\n\u0412.\u041c\u041f13 \u041c\u0415\u0422\u041e\u0414\u042b \u041e\u0426\u0415\u041d\u041a\u0418 \u0418 \u0421\u0410\u041c\u041e\u0420\u0415\u0413\u0423\u041b\u042f\u0426\u0418\u0418. \u041e\u0446\u0435\u043d\u043a\u0430 \u2014 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u0444\u0438\u0437\u0438\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043c\u0435\u0442\u043e\u0434\u044b) + \u0441\u0443\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u0431\u0435\u0441\u0435\u0434\u0430, \u0441\u0430\u043c\u043e\u043e\u0442\u0447\u0451\u0442, \u0430\u043d\u043a\u0435\u0442\u044b, \u0442\u0435\u0441\u0442\u044b). \u0421\u0430\u043c\u043e\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u044f: \u043f\u0440\u0438 \u0447\u0440\u0435\u0437\u043c\u0435\u0440\u043d\u043e\u043c \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0438/\u0441\u0442\u0440\u0430\u0445\u0435 \u2192 \u0434\u044b\u0445\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u0438\u0451\u043c\u044b (\u0437\u0430\u043c\u0435\u0434\u043b\u0435\u043d\u0438\u0435, \u0443\u0434\u043b\u0438\u043d\u0435\u043d\u0438\u0435 \u0432\u044b\u0434\u043e\u0445\u0430), \u043c\u044b\u0448\u0435\u0447\u043d\u0430\u044f \u0440\u0435\u043b\u0430\u043a\u0441\u0430\u0446\u0438\u044f, \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437 \u0443\u0441\u043f\u043e\u043a\u043e\u0435\u043d\u0438\u044f (\u00ab\u0441\u043f\u043e\u043a\u043e\u0439\u043d\u043e\u00bb, \u00ab\u0441\u043e\u0431\u0435\u0440\u0438\u0441\u044c\u00bb), \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f; \u043f\u0440\u0438 \u0430\u043f\u0430\u0442\u0438\u0438/\u0432\u044f\u043b\u043e\u0441\u0442\u0438 \u2192 \u0430\u043a\u0442\u0438\u0432\u0438\u0437\u0438\u0440\u0443\u044e\u0449\u0435\u0435 \u0434\u044b\u0445\u0430\u043d\u0438\u0435, \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0437\u043c\u0438\u043d\u043a\u0430, \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0443\u044e\u0449\u0438\u0439 \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437 (\u00ab\u0434\u0435\u0439\u0441\u0442\u0432\u0443\u0439\u00bb), \u043a\u043e\u043d\u0446\u0435\u043d\u0442\u0440\u0430\u0446\u0438\u044f \u043d\u0430 \u0446\u0435\u043b\u0438.\n\n=== \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 3: \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0415 \u041e\u0411\u0415\u0421\u041f\u0415\u0427\u0415\u041d\u0418\u0415 \u0421\u041b\u0423\u0416\u0415\u0411\u041d\u041e\u0419 \u0414\u0415\u042f\u0422\u0415\u041b\u042c\u041d\u041e\u0421\u0422\u0418 ===\n\n\u0412.\u041f\u04211-\u041f\u042110. 8 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419 \u041f\u0420 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0430: \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u043e\u0442\u0431\u043e\u0440; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0438 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u044f \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435. \u0418\u0417\u0423\u0427\u0415\u041d\u0418\u0415 \u041a\u0410\u041d\u0414\u0418\u0414\u0410\u0422\u041e\u0412 \u041f\u041e \u041a\u041e\u041d\u0422\u0420\u0410\u041a\u0422\u0423 \u2014 3 \u044d\u0442\u0430\u043f\u0430: \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0431\u0435\u0441\u0435\u0434\u0430 \u0438 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435. \u041e\u0446\u0435\u043d\u0438\u0432\u0430\u044e\u0442\u0441\u044f: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u044f, \u043d\u0435\u0440\u0432\u043d\u043e-\u043f\u0441\u0438\u0445\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c, \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0439 \u043f\u043e\u0442\u0435\u043d\u0446\u0438\u0430\u043b, \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u044b\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0430, \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0441\u043a\u043b\u043e\u043d\u043d\u043e\u0441\u0442\u044c \u043a \u043e\u0442\u043a\u043b\u043e\u043d\u044f\u044e\u0449\u0435\u043c\u0443\u0441\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044e. \u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u2014 \u0437\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043e \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u0438 \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0439 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043f\u0440\u0438\u0433\u043e\u0434\u043d\u043e\u0441\u0442\u0438. \u0418\u0417\u0423\u0427\u0415\u041d\u0418\u0415 \u041f\u041e\u041f\u041e\u041b\u041d\u0415\u041d\u0418\u042f \u2014 \u0446\u0435\u043b\u044c: \u0440\u0430\u043d\u043d\u0435\u0435 \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u043b\u0438\u0446 \u0441 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0430\u043c\u0438 \u0434\u0435\u0437\u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u0438, \u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u0438, \u043d\u0435\u0441\u0442\u0430\u0431\u0438\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0440\u0438\u0441\u043a\u0430. \u041c\u0435\u0442\u043e\u0434\u044b: \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0431\u0435\u0441\u0435\u0434\u0430; \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u043a\u0430. \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0415 \u041e\u0411\u0415\u0421\u041f\u0415\u0427\u0415\u041d\u0418\u0415 \u0410\u0414\u0410\u041f\u0422\u0410\u0426\u0418\u0418 \u2014 \u0446\u0435\u043b\u044c: \u0432\u0445\u043e\u0436\u0434\u0435\u043d\u0438\u0435 \u0432 \u0443\u0441\u043b\u043e\u0432\u0438\u044f \u0441\u043b\u0443\u0436\u0431\u044b, \u043e\u0441\u0432\u043e\u0435\u043d\u0438\u0435 \u043e\u0431\u044f\u0437\u0430\u043d\u043d\u043e\u0441\u0442\u0435\u0439, \u0432\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432. \u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435 \u0421\u0411\u0414 \u2014 3 \u044d\u0442\u0430\u043f\u0430 (\u043f\u0440\u0438 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0435, \u0432 \u0445\u043e\u0434\u0435, \u043f\u043e\u0441\u043b\u0435). \u0413\u0420\u0423\u041f\u041f\u0410 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u041e-\u041f\u0415\u0414\u0410\u0413\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0413\u041e \u0412\u041d\u0418\u041c\u0410\u041d\u0418\u042f \u2014 \u0432\u043a\u043b\u044e\u0447\u0430\u044e\u0442\u0441\u044f: \u0441 \u0442\u0440\u0443\u0434\u043d\u043e\u0441\u0442\u044f\u043c\u0438 \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u0438; \u0441 \u043d\u0435\u0440\u0432\u043d\u043e-\u043f\u0441\u0438\u0445\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043d\u0435\u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c\u044e; \u0441 \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u043c \u0440\u0438\u0441\u043a\u043e\u043c; \u0441 \u043e\u0442\u043a\u043b\u043e\u043d\u044f\u044e\u0449\u0438\u043c\u0441\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435\u043c; \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u043a\u0438 \u0421\u0411\u0414 \u0441 \u043f\u0441\u0438\u0445\u043e\u0442\u0440\u0430\u0432\u043c\u043e\u0439; \u043f\u043e\u0441\u043b\u0435 \u0431\u043e\u043b\u0435\u0437\u043d\u0435\u0439, \u0440\u0430\u043d\u0435\u043d\u0438\u0439, \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u043e\u0432. \u041f\u043e\u0440\u044f\u0434\u043e\u043a \u0440\u0430\u0431\u043e\u0442\u044b: \u0437\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435, \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430, \u0441\u0438\u0441\u0442\u0435\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0431\u0435\u0441\u0435\u0434\u044b, \u043f\u043e\u043c\u043e\u0449\u044c, \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c. \u041f\u0420\u041e\u0424\u0418\u041b\u0410\u041a\u0422\u0418\u041a\u0410 \u0421\u0423\u0418\u0426\u0418\u0414\u041e\u0412 \u0418 \u041e\u0422\u041a\u041b\u041e\u041d\u042f\u042e\u0429\u0415\u0413\u041e\u0421\u042f \u041f\u041e\u0412\u0415\u0414\u0415\u041d\u0418\u042f \u2014 \u043e\u0431\u0449\u0430\u044f: \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435, \u0441\u043f\u043b\u043e\u0447\u0435\u043d\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430, \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432; \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f: \u043b\u0438\u0446\u0430 \u0433\u0440\u0443\u043f\u043f\u044b \u0440\u0438\u0441\u043a\u0430 \u2014 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0431\u0435\u0441\u0435\u0434\u044b, \u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u043a\u0430; \u043f\u <script type="text/babel">

function App() {
  const [apiKey, setApiKey] = React.useState("");
  const apiKeyRef = React.useRef("");
  const [keyInput, setKeyInput] = React.useState("");
  const [tab, setTab] = React.useState("map");
  const [selC, setSelC] = React.useState(null);
  const [selT, setSelT] = React.useState(null);
  const [msgs, setMsgs] = React.useState([{role:"assistant",content:'Здравия желаю!\n\nЯ отвечаю ТОЛЬКО по справочному материалу, который вы предоставили — без внешних источников и без домыслов.\n\nПопробуйте:\n• «Объясни систему ВПР»\n• «Чем агитация отличается от пропаганды?»\n• «Все 4 вида беседы ИВР — одной схемой»\n• «Кейс: ЗКР получает боевую задачу»\n• «Расчёт психогенных потерь: 600 чел., высокая интенсивность»\n• «Проверь меня по теме 17»'}]);
  const [inp, setInp] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const endRef = React.useRef(null);
  React.useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [msgs]);

  const send = React.useCallback(async () => {
    if (!inp.trim() || loading || !window.SAVED_KEY) { alert('Сначала введите ключ OpenRouter!'); return; }
    const txt = inp.trim(); setInp("");
    setMsgs(p => [...p, {role:"user",content:txt}]);
    setLoading(true);
    try {
      const history = msgs.map(m => ({role:m.role, content:m.content}));
      const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.SAVED_KEY},
        body:JSON.stringify({model:window.SAVED_MODEL,max_tokens:1200,
          messages:[{role:"system",content:SYSTEM_PROMPT},...history,{role:"user",content:txt}]})
      });
      const d = await r.json();
      if (!r.ok) throw new Error((d.error?.message || JSON.stringify(d)).slice(0,200));
      const reply = d.choices?.[0]?.message?.content 
        || d.error?.message 
        || ("Ответ API: " + JSON.stringify(d).slice(0,300));
      setMsgs(p => [...p, {role:"assistant",content:reply}]);
    } catch(e) {
      setMsgs(p => [...p, {role:"assistant",content:"Ошибка: "+e.message}]);
    }
    setLoading(false);
  }, [inp, loading, msgs]);

  const goAI = (q) => { setInp(q); setTab("tutor"); };
  const S = ST;
  return (
    <div style={S.root}>
      <header style={S.hdr}>
        <div style={S.hInner}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24,color:"#c8a84b"}}>⬡</span>
            <div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:4,color:"#c8a84b"}}>ШТАБ</div>
              <div style={{fontSize:10,color:"#5a6478",letterSpacing:2}}>ГМЭ · ВПР · {CLUSTERS.reduce((s,c)=>s+c.topics.length,0)} тем · только ваш материал</div>
            </div>
          </div>
          <nav style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["map","🗺 Карта знаний"],["patterns","⬡ Когнитивные связи"],["tutor","◈ ИИ-тьютор"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>{setTab(id);setSelC(null);setSelT(null);}}
                style={{...S.nb,...(tab===id?S.na:{})}}>{lbl}</button>
            ))}
          </nav>
        </div>
      </header>
      {!apiKey && (
        <div style={{background:"#c8a84b15",borderBottom:"1px solid #c8a84b44",padding:"10px 18px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#c8a84b"}}>◈ Введите ключ OpenRouter:</span>
          <input value={keyInput} onChange={e=>setKeyInput(e.target.value)}
            placeholder="sk-or-v1-..."
            style={{flex:1,minWidth:200,background:"#050709",border:"1px solid #c8a84b44",borderRadius:4,
              color:"#c8d0dc",padding:"6px 10px",fontSize:12,fontFamily:"inherit"}}/>
          <button onClick={()=>{if(keyInput.trim()){const k=keyInput.trim();window.SAVED_KEY=k;setApiKey(k);apiKeyRef.current=k;}}}
            style={{background:"#c8a84b",border:"none",borderRadius:4,color:"#0a0c10",
              padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>Сохранить</button>
          <select onChange={e=>{window.SAVED_MODEL=e.target.value;}}
            style={{background:"#050709",border:"1px solid #c8a84b44",borderRadius:4,
              color:"#c8d0dc",padding:"5px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
            {FREE_MODELS.map(m=><option key={m} value={m}>{m.split("/")[1]}</option>)}
          </select>
          <a href="https://openrouter.ai/keys" target="_blank"
            style={{fontSize:11,color:"#5a6478",textDecoration:"none"}}>Ключ →</a>
        </div>
      )}
      {apiKey && (
        <div style={{background:"#4bc89c11",borderBottom:"1px solid #4bc89c33",padding:"6px 18px",display:"flex",gap:8,alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:11,color:"#4bc89c"}}>✓ ИИ-тьютор подключён · {apiKey.slice(0,16)}…</span>
          <button onClick={()=>{setApiKey("");setKeyInput("");window.SAVED_KEY="";}} style={{background:"transparent",border:"none",color:"#5a6478",cursor:"pointer",fontSize:11}}>Сменить ключ</button>
        </div>
      )}
      <div style={S.main}>
        {tab==="map" && !selT && <MapView clusters={CLUSTERS} sel={selC} onSel={setSelC} onTopic={(t,c)=>{setSelT(t);setSelC(c);}}/>}
        {tab==="map" && selT && <TopicView topic={selT} cluster={CLUSTERS.find(c=>c.id===selC)} onBack={()=>setSelT(null)} onAI={goAI} details={TOPIC_DETAILS[selT.id]}/>}
        {tab==="patterns" && <PatternsView patterns={PATTERNS} onAI={goAI}/>}
        {tab==="tutor" && <TutorView msgs={msgs} inp={inp} loading={loading} setInp={setInp} send={send} endRef={endRef} apiKey={apiKey}/>}
      </div>
    </div>
  );
}

function MapView({clusters,sel,onSel,onTopic}) {
  const active = sel ? clusters.find(c=>c.id===sel) : null;
  if (!active) return (
    <div>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:2,color:"#c8d0dc"}}>Карта знаний</h2>
        <div style={{fontSize:12,color:"#5a6478",marginTop:4}}>{clusters.length} кластеров · {clusters.reduce((s,c)=>s+c.topics.length,0)} тем · только ваш справочный материал</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:12}}>
        {clusters.map(c=>(
          <button key={c.id} className="cc" onClick={()=>onSel(c.id)}
            style={{background:"#0f1218",border:"1px solid "+c.color,borderRadius:8,padding:16,cursor:"pointer",textAlign:"left",
              boxShadow:"0 0 18px "+c.glow,transition:"all 0.2s",position:"relative",overflow:"hidden"}}>
            <div style={{fontSize:26,color:c.color,marginBottom:8}}>{c.icon}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#c8d0dc",lineHeight:1.4,marginBottom:6}}>{c.label}</div>
            <div style={{fontSize:11,color:"#5a6478"}}>{c.topics.length} тем</div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:c.color,opacity:0.6}}/>
          </button>
        ))}
      </div>
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:18}}>
        <button onClick={()=>onSel(null)} style={ST.bb}>← Все кластеры</button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10}}>
          <span style={{fontSize:24,color:active.color}}>{active.icon}</span>
          <div>
            <h2 style={{fontSize:16,fontWeight:700,color:active.color}}>{active.label}</h2>
            <div style={{fontSize:11,color:"#5a6478"}}>{active.topics.length} тем</div>
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {active.topics.map(t=>(
          <button key={t.id} className="tc" onClick={()=>onTopic(t,active.id)}
            style={{background:"#0f1218",border:"1px solid "+active.color+"44",borderRadius:6,padding:"12px 14px",
              cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s"}}>
            <span style={{fontSize:10,color:"#5a6478",minWidth:28}}>#{t.id}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#c8d0dc",lineHeight:1.4,marginBottom:5}}>{t.title}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {t.tags.map(tag=>(
                  <span key={tag} style={{fontSize:10,border:"1px solid "+active.color+"66",borderRadius:3,padding:"1px 6px",color:active.color}}>{tag}</span>
                ))}
              </div>
            </div>
            <span style={{fontSize:16,color:active.color}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function TopicView({topic,cluster,onBack,onAI,details}) {
  const c = cluster || {color:"#c8a84b",label:"Назад"};
  const sugg = [
    "Объясни вопрос "+topic.id+": "+topic.title,
    "Придумай кейс-ситуацию по вопросу "+topic.id,
    "Задай 3 проверочных вопроса по теме "+topic.id,
    "Составь схему по теме: "+topic.title,
  ];
  return (
    <div style={{maxWidth:780}}>
      <button onClick={onBack} style={{...ST.bb,marginBottom:14}}>← {c.label}</button>
      <div style={{background:"#0f1218",border:"1px solid "+c.color+"44",borderRadius:8,padding:22}}>
        <span style={{fontSize:10,background:c.color+"22",color:c.color,borderRadius:4,padding:"2px 8px"}}>#{topic.id}</span>
        <h2 style={{fontSize:16,fontWeight:700,color:c.color,marginTop:8,lineHeight:1.4}}>{topic.title}</h2>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10,marginBottom:20}}>
          {topic.tags.map(t=>(<span key={t} style={{fontSize:10,border:"1px solid "+c.color+"77",borderRadius:3,padding:"2px 7px",color:c.color}}>{t}</span>))}
        </div>
        {details ? (
          <div style={{background:"#050709",borderRadius:6,padding:16,marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:700,color:"#5a6478",letterSpacing:2,marginBottom:10}}>▣ КЛЮЧЕВЫЕ ПОЛОЖЕНИЯ</div>
            {details.keyPoints.map((p,i)=>(
              <div key={i} style={{fontSize:13,color:"#c8d0dc",lineHeight:1.7,paddingLeft:12,borderLeft:"2px solid "+c.color+"44",marginBottom:6}}>{p}</div>
            ))}
            <div style={{background:"#0f1218",border:"1px solid "+c.color+"44",borderRadius:4,padding:"9px 12px",marginTop:12,fontSize:12}}>
              <span style={{color:c.color,fontWeight:700}}>◈ Мнемоника: </span><span style={{color:"#c8d0dc"}}>{details.mnemonic}</span>
            </div>
          </div>
        ) : (
          <div style={{marginBottom:14,padding:"8px 0"}}>
            <p style={{color:"#5a6478",fontSize:13,lineHeight:1.6}}>Нажмите кнопку ниже — ИИ-тьютор разберёт эту тему строго по вашему справочному материалу.</p>
          </div>
        )}
        <div style={{fontSize:11,fontWeight:700,color:"#5a6478",letterSpacing:2,marginBottom:9}}>◇ СПРОСИТЬ ИИ-ТЬЮТОРА</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {sugg.map((s,i)=>(
            <button key={i} onClick={()=>onAI(s)}
              style={{background:"transparent",border:"1px solid "+c.color+"44",borderRadius:4,color:"#c8d0dc",
                padding:"9px 11px",cursor:"pointer",fontSize:12,textAlign:"left",lineHeight:1.5}}>
              {s}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function PatternsView({patterns,onAI}) {
  return (
    <div>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:2,color:"#c8d0dc"}}>Когнитивные связи</h2>
        <div style={{fontSize:12,color:"#5a6478",marginTop:4}}>Паттерны, которые нужно выучить один раз — работают сразу для многих тем</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:14}}>
        {patterns.map(p=>(
          <div key={p.id} style={{background:"#0f1218",border:"1px solid "+p.color+"44",borderRadius:8,padding:18}}>
            <div style={{fontSize:14,fontWeight:700,color:p.color,marginBottom:8,lineHeight:1.4}}>{p.title}</div>
            <div style={{fontSize:12,color:"#5a6478",lineHeight:1.7,marginBottom:14}}>{p.desc}</div>
            {p.steps.map((s,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                <span style={{fontWeight:700,fontSize:12,color:p.color,minWidth:16}}>{i+1}</span>
                <span style={{fontSize:12,color:"#c8d0dc",lineHeight:1.5}}>{s}</span>
              </div>
            ))}
            <div style={{display:"flex",gap:5,flexWrap:"wrap",margin:"12px 0",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#5a6478"}}>Темы:</span>
              {p.topics.map(t=>(<span key={t} style={{fontSize:10,border:"1px solid "+p.color+"77",borderRadius:3,padding:"1px 6px",color:p.color}}>#{t}</span>))}
            </div>
            <button onClick={()=>onAI('Объясни паттерн "'+p.title+'" и покажи примеры для тем '+p.topics.join(", "))}
              style={{background:"transparent",border:"1px solid "+p.color+"55",borderRadius:4,color:p.color,
                padding:"7px 12px",cursor:"pointer",fontSize:12,width:"100%"}}>
              ◈ Разобрать с ИИ-тьютором
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function TutorView({msgs,inp,loading,setInp,send,endRef,apiKey}) {
  const quick = [
    "Объясни систему ВПР простым языком",
    "Чем агитация отличается от пропаганды?",
    "Кейс: ЗКР получает боевую задачу",
    "Все 4 вида беседы ИВР одной схемой",
    "Расчёт психогенных потерь: 600 чел., высокая",
    "Проверь меня по теме 17 — МППС",
    "13 этапов алгоритма ЗКР по ВПР",
    "Оценка по ВПП: все правила одной схемой",
  ];
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)",maxWidth:840}}>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:8,justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-start"}}>
            {m.role==="assistant" && (
              <div style={{width:28,height:28,minWidth:28,background:"#c8a84b22",border:"1px solid #c8a84b55",
                borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#c8a84b",fontSize:12}}>⬡</div>
            )}
            <div style={{maxWidth:"84%",borderRadius:8,padding:"11px 14px",
              background:m.role==="user"?"#c8a84b18":"#0f1218",
              border:m.role==="user"?"1px solid #c8a84b44":"1px solid #1e2530"}}>
              <pre style={{margin:0,fontFamily:"inherit",fontSize:13,lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word",color:"#c8d0dc"}}>{m.content}</pre>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",gap:8}}>
            <div style={{width:28,height:28,minWidth:28,background:"#c8a84b22",border:"1px solid #c8a84b55",
              borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#c8a84b",fontSize:12}}>⬡</div>
            <div style={{background:"#0f1218",border:"1px solid #1e2530",borderRadius:8,padding:"11px 14px",color:"#5a6478",fontSize:13}}>Обрабатываю запрос…</div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      {msgs.length===1 && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"8px 0"}}>
          {quick.map((q,i)=>(<button key={i} className="qb" onClick={()=>setInp(q)}
            style={{background:"#0f1218",border:"1px solid #1e2530",borderRadius:4,color:"#5a6478",
              padding:"6px 11px",cursor:"pointer",fontSize:12,transition:"all 0.15s"}}>{q}</button>))}
        </div>
      )}
      <div style={{display:"flex",gap:7,paddingTop:9}}>
        <textarea value={inp} onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder={apiKey ? "Задайте вопрос строго по материалу… (Enter — отправить)" : "Сначала введите ключ OpenRouter в строке сверху…"} disabled={!apiKey}
          style={{flex:1,background:"#0f1218",border:"1px solid #1e2530",borderRadius:6,color:"#c8d0dc",
            padding:"9px 13px",fontSize:13,fontFamily:"inherit",resize:"none",lineHeight:1.5}} rows={2}/>
        <button onClick={send} disabled={loading||!inp.trim()}
          style={{background:"#c8a84b",border:"none",borderRadius:6,color:"#0a0c10",padding:"0 16px",
            cursor:"pointer",fontSize:17,fontWeight:700,opacity:(loading||!inp.trim())?0.3:1,transition:"opacity 0.2s"}}>➤</button>
      </div>
    </div>
  );
}

const ST = {
  root:{minHeight:"100vh",background:"#0a0c10",color:"#c8d0dc",fontFamily:"'IBM Plex Mono','Courier New',monospace",display:"flex",flexDirection:"column"},
  hdr:{background:"#0f1218",borderBottom:"1px solid #1e2530",position:"sticky",top:0,zIndex:100},
  hInner:{maxWidth:1200,margin:"0 auto",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8},
  main:{flex:1,maxWidth:1200,margin:"0 auto",width:"100%",padding:"20px 18px",boxSizing:"border-box"},
  nb:{background:"transparent",border:"1px solid #1e2530",color:"#5a6478",padding:"5px 13px",borderRadius:4,cursor:"pointer",fontSize:12,letterSpacing:1,transition:"all 0.2s"},
  na:{borderColor:"#c8a84b",color:"#c8a84b",background:"#c8a84b15"},
  bb:{background:"transparent",border:"1px solid #1e2530",color:"#5a6478",padding:"5px 13px",borderRadius:4,cursor:"pointer",fontSize:12},
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
