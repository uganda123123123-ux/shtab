1\u0442\u0440\u0430\u043d\u0438\u0442\u044c \u043e\u0442 \u0441\u043b\u0443\u0436\u0431\u044b; \u0438\u0441\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043e\u0440\u0443\u0436\u0438\u044e \u0438 \u0431\u043e\u0435\u043f\u0440\u0438\u043f\u0430\u0441\u0430\u043c; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043e\u0432\u0430\u0442\u044c \u0437\u0430\u043c\u0435\u043d\u0443; \u043c\u0435\u0434\u043e\u0441\u043c\u043e\u0442\u0440; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430. \u0412.66 \u0421\u0423\u0418\u0426\u0418\u0414\u0410\u041b\u042c\u041d\u0410\u042f \u041f\u0420\u041e\u0424\u0418\u041b\u0410\u041a\u0422\u0418\u041a\u0410. \u041b\u0438\u0446\u0430 \u0433\u0440\u0443\u043f\u043f\u044b \u0440\u0438\u0441\u043a\u0430: \u0441 \u0442\u044f\u0436\u0451\u043b\u044b\u043c\u0438 \u0441\u0435\u043c\u0435\u0439\u043d\u044b\u043c\u0438 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430\u043c\u0438; \u043f\u043e\u0442\u0435\u0440\u0435\u0439 \u0431\u043b\u0438\u0437\u043a\u0438\u0445; \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u044b\u043c\u0438 \u0442\u0440\u0443\u0434\u043d\u043e\u0441\u0442\u044f\u043c\u0438; \u0437\u0430\u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c\u044e; \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430\u0440\u043d\u044b\u043c\u0438 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0430\u043c\u0438; \u0437\u043b\u043e\u0443\u043f\u043e\u0442\u0440\u0435\u0431\u043b\u0435\u043d\u0438\u0435\u043c \u0430\u043b\u043a\u043e\u0433\u043e\u043b\u0435\u043c; \u0438\u0437\u043e\u043b\u044f\u0446\u0438\u0435\u0439 \u0432 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0435; \u0440\u0430\u043d\u0435\u0435 \u0441\u043e\u0432\u0435\u0440\u0448\u0430\u0432\u0448\u0438\u0435 \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u0435 \u043f\u043e\u043f\u044b\u0442\u043a\u0438. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0440\u0438\u0441\u043a\u0430: \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u044b \u043e \u0441\u043c\u0435\u0440\u0442\u0438 \u0438 \u0431\u0435\u0441\u0441\u043c\u044b\u0441\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0436\u0438\u0437\u043d\u0438; \u043f\u0440\u043e\u0449\u0430\u043b\u044c\u043d\u044b\u0435 \u0444\u0440\u0430\u0437\u044b; \u0440\u0430\u0437\u0434\u0430\u0447\u0430 \u043b\u0438\u0447\u043d\u044b\u0445 \u0432\u0435\u0449\u0435\u0439; \u0440\u0435\u0437\u043a\u0438\u0435 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u0437\u0430\u043c\u043a\u043d\u0443\u0442\u043e\u0441\u0442\u044c; \u0443\u0442\u0440\u0430\u0442\u0430 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u0430 \u043a \u0441\u043b\u0443\u0436\u0431\u0435; \u0434\u0435\u043f\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u0431\u0435\u0441\u0441\u043e\u043d\u043d\u0438\u0446\u0430; \u0442\u0440\u0435\u0432\u043e\u0433\u0430; \u0431\u0435\u0437\u043d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c; \u0437\u043b\u043e\u0443\u043f\u043e\u0442\u0440\u0435\u0431\u043b\u0435\u043d\u0438\u0435 \u0430\u043b\u043a\u043e\u0433\u043e\u043b\u0435\u043c; \u0430\u0443\u0442\u043e\u0430\u0433\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u044b\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f; \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f. \u041f\u0440\u0438 \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u0443\u0433\u0440\u043e\u0437\u0435: \u043d\u0435\u043b\u044c\u0437\u044f \u043e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u043e\u0434\u043d\u043e\u0433\u043e; \u0438\u0441\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043e\u0440\u0443\u0436\u0438\u044e, \u043b\u0435\u043a\u0430\u0440\u0441\u0442\u0432\u0430\u043c, \u043e\u043f\u0430\u0441\u043d\u044b\u043c \u043f\u0440\u0435\u0434\u043c\u0435\u0442\u0430\u043c; \u043f\u043e\u0441\u0442\u043e\u044f\u043d\u043d\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0430 \u0438 \u043c\u0435\u0434\u0440\u0430\u0431\u043e\u0442\u043d\u0438\u043a\u0430; \u043f\u0440\u0438 \u043d\u0435\u043e\u0431\u0445\u043e\u0434\u0438\u043c\u043e\u0441\u0442\u0438 \u2014 \u0441\u0440\u043e\u0447\u043d\u0430\u044f \u0433\u043e\u0441\u043f\u0438\u0442\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u044f. \u0412.67 \u0418\u0413\u0420\u041e\u041c\u0410\u041d\u0418\u042f \u0418 \u0417\u0410\u041a\u0420\u0415\u0414\u0418\u0422\u041e\u0412\u0410\u041d\u041d\u041e\u0421\u0422\u042c. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0438\u0433\u0440\u043e\u043c\u0430\u043d\u0438\u0438: \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u044b \u043e \u0441\u0442\u0430\u0432\u043a\u0430\u0445 \u0438 \u043a\u0430\u0437\u0438\u043d\u043e; \u0441\u043a\u0440\u044b\u0442\u043d\u043e\u0441\u0442\u044c \u043f\u0440\u0438 \u0442\u0435\u043b\u0435\u0444\u043e\u043d\u0435; \u043d\u043e\u0447\u043d\u0430\u044f \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u043f\u0435\u0440\u0435\u043f\u0430\u0434\u044b \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u043e\u0442 \u0432\u044b\u0438\u0433\u0440\u044b\u0448\u0430; \u043f\u043e\u043f\u044b\u0442\u043a\u0438 \u00ab\u043e\u0442\u044b\u0433\u0440\u0430\u0442\u044c\u0441\u044f\u00bb; \u0447\u0430\u0441\u0442\u044b\u0435 \u0437\u0430\u0439\u043c\u044b; \u043b\u043e\u0436\u044c \u043e \u0440\u0430\u0441\u0445\u043e\u0434\u0430\u0445; \u0443\u0442\u0440\u0430\u0442\u0430 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u0430 \u043a \u0441\u043b\u0443\u0436\u0431\u0435 \u0438 \u0434\u043e\u0441\u0443\u0433\u0443. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0437\u0430\u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u0438: \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0432 \u0438 \u043c\u0438\u043a\u0440\u043e\u0437\u0430\u0439\u043c\u043e\u0432; \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u044b\u0435 \u043f\u0440\u043e\u0441\u044c\u0431\u044b \u0437\u0430\u043d\u044f\u0442\u044c; \u0443\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u044f \u0438 \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u0434\u0441\u0442\u0432\u0430; \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u044b \u0432 \u0441\u0435\u043c\u044c\u0435 \u043d\u0430 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u043e\u0439 \u043f\u043e\u0447\u0432\u0435; \u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u044c, \u0431\u0435\u0437\u044b\u0441\u0445\u043e\u0434\u043d\u043e\u0441\u0442\u044c; \u0437\u0432\u043e\u043d\u043a\u0438 \u043e\u0442 \u043a\u0440\u0435\u0434\u0438\u0442\u043e\u0440\u043e\u0432. \u0412.68 \u041a\u0414\u0420 \u041d\u0410 \u0412\u042b\u0425\u041e\u0414\u041d\u042b\u0415. \u0417\u041a\u0420 \u043f\u043e \u0412\u041f\u0420 \u0434\u043e\u043a\u043b\u0430\u0434\u044b\u0432\u0430\u0435\u0442 \u043d\u0430 \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u0438 \u043d\u0435 \u043f\u043e\u0437\u0434\u043d\u0435\u0435 \u0447\u0435\u043c \u0437\u0430 4 \u0441\u0443\u0442\u043e\u043a. \u0412 \u043f\u043b\u0430\u043d\u0435 \u0432\u044b\u0445\u043e\u0434\u043d\u043e\u0433\u043e \u0434\u043d\u044f \u2014 \u0432\u0440\u0435\u043c\u044f \u0438 \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439, \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439. \u0417\u0410\u041f\u0420\u0415\u0429\u0415\u041d\u041e \u0432\u043a\u043b\u044e\u0447\u0430\u0442\u044c \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043e\u0431\u0449\u0435\u0433\u043e \u0440\u0430\u0441\u043f\u043e\u0440\u044f\u0434\u043a\u0430 \u0434\u043d\u044f. \u0412.69 \u0412\u0418\u041a\u0422\u041e\u0420\u0418\u041d\u0410. 10\u201315 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432. \u041e \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0438 \u043e\u0431\u044a\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0437\u0430\u0440\u0430\u043d\u0435\u0435 (\u0442\u0435\u043c\u0430, \u0432\u0440\u0435\u043c\u044f, \u043c\u0435\u0441\u0442\u043e). \u0412\u043e\u043f\u0440\u043e\u0441\u044b \u043d\u0430\u0437\u044b\u0432\u0430\u044e\u0442\u0441\u044f \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u043d\u0430 \u0432\u0435\u0447\u0435\u0440\u0435. \u0423\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u043a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0445 \u043e\u0442\u0432\u0435\u0442\u043e\u0432 \u0438 \u0433\u043b\u0443\u0431\u0438\u043d\u0430 \u043e\u0442\u0432\u0435\u0442\u0430. \u041f\u043e\u0431\u0435\u0434\u0438\u0442\u0435\u043b\u0438 \u043d\u0435\u0440\u0435\u0434\u043a\u043e \u043d\u0430\u0433\u0440\u0430\u0436\u0434\u0430\u044e\u0442\u0441\u044f. \u0412.70 \u0412\u0415\u0420\u0423\u042e\u0429\u0418\u0415 \u0412\u041e\u0415\u041d\u041d\u041e\u0421\u041b\u0423\u0416\u0410\u0429\u0418\u0415. \u041c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f\u043c \u0412\u041f\u0420: \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430 \u2014 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u043e-\u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043f\u0440\u0438\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0437\u0430 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u044b\u0439 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c, \u0424\u0417-114 \u00ab\u041e \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0438 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0443\u00bb; \u0410\u041f\u0420 \u2014 \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u043e \u0432\u0440\u0435\u0434\u0435 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0433\u043e \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0430, \u0424\u0417-125 \u00ab\u041e \u0441\u0432\u043e\u0431\u043e\u0434\u0435 \u0441\u043e\u0432\u0435\u0441\u0442\u0438\u00bb, \u0418\u0412\u0420 \u0441 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u043c\u0438; \u0441\u043e\u0446\u0440\u0430\u0431\u043e\u0442\u0430 \u2014 \u0437\u0430\u0449\u0438\u0442\u0430 \u043f\u0440\u0430\u0432 \u0438 \u0441\u0432\u043e\u0431\u043e\u0434 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u0445; \u041a\u0414\u0420 \u2014 \u043f\u043e\u0441\u0435\u0449\u0435\u043d\u0438\u0435 \u0445\u0440\u0430\u043c\u043e\u0432, \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043f\u0440\u043e\u0441\u0432\u0435\u0442\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0435 \u0431\u0435\u0441\u0435\u0434\u044b, \u044d\u043a\u0441\u043a\u0443\u0440\u0441\u0438\u0438, \u043f\u043e\u0434\u0431\u043e\u0440\u043a\u0430 \u0434\u0443\u0445\u043e\u0432\u043d\u043e\u0439 \u043b\u0438\u0442\u0435\u0440\u0430\u0442\u0443\u0440\u044b \u0432 \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u043a\u0435.\n\n=== \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 2: \u0412\u041e\u0415\u041d\u041d\u0410\u042f \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f ===\n\n\u0412.\u041c\u041f1 \u041c\u0415\u0422\u041e\u0414\u041e\u041b\u041e\u0413\u0418\u042f \u0418 \u041c\u0415\u0422\u041e\u0414\u042b. 8 \u041f\u0420\u0418\u041d\u0426\u0418\u041f\u041e\u0412: \u0434\u0435\u0442\u0435\u0440\u043c\u0438\u043d\u0438\u0437\u043c\u0430; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u044f; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0430 \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f \u0438 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u0441\u0438\u0441\u0442\u0435\u043c\u043d\u043e\u0441\u0442\u0438; \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438; \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u043e\u0433\u043e \u043f\u043e\u0434\u0445\u043e\u0434\u0430; \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u0438\u0441\u0442\u043e\u0440\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043e\u0431\u0443\u0441\u043b\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0430 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0438 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0433\u043e. 12 \u041c\u0415\u0422\u041e\u0414\u041e\u0412: \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u044d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442; \u0431\u0435\u0441\u0435\u0434\u0430 \u0438 \u0438\u043d\u0442\u0435\u0440\u0432\u044c\u044e; \u043e\u043f\u0440\u043e\u0441 \u0438 \u0430\u043d\u043a\u0435\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u044d\u043a\u0441\u043f\u0435\u0440\u0442\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430; \u0441\u043e\u0446\u0438\u043e\u043c\u0435\u0442\u0440\u0438\u044f; \u043c\u043e\u0434\u0435\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0442\u0440\u0435\u043d\u0438\u043d\u0433.\n\u0412.\u041c\u041f2 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u0425\u0410\u0420\u0410\u041a\u0422\u0415\u0420\u0418\u0421\u0422\u0418\u041a\u0410 \u0412\u041e\u0419\u041d\u042b. 3 \u0443\u0440\u043e\u0432\u043d\u044f: \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u043e (\u043c\u0430\u0441\u0441\u043e\u0432\u044b\u0435 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f, \u043e\u0431\u0440\u0430\u0437 \u0432\u0440\u0430\u0433\u0430); \u0430\u0440\u043c\u0438\u044f (\u0431\u043e\u0435\u0432\u043e\u0439 \u0434\u0443\u0445, \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430, \u0434\u043e\u0432\u0435\u0440\u0438\u0435); \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u044c (\u0441\u043c\u044b\u0441\u043b\u044b, \u043c\u043e\u0442\u0438\u0432\u044b, \u0441\u0442\u0440\u0430\u0445, \u043c\u0443\u0436\u0435\u0441\u0442\u0432\u043e). \u0414\u0432\u043e\u0439\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u044d\u0444\u0444\u0435\u043a\u0442: \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a \u0442\u044f\u0436\u0435\u043b\u0435\u0439\u0448\u0438\u0445 \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432 + \u043c\u043e\u0449\u043d\u0430\u044f \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u044f \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u0441\u0438\u043b. \u041e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0438: \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u0432\u043e\u0441\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u0432\u0440\u0435\u043c\u0435\u043d\u0438 \u0438 \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0430; \u0443\u0441\u0438\u043b\u0435\u043d\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0444\u0430\u043a\u0442\u043e\u0440\u043e\u0432; \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0431\u043e\u0440\u0441\u0442\u0432\u043e. \u041f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f: \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 (\u043e\u0441\u0442\u0440\u044b\u0435 \u0440\u0435\u0430\u043a\u0446\u0438\u0438); \u043e\u0442\u0441\u0440\u043e\u0447\u0435\u043d\u043d\u044b\u0435 (\u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u044c, \u043a\u043e\u0448\u043c\u0430\u0440\u044b); \u043e\u0442\u0434\u0430\u043b\u0451\u043d\u043d\u044b\u0435 (\u041f\u0422\u0421\u0420, \u0434\u0435\u043f\u0440\u0435\u0441\u0441\u0438\u044f, \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438).\n\u0412.\u041c\u041f3 \u0424\u0410\u041a\u0422\u041e\u0420\u042b \u0411\u041e\u0415\u0412\u041e\u0419 \u0410\u041a\u0422\u0418\u0412\u041d\u041e\u0421\u0422\u0418. \u0421\u043c\u044b\u0441\u043b\u043e\u0432\u044b\u0435 \u0438 \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u0438\u044f; \u0432\u043e\u0435\u043d\u043d\u043e-\u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u044c; \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0438 \u043b\u0438\u0434\u0435\u0440\u0441\u0442\u0432\u043e; \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0433\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430 (\u0441\u043f\u043b\u043e\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c, \u0434\u043e\u0432\u0435\u0440\u0438\u0435, \u0432\u0437\u0430\u0438\u043c\u043e\u0432\u044b\u0440\u0443\u0447\u043a\u0430); \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u044b\u0435 \u0438 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0439\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044c\u043d\u043e-\u0442\u0435\u0445\u043d\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0438 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0431\u043e\u0435\u0432\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u0438 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; \u0431\u043e\u0435\u0432\u043e\u0439 \u043e\u043f\u044b\u0442.\n\u0412.\u041c\u041f4 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f \u0412\u041e\u0418\u041d\u0421\u041a\u041e\u0419 \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u042b. \u041f\u0440\u043e\u0447\u043d\u0430\u044f \u043e\u0441\u043d\u043e\u0432\u0430 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u2014 \u043e\u0441\u043e\u0437\u043d\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0443\u0431\u0435\u0436\u0434\u0451\u043d\u043d\u043e\u0441\u0442\u044c, \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0430 \u043a \u043f\u043e\u0440\u044f\u0434\u043a\u0443, \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435 \u043a \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u044f\u043c, \u0441\u0430\u043c\u043e\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u2014 \u0430 \u043d\u0435 \u0441\u0442\u0440\u0430\u0445 \u043d\u0430\u043a\u0430\u0437\u0430\u043d\u0438\u044f. \u041a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c \u2014 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0435 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430: \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c, \u043f\u043e\u0434\u0447\u0438\u043d\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u043e\u0431\u0449\u0438\u043c \u0446\u0435\u043b\u044f\u043c, \u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u044c \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0438\u0432\u0430\u0442\u044c \u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u043d\u043e\u0440\u043c.\n\u0412.\u041c\u041f5 \u0411\u041e\u0415\u0412\u041e\u0419 \u0421\u0422\u0420\u0415\u0421\u0421. \u041d\u0435 \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0430\u0442\u043e\u043b\u043e\u0433\u0438\u044f \u2014 \u0432 \u0443\u043c\u0435\u0440\u0435\u043d\u043d\u044b\u0445 \u043f\u0440\u0435\u0434\u0435\u043b\u0430\u0445 \u0432\u044b\u043f\u043e\u043b\u043d\u044f\u0435\u0442 \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0443\u044e\u0449\u0443\u044e \u0444\u0443\u043d\u043a\u0446\u0438\u044e. \u0414\u0435\u0437\u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0443\u0435\u0442 \u043f\u0440\u0438 \u043f\u0440\u0435\u0432\u044b\u0448\u0435\u043d\u0438\u0438 \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0445 \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e\u0441\u0442\u0435\u0439. \u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0438: \u0443\u0433\u0440\u043e\u0437\u0430 \u0436\u0438\u0437\u043d\u0438, \u0433\u0438\u0431\u0435\u043b\u044c \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0435\u0439, \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0435 \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435, \u0434\u0435\u0444\u0438\u0446\u0438\u0442 \u0441\u043d\u0430, \u043d\u0435\u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0451\u043d\u043d\u043e\u0441\u0442\u044c. \u0423\u0440\u043e\u0432\u043d\u0438 \u043f\u043e\u0440\u0430\u0436\u0435\u043d\u0438\u044f: \u043f\u043e\u0437\u043d\u0430\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 (\u0441\u0443\u0436\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f, \u043e\u0448\u0438\u0431\u043a\u0438); \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 (\u0441\u0442\u0440\u0430\u0445, \u0442\u0440\u0435\u0432\u043e\u0433\u0430, \u043e\u0446\u0435\u043f\u0435\u043d\u0435\u043d\u0438\u0435); \u0432\u043e\u043b\u0435\u0432\u043e\u0439 (\u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u044f \u0438\u043b\u0438 \u0441\u0442\u0443\u043f\u043e\u0440); \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0447\u0435\u0441\u043a\u0438\u0439 (\u0441\u043a\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0438\u043c\u043f\u0443\u043b\u044c\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c); \u0444\u0438\u0437\u0438\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0439 (\u0442\u0440\u0435\u043c\u043e\u0440, \u043f\u043e\u0442\u043b\u0438\u0432\u043e\u0441\u0442\u044c). \u0424\u0430\u0437\u044b: \u043f\u0435\u0440\u0432\u0438\u0447\u043d\u0430\u044f \u0440\u0435\u0430\u043a\u0446\u0438\u044f \u2192 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0442\u0438\u0432\u043b\u0435\u043d\u0438\u0435 \u2192 \u0438\u0441\u0442\u043e\u0449\u0435\u043d\u0438\u0435. \u041f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f: \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435; \u043e\u0442\u0441\u0440\u043e\u0447\u0435\u043d\u043d\u044b\u0435; \u043e\u0442\u0434\u0430\u043b\u0451\u043d\u043d\u044b\u0435 (\u041f\u0422\u0421\u0420). \u0412\u043e\u0437\u043c\u043e\u0436\u043d\u043e \u043f\u043e\u0441\u0442\u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432\u043e\u0435 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u043e\u0435 \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043f\u0440\u0438 \u0431\u043b\u0430\u0433\u043e\u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0445 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445.\n\u0412.\u041c\u041f6 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u041f\u041e\u0414\u0413\u041e\u0422\u041e\u0412\u041a\u0410 \u041a \u0421\u0411\u0417. 4 \u0412\u0418\u0414\u0410: \u043e\u0431\u0449\u0430\u044f (\u043d\u0430 \u043f\u0440\u043e\u0442\u044f\u0436\u0435\u043d\u0438\u0438 \u0432\u0441\u0435\u0433\u043e \u043f\u0435\u0440\u0438\u043e\u0434\u0430 \u0441\u043b\u0443\u0436\u0431\u044b); \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f (\u043f\u043e \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u0438); \u0446\u0435\u043b\u0435\u0432\u0430\u044f (\u043f\u043e \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u0439 \u0437\u0430\u0434\u0430\u0447\u0435); \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u0430\u044f (\u043f\u0435\u0440\u0435\u0434 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u0435\u043c \u0437\u0430\u0434\u0430\u0447\u0438). \u041f\u0440\u0438\u043d\u0446\u0438\u043f \u0440\u0435\u0430\u043b\u0438\u0441\u0442\u0438\u0447\u043d\u043e\u0441\u0442\u0438 \u2014 \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u0435\u043d. \u0421\u043e\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043c\u044b\u0441\u043b\u043e\u0432\u0430\u044f; \u043a\u043e\u0433\u043d\u0438\u0442\u0438\u0432\u043d\u0430\u044f (\u043e\u0431\u0440\u0430\u0437 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438); \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0432\u043e\u043b\u0435\u0432\u0430\u044f; \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f. \u041c\u0435\u0442\u043e\u0434\u044b \u0441\u0430\u043c\u043e\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u0438: \u0434\u044b\u0445\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u0438\u0451\u043c\u044b; \u043c\u044b\u0448\u0435\u0447\u043d\u0430\u044f \u0440\u0435\u043b\u0430\u043a\u0441\u0430\u0446\u0438\u044f; \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437; \u0441\u0430\u043c\u043e\u0432\u043d\u0443\u0448\u0435\u043d\u0438\u0435; \u0438\u0434\u0435\u043e\u043c\u043e\u0442\u043e\u0440\u043d\u0430\u044f \u0442\u0440\u0435\u043d\u0438\u0440\u043e\u0432\u043a\u0430; \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f; \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0438\u0439 \u0440\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u0434\u0438\u0430\u043b\u043e\u0433.\n\u0412.\u041c\u041f7 \u0412\u041e\u0418\u041d\u0421\u041a\u0418\u0419 \u041a\u041e\u041b\u041b\u0415\u041a\u0422\u0418\u0412 \u041a\u0410\u041a \u0420\u0415\u0421\u0423\u0420\u0421. 6 \u041c\u0415\u0425\u0410\u041d\u0418\u0417\u041c\u041e\u0412 \u0440\u0435\u0441\u0443\u0440\u0441\u043d\u043e\u0441\u0442\u0438: 1)\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f \u0438\u0434\u0435\u043d\u0442\u0438\u0444\u0438\u043a\u0430\u0446\u0438\u044f; 2)\u0434\u043e\u0432\u0435\u0440\u0438\u0435; 3)\u0441\u043f\u043b\u043e\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c; 4)\u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 \u043d\u043e\u0440\u043c\u044b \u0438 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u043c\u043d\u0435\u043d\u0438\u0435; 5)\u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0435 \u0437\u0430\u0440\u0430\u0436\u0435\u043d\u0438\u0435 \u0438 \u0432\u0437\u0430\u0438\u043c\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; 6)\u0440\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043d\u0430\u0433\u0440\u0443\u0437\u043a\u0438. \u041a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432 \u2014 \u0440\u0435\u0441\u0443\u0440\u0441 \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0440\u0438 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445: \u0430\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442\u043d\u043e\u0433\u043e \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u044f, \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0439 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b, \u044f\u0441\u043d\u044b\u0445 \u0446\u0435\u043b\u0435\u0439, \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u044f \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0435\u0433\u043e \u0440\u0430\u0441\u043a\u043e\u043b\u0430.\n\u0412.\u041c\u041f8 \u0417\u0410\u0429\u0418\u0422\u0410 \u041e\u0422 \u0418\u041f\u0412\u041f. 8 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419: \u0441\u0432\u043e\u0435\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e\u0435 \u043f\u0440\u0430\u0432\u0434\u0438\u0432\u043e\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u0439 \u0438 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u0438; \u043a\u0440\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043c\u044b\u0448\u043b\u0435\u043d\u0438\u0435 \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f \u0431\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c; \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0433\u043e \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430; \u0440\u0430\u0431\u043e\u0442\u0430 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u043e\u0432 \u0438 \u0412\u041f\u041e; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430; \u0430\u0434\u0440\u0435\u0441\u043d\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c \u0443\u044f\u0437\u0432\u0438\u043c\u044b\u043c; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0435 \u0440\u0435\u0433\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0439 \u0441\u0440\u0435\u0434\u044b.\n\u0412.\u041c\u041f9 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u042f \u0412\u0417\u0410\u0418\u041c\u041e\u041e\u0422\u041d\u041e\u0428\u0415\u041d\u0418\u0419. \u041e\u0444\u0438\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0435 (\u0443\u0441\u0442\u0430\u0432\u043d\u044b\u0435) \u0438 \u043d\u0435\u043e\u0444\u0438\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0435; \u0434\u0435\u043b\u043e\u0432\u044b\u0435 \u0438 \u043b\u0438\u0447\u043d\u044b\u0435; \u0432\u0435\u0440\u0442\u0438\u043a\u0430\u043b\u044c\u043d\u044b\u0435 (\u0441\u0443\u0431\u043e\u0440\u0434\u0438\u043d\u0430\u0446\u0438\u044f) \u0438 \u0433\u043e\u0440\u0438\u0437\u043e\u043d\u0442\u0430\u043b\u044c\u043d\u044b\u0435. \u041c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u044b: \u0432\u043e\u0441\u043f\u0440\u0438\u044f\u0442\u0438\u0435, \u044d\u043c\u043f\u0430\u0442\u0438\u044f, \u0430\u0442\u0442\u0440\u0430\u043a\u0446\u0438\u044f, \u0430\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442, \u0432\u043d\u0443\u0448\u0435\u043d\u0438\u0435, \u043f\u043e\u0434\u0440\u0430\u0436\u0430\u043d\u0438\u0435, \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u0438\u043c\u043e\u0441\u0442\u044c. \u0417\u0434\u043e\u0440\u043e\u0432\u044b\u0435: \u0432\u0437\u0430\u0438\u043c\u043d\u043e\u0435 \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435, \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0435\u0441\u0442\u0432\u043e, \u0434\u043e\u0432\u0435\u0440\u0438\u0435, \u0432\u0437\u0430\u0438\u043c\u043d\u0430\u044f \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c. \u041d\u0435\u0431\u043b\u0430\u0433\u043e\u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0435: \u0433\u0440\u0443\u043f\u043f\u0438\u0440\u043e\u0432\u043a\u0438, \u0434\u0430\u0432\u043b\u0435\u043d\u0438\u0435, \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043d\u043e\u0441\u0442\u044c, \u0431\u0435\u0437\u0440\u0430\u0437\u043b\u0438\u0447\u0438\u0435, \u0444\u043e\u0440\u043c\u0430\u043b\u0438\u0437\u043c. \u0410\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430 \u0441\u0442\u0430\u0431\u0438\u043b\u0438\u0437\u0438\u0440\u0443\u0435\u0442 \u0432\u0437\u0430\u0438\u043c\u043e\u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f \u0438 \u0441\u043d\u0438\u0436\u0430\u0435\u0442 \u0432\u0435\u0440\u043e\u044f\u0442\u043d\u043e\u0441\u0442\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432.\n\u0412.\u041c\u041f10 \u041a\u041e\u041d\u0424\u041b\u0418\u041a\u0422\u042b \u0412 \u041c\u041d\u041e\u0413\u041e\u041d\u0410\u0426\u0418\u041e\u041d\u0410\u041b\u042c\u041d\u042b\u0425 \u041a\u041e\u041b\u041b\u0415\u041a\u0422\u0418\u0412\u0410\u0425. \u041f\u0440\u0438\u0447\u0438\u043d\u044b: \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u043d\u0435\u0434\u043e\u0441\u0442\u0430\u0442\u043a\u0438 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438, \u043f\u0435\u0440\u0435\u0433\u0440\u0443\u0437\u043a\u0430, \u043d\u0435\u0441\u043f\u0440\u0430\u0432\u0435\u0434\u043b\u0438\u0432\u043e\u0441\u0442\u044c) \u0438 \u0441\u0443\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440, \u0437\u0430\u0432\u044b\u0448\u0435\u043d\u043d\u0430\u044f \u0441\u0430\u043c\u043e\u043e\u0446\u0435\u043d\u043a\u0430, \u043f\u0440\u0435\u0434\u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f). 4 \u0422\u0418\u041f\u0410: \u043c\u0435\u0436\u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u044b\u0435; \u0432\u043d\u0443\u0442\u0440\u0438\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u044b\u0435; \u043c\u0435\u0436\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u044b\u0435; \u0440\u043e\u043b\u0435\u0432\u044b\u0435. \u0420\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0435: \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u043c\u0435\u0440\u044b; \u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435; \u043f\u0440\u0430\u0432\u043e\u0432\u044b\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435. \u0412 \u041c\u041d\u041e\u0413\u041e\u041d\u0410\u0426\u0418\u041e\u041d\u0410\u041b\u042c\u041d\u042b\u0425: \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435 \u043d\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0434\u043e\u0441\u0442\u043e\u0438\u043d\u0441\u0442\u0432\u0430; \u0435\u0434\u0438\u043d\u043e\u043e\u0431\u0440\u0430\u0437\u0438\u0435 \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0439; \u0438\u0441\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0444\u0430\u0432\u043e\u0440\u0438\u0442\u0438\u0437\u043c\u0430; \u043e\u043f\u043e\u0440\u0430 \u043d\u0430 \u043e\u0431\u0449\u0438\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0435 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043e\u0431\u0449\u0435\u0433\u043e \u00ab\u043c\u044b\u00bb.\n\u0412.\u041c\u041f12 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u041c\u041e\u0414\u0415\u041b\u042c \u0421\u0411\u0414. 8 \u0421\u0422\u0420\u0423\u041a\u0422\u0423\u0420\u041d\u042b\u0425 \u0411\u041b\u041e\u041a\u041e\u0412: 1)\u0441\u0443\u0431\u044a\u0435\u043a\u0442\u043d\u044b\u0439; 2)\u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0446\u0435\u043b\u0435\u0432\u043e\u0439; 3)\u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u043e\u0447\u043d\u043e-\u043a\u043e\u0433\u043d\u0438\u0442\u0438\u0432\u043d\u044b\u0439; 4)\u043e\u043f\u0435\u0440\u0430\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0439; 5)\u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0432\u043e\u043b\u0435\u0432\u043e\u0439; 6)\u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u043e\u0439; 7)\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u043e\u043d\u043d\u043e-\u0440\u0435\u0444\u043b\u0435\u043a\u0441\u0438\u0432\u043d\u044b\u0439; 8)\u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438\u0432\u043d\u044b\u0439. 8 \u0424\u0423\u041d\u041a\u0426\u0418\u0419: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043c\u044b\u0441\u043b\u043e\u0432\u0430\u044f; \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u043e\u0447\u043d\u0430\u044f; \u043f\u0440\u043e\u0433\u043d\u043e\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f; \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f; \u0438\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0430\u044f; \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u043e-\u043a\u043e\u043e\u0440\u0434\u0438\u043d\u0438\u0440\u0443\u044e\u0449\u0430\u044f; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c\u043d\u043e-\u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u043e\u043d\u043d\u0430\u044f; \u0437\u0430\u0449\u0438\u0442\u043d\u043e-\u043a\u043e\u043c\u043f\u0435\u043d\u0441\u0430\u0442\u043e\u0440\u043d\u0430\u044f.\n\u0412.\u041c\u041f13 \u041c\u0415\u0422\u041e\u0414\u042b \u041e\u0426\u0415\u041d\u041a\u0418 \u0418 \u0421\u0410\u041c\u041e\u0420\u0415\u0413\u0423\u041b\u042f\u0426\u0418\u0418. \u041e\u0446\u0435\u043d\u043a\u0430 \u2014 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u0444\u0438\u0437\u0438\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043c\u0435\u0442\u043e\u0434\u044b) + \u0441\u0443\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 (\u0431\u0435\u0441\u0435\u0434\u0430, \u0441\u0430\u043c\u043e\u043e\u0442\u0447\u0451\u0442, \u0430\u043d\u043a\u0435\u0442\u044b, \u0442\u0435\u0441\u0442\u044b). \u0421\u0430\u043c\u043e\u0440\u0435\u0433\u0443\u043b\u044f\u0446\u0438\u044f: \u043f\u0440\u0438 \u0447\u0440\u0435\u0437\u043c\u0435\u0440\u043d\u043e\u043c \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0438/\u0441\u0442\u0440\u0430\u0445\u0435 \u2192 \u0434\u044b\u0445\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u0438\u0451\u043c\u044b (\u0437\u0430\u043c\u0435\u0434\u043b\u0435\u043d\u0438\u0435, \u0443\u0434\u043b\u0438\u043d\u0435\u043d\u0438\u0435 \u0432\u044b\u0434\u043e\u0445\u0430), \u043c\u044b\u0448\u0435\u0447\u043d\u0430\u044f \u0440\u0435\u043b\u0430\u043a\u0441\u0430\u0446\u0438\u044f, \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437 \u0443\u0441\u043f\u043e\u043a\u043e\u0435\u043d\u0438\u044f (\u00ab\u0441\u043f\u043e\u043a\u043e\u0439\u043d\u043e\u00bb, \u00ab\u0441\u043e\u0431\u0435\u0440\u0438\u0441\u044c\u00bb), \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f; \u043f\u0440\u0438 \u0430\u043f\u0430\u0442\u0438\u0438/\u0432\u044f\u043b\u043e\u0441\u0442\u0438 \u2192 \u0430\u043a\u0442\u0438\u0432\u0438\u0437\u0438\u0440\u0443\u044e\u0449\u0435\u0435 \u0434\u044b\u0445\u0430\u043d\u0438\u0435, \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0437\u043c\u0438\u043d\u043a\u0430, \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0443\u044e\u0449\u0438\u0439 \u0441\u0430\u043c\u043e\u043f\u0440\u0438\u043a\u0430\u0437 (\u00ab\u0434\u0435\u0439\u0441\u0442\u0432\u0443\u0439\u00bb), \u043a\u043e\u043d\u0446\u0435\u043d\u0442\u0440\u0430\u0446\u0438\u044f \u043d\u0430 \u0446\u0435\u043b\u0438.\n\n=== \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 3: \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0415 \u041e\u0411\u0415\u0421\u041f\u0415\u0427\u0415\u041d\u0418\u0415 \u0421\u041b\u0423\u0416\u0415\u0411\u041d\u041e\u0419 \u0414\u0415\u042f\u0422\u0415\u041b\u042c\u041d\u041e\u0421\u0422\u0418 ===\n\n\u0412.\u041f\u04211-\u041f\u042110. 8 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419 \u041f\u0420 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0430: \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u043e\u0442\u0431\u043e\u0440; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0438 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u044f \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435. \u0418\u0417\u0423\u0427\u0415\u041d\u0418\u0415 \u041a\u0410\u041d\u0414\u0418\u0414\u0410\u0422\u041e\u0412 \u041f\u041e \u041a\u041e\u041d\u0422\u0420\u0410\u041a\u0422\u0423 \u2014 3 \u044d\u0442\u0430\u043f\u0430: \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0431\u0435\u0441\u0435\u0434\u0430 \u0438 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435. \u041e\u0446\u0435\u043d\u0438\u0432\u0430\u044e\u0442\u0441\u044f: \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u044f, \u043d\u0435\u0440\u0432\u043d\u043e-\u043f\u0441\u0438\u0445\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c, \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0439 \u043f\u043e\u0442\u0435\u043d\u0446\u0438\u0430\u043b, \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u044b\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0430, \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c, \u0441\u043a\u043b\u043e\u043d\u043d\u043e\u0441\u0442\u044c \u043a \u043e\u0442\u043a\u043b\u043e\u043d\u044f\u044e\u0449\u0435\u043c\u0443\u0441\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044e. \u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u2014 \u0437\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043e \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u0438 \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0439 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043f\u0440\u0438\u0433\u043e\u0434\u043d\u043e\u0441\u0442\u0438. \u0418\u0417\u0423\u0427\u0415\u041d\u0418\u0415 \u041f\u041e\u041f\u041e\u041b\u041d\u0415\u041d\u0418\u042f \u2014 \u0446\u0435\u043b\u044c: \u0440\u0430\u043d\u043d\u0435\u0435 \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u043b\u0438\u0446 \u0441 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0430\u043c\u0438 \u0434\u0435\u0437\u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u0438, \u0442\u0440\u0435\u0432\u043e\u0436\u043d\u043e\u0441\u0442\u0438, \u043d\u0435\u0441\u0442\u0430\u0431\u0438\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0440\u0438\u0441\u043a\u0430. \u041c\u0435\u0442\u043e\u0434\u044b: \u0430\u043d\u0430\u043b\u0438\u0437 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0431\u0435\u0441\u0435\u0434\u0430; \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u043a\u0430. \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0415 \u041e\u0411\u0415\u0421\u041f\u0415\u0427\u0415\u041d\u0418\u0415 \u0410\u0414\u0410\u041f\u0422\u0410\u0426\u0418\u0418 \u2014 \u0446\u0435\u043b\u044c: \u0432\u0445\u043e\u0436\u0434\u0435\u043d\u0438\u0435 \u0432 \u0443\u0441\u043b\u043e\u0432\u0438\u044f \u0441\u043b\u0443\u0436\u0431\u044b, \u043e\u0441\u0432\u043e\u0435\u043d\u0438\u0435 \u043e\u0431\u044f\u0437\u0430\u043d\u043d\u043e\u0441\u0442\u0435\u0439, \u0432\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u0432 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432. \u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435 \u0421\u0411\u0414 \u2014 3 \u044d\u0442\u0430\u043f\u0430 (\u043f\u0440\u0438 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0435, \u0432 \u0445\u043e\u0434\u0435, \u043f\u043e\u0441\u043b\u0435). \u0413\u0420\u0423\u041f\u041f\u0410 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u041e-\u041f\u0415\u0414\u0410\u0413\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u041e\u0413\u041e \u0412\u041d\u0418\u041c\u0410\u041d\u0418\u042f \u2014 \u0432\u043a\u043b\u044e\u0447\u0430\u044e\u0442\u0441\u044f: \u0441 \u0442\u0440\u0443\u0434\u043d\u043e\u0441\u0442\u044f\u043c\u0438 \u0430\u0434\u0430\u043f\u0442\u0430\u0446\u0438\u0438; \u0441 \u043d\u0435\u0440\u0432\u043d\u043e-\u043f\u0441\u0438\u0445\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043d\u0435\u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c\u044e; \u0441 \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u043c \u0440\u0438\u0441\u043a\u043e\u043c; \u0441 \u043e\u0442\u043a\u043b\u043e\u043d\u044f\u044e\u0449\u0438\u043c\u0441\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435\u043c; \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u043a\u0438 \u0421\u0411\u0414 \u0441 \u043f\u0441\u0438\u0445\u043e\u0442\u0440\u0430\u0432\u043c\u043e\u0439; \u043f\u043e\u0441\u043b\u0435 \u0431\u043e\u043b\u0435\u0437\u043d\u0435\u0439, \u0440\u0430\u043d\u0435\u043d\u0438\u0439, \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u043e\u0432. \u041f\u043e\u0440\u044f\u0434\u043e\u043a \u0440\u0430\u0431\u043e\u0442\u044b: \u0437\u0430\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435, \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430, \u0441\u0438\u0441\u0442\u0435\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0431\u0435\u0441\u0435\u0434\u044b, \u043f\u043e\u043c\u043e\u0449\u044c, \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c. \u041f\u0420\u041e\u0424\u0418\u041b\u0410\u041a\u0422\u0418\u041a\u0410 \u0421\u0423\u0418\u0426\u0418\u0414\u041e\u0412 \u0418 \u041e\u0422\u041a\u041b\u041e\u041d\u042f\u042e\u0429\u0415\u0413\u041e\u0421\u042f \u041f\u041e\u0412\u0415\u0414\u0415\u041d\u0418\u042f \u2014 \u043e\u0431\u0449\u0430\u044f: \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435, \u0441\u043f\u043b\u043e\u0447\u0435\u043d\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430, \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432; \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f: \u043b\u0438\u0446\u0430 \u0433\u0440\u0443\u043f\u043f\u044b \u0440\u0438\u0441\u043a\u0430 \u2014 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0431\u0435\u0441\u0435\u0434\u044b, \u0434\u0438\u0430\u0433\u043d\u043e\u0441\u0442\u0438\u043a\u0430; \u043f\u   31:{keyPoints:["ВИДЫ ПЛАНОВ ВПР: перспективные (ОТО — полугодие; соединение и ТО — квартал); текущие (на месяц); целевые (на конкретную СБЗ, операцию, учение)","В РОТЕ: план ВПР на месяц (по дням); план ВПР на период выполнения задачи","Для карауле более суток — план ВПР; менее суток — индивидуальное задание начальнику","ПЛАН ВПР содержит разделы: мероприятия вышестоящего; мероприятия по направлениям; мероприятия с взаимодействующими органами"],mnemonic:"Планы: Перспект(пол/кв) + Текущий(мес) + Целевой(СБЗ)"},
  32:{keyPoints:["3 ПЕРИОДА ВПР при СБЗ: при подготовке к задаче; в ходе выполнения; по завершении","ОСОБЕННОСТИ ВПР при СБЗ: условия обстановки; условия размещения; укомплектованность СиС ВПР; МППС л/с","При подготовке: уяснение задачи; доведение информации; психологическая подготовка; расстановка сил","В ходе: непрерывное информирование; поддержание дисциплины; психологическая поддержка","По завершении: подведение итогов; реабилитация; разбор действий"],mnemonic:"3 периода при СБЗ: Подготовка-Ходе-Завершение (универсально!)"},
  33:{keyPoints:["ВПР при безопасности военной службы — профилактика травматизма, гибели, суицидов","Основные направления: АПР для здоровой морально-психологической обстановки; профилактика нарушений уставных правил взаимоотношений; работа по суицидальным происшествиям; изучение морально-психологических качеств; координация по страхованию жизни; взаимодействие с прокуратурой","Контроль использования оружия и боеприпасов — обязательный элемент"],mnemonic:"ВПР+безопасность: АПР+неустав+суицид+качества+страхование+прокуратура"},
  34:{keyPoints:["ВПР при выполнении задач боевой службы (карауле) — те же 3 периода: подготовка, в ходе, по завершении","Задачи ВПР в карауле: разъяснение значимости охраны; формирование психологической готовности; всестороннее информирование; развитие наблюдательности и такта","При несении службы >суток — план ВПР | <суток — индивидуальное задание начальнику карауле","Изучение актуального психологического состояния — обязательно перед заступлением"],mnemonic:"Карауле: 3 периода | >суток=план | <суток=инд.задание"},
  35:{keyPoints:["ЗКР по ВПР отвечает: за организацию и состояние ВПР; воспитание, МППС, дисциплину, ВПП и информирование","Подчиняется командиру роты, является прямым начальником всего личного состава роты","Основная форма деятельности — ИНДИВИДУАЛЬНАЯ РАБОТА с каждым военнослужащим","КЛЮЧЕВЫЕ ОБЯЗАННОСТИ: организовывать ВПР; знать каждого военнослужащего; обучать офицеров и сержантов методике ИВР; анализировать дисциплину; проводить ВПП и информирование; подбор актива"],mnemonic:"ЗКР по ВПР: отвечает за всё ВПР в роте | основа — ИВР с каждым"},
  36:{keyPoints:["13 ЭТАПОВ алгоритма ЗКР по ВПР:","1-Уяснение задачи 2-Оценка обстановки 3-Прогнозирование 4-Расчёт времени","5-Предложения командиру 6-Принятие решения 7-Планирование","8-Постановка задач 9-Организация взаимодействия 10-Руководство подготовкой","11-Контроль и помощь 12-Непосредственное руководство 13-Доклад"],mnemonic:"У-О-П-Р / Пр-Рш-Пл-Пз / Вз-Рп-К-Н-Д = 13"},
  37:{keyPoints:["Оценка МПП обстановки — 3 БЛОКА: 1)общественно-политическая, социально-экономическая, оперативная и информационная обстановка 2)МППС личного состава 3)СиС ВПР своих и взаимодействующих","Источники оценки: доклады подчинённых ВП(П)О; данные разведки; анализ СМИ; мониторинг соцсетей; информация от местного населения"],mnemonic:"3 блока оценки: Обстановка-МППС-СиС ВПР"},
  38:{keyPoints:["7 ПУНКТОВ предложений в решение командира:","1)выводы из оценки обстановки 2)цели и задачи ВПР (при подготовке, в ходе, после) 3)мероприятия по направлениям","4)применение СиС ВПР 5)взаимодействие с ВП(П)О 6)обеспечение печатными изданиями и МТС 7)организация управления"],mnemonic:"7 пунктов: Выв-ЦЗ-Мер-СиС-Взаим-Обесп-Управл"},
  39:{keyPoints:["4 ПРИНЦИПА планирования ВПР: научность; комплексный подход; конкретность и объективность; дифференцированный подход","ПЛАН ВПР В РОТЕ включает разделы: мероприятия ВПР старшего начальника; мероприятия по направлениям ВПР; мероприятия с взаимодействующими органами","Планирование — на все 3 периода: при подготовке, в ходе, по завершении СБЗ"],mnemonic:"4 принципа: НК-КД | 3 раздела плана | 3 периода"},
  40:{keyPoints:["Подготовка руководителя к занятию — не позднее чем за 3 дня до занятия","Этапы подготовки: уяснение темы и вопросов; изучение руководящих документов; изучение литературы; составление план-конспекта; подготовка средств обучения; самоподготовка","Методические приёмы: использование слайдов, видеофрагментов, карт, схем; привлечение помощников; постановка проблемных вопросов"],mnemonic:"Подготовка к ВПП: за 3 дня | этапы: Уясн-Изуч-Литер-ПК-Средства"},
  41:{keyPoints:["ПЛАН-КОНСПЕКТ = ПРЕАМБУЛА + 3 ЧАСТИ (вступительная, основная, заключительная)","ПРЕАМБУЛА: тема и учебные вопросы; учебные и воспитательные цели; место и форма занятия; распределение времени; литература","ОСНОВНАЯ ЧАСТЬ: порядок использования информационно-демонстрационных материалов; структурно-логическое распределение; выводы; контрольные вопросы","Воспитательные цели — обязательный элемент план-конспекта"],mnemonic:"ПК = Преамбула + Вступит + Основная + Заключит"},
  42:{keyPoints:["Проведение занятия по ВПП — 3 части: вводная, основная, заключительная","ВВОДНАЯ: приём доклада; проверка л/с; доведение темы, целей, вопросов, актуальности, литературы; текущий контроль","ОСНОВНАЯ: название вопроса; раскрытие актуальности; содержание; методические приёмы (опрос, карты, обратная связь, закрепление)","ЗАКЛЮЧИТЕЛЬНАЯ: подведение итогов; объявление оценок; задание на самостоятельную подготовку"],mnemonic:"3 части занятия: Ввод-Осн-Заключ | Ввод = доклад+проверка+доведение"},
  43:{keyPoints:["ОЦЕНКА на занятии по ВПП — те же пороги: ≥90% отл | ≥80% хор | ≥70% удовл | <70% неудовл","Дисциплинарное взыскание → снижение оценки на 1 балл","Оценка дисциплины «неудовл.» → оценка по ВПП = «неудовл.»","Оценка РУКОВОДИТЕЛЯ учебной группы не выше оценки его группы"],mnemonic:"90/80/70% → всё то же самое, что и в вопросе 8"},
  44:{keyPoints:["Документирование ИВР: составление списка л/с по категориям; планирование ИВР; учёт результатов в карте ИВР","Планирование ИВР: батальон — на месяц; управление полка и соединения — на квартал","ПЕРИОДИЧНОСТЬ: командиры отделений — постоянно (еженедельный доклад); взводов и ЗКР с солдатами — 1 раз/мес; ротные с прапорщиками/сержантами — 1 раз/квартал","С вновь принятыми по контракту — ≥1 раз/мес в первый год; с нарушителями — в течение 3 дней после расследования"],mnemonic:"Отд=еженед | Вз/ЗКР=1/мес | Рота=1/кв | Контракт1г=1/мес | Нарушит=3дня"},
  45:{keyPoints:["СТРУКТУРА ЛЮБОЙ БЕСЕДЫ — 4 части (одинаковы для всех видов):","1.ПОДГОТОВИТЕЛЬНАЯ: изучить личность (интересы, взгляды, характер, семья, здоровье), определить задачи и результат","2.ВВОДНАЯ: снять напряжение и настороженность (назвать по имени, сказать тёплые слова, спросить о делах)","3.ОСНОВНОЙ ЭТАП: активный диалог (открытые вопросы → конкретные), убедить, повлиять","4.ЗАВЕРШАЮЩАЯ ФАЗА: создать хорошее впечатление, выразить признательность, сохранить готовность к работе"],mnemonic:"4 части: П-В-О-З (Подготовка-Вводная-Основной-Завершение)"},
  46:{keyPoints:["Ознакомительная беседа — ЦЕЛЬ: познакомиться, установить первичный контакт","Задачи: лично познакомиться; разъяснить варианты должного поведения в коллективе; раскрыть ценностные ориентиры коллектива; пропагандировать позитивные примеры СБД","Структура — стандартная 4-частная (подготовит→вводная→основной→завершение)","Проводится при поступлении на службу, переводе, возвращении из отпуска/лечения"],mnemonic:"Ознакомит = познакомиться + ориентиры коллектива + примеры | та же 4-частная структура"},
  47:{keyPoints:["Поддерживающая беседа — ЦЕЛЬ: поддержать, стимулировать профессиональный рост","Задачи: формировать профессионально важные качества путём обсуждения перспектив роста; опираться на положительное; применять методы поощрения и стимулирования","Проводится с добросовестными военнослужащими, отличниками службы, активистами","Методы: поощрение, одобрение, пример, перспектива роста"],mnemonic:"Поддержив = опора на позитив + поощрение + перспективы роста"},
  48:{keyPoints:["Корректирующая беседа — ЦЕЛЬ: исправить поведение, преодолеть трудности","Задачи: предложить варианты преодоления сложностей; раскрыть возможности по исправлению поведения; убедить в необходимости изменений","Методы: убеждение, критика действий и поступков (НЕ личности!), конструктивное предложение","Проводится при нарушении норм, снижении показателей, конфликтах"],mnemonic:"Корректир = убеждение + критика поступков (не личности) + варианты исправления"},
  49:{keyPoints:["Предупредительная беседа — ЦЕЛЬ: предупредить о последствиях, принудить к исправлению","Задачи: предупредить об ответственности за нарушение требований; обратить внимание на неотвратимость наказания; принудить к выполнению требований даже если не готов принять нормы","Методы: принуждение, указание на неотвратимость ответственности","Проводится при риске совершения нарушения, систематических отклонениях"],mnemonic:"Предупредит = ответственность + неотвратимость + принуждение"},
  50:{keyPoints:["Методика ВП(П) информирования — 6 БЛОКОВ:","1)Наиболее значимая (резонансная) информация 2)Общественно-политическая и социально-экономическая обстановка за рубежом 3)Наиболее значимые события в стране 4)Сводка СВО 5)Наиболее значимые события в Росгвардии 6)Наиболее значимые события в части (подразделении)","Требования к источникам: только легальные; информация объективная и достоверная"],mnemonic:"6 блоков: Резонанс-Зарубеж-Страна-СВО-Росгвардия-Часть"},
  51:{keyPoints:["Стенная газета — не реже 1 раза/мес (формат А1, 4–5 заметок)","Фотогазета — не реже 1 раза/2 мес","Информационно-справочный бюллетень — не реже 1 раза/квартал","Боевые листки (взводные) — не реже 1 раза/нед (в карауле — не менее 1 раза за службу), формат А3-А4, 2–3 заметки","Радиогазета воинской части — не реже 1 раза/мес","Разрешение: стенгазета — ЗКР по ВПР; боевой листок — командир взвода"],mnemonic:"Стенгаз=1/мес А1 | Фото=1/2мес | Бюлл=1/кв | Боевой л=1/нед(А3) | Радио=1/мес"},
  52:{keyPoints:["ПОРЯДОК ДЕЙСТВИЙ при обнаружении правонарушения: 1)пресечь нарушение 2)доложить командиру 3)провести разбирательство","РАЗБИРАТЕЛЬСТВО устанавливает: событие проступка; вину, форму, мотивы; данные о личности; вредные последствия; смягчающие/отягчающие обстоятельства; причины и условия","Проводит непосредственный командир или назначенное лицо ≥ воинским званием нарушителя"],mnemonic:"Правонаруш: Пресечь→Доложить→Разбирательство | устанавливает 6 элементов"},
  53:{keyPoints:["Подведение итогов дисциплины в роте — ежемесячно","Перед подготовкой — сверка с ВП(П)Р части","ДОКЛАД включает: общее состояние дисциплины с нарастающим итогом; безопасность военной службы; административная ответственность; взводы с улучшением/ухудшением; поощрения; задачи на следующий период","Форма доклада — письменная с нарастающим итогом за период"],mnemonic:"Итоги дисципл роты: сверка→доклад (Общ-Безоп-Адм-Взводы-Поощр-Задачи)"},
  54:{keyPoints:["РАЗБИРАТЕЛЬСТВО по дисциплинарному проступку — проводит непосредственный командир или назначенное лицо","Устанавливается: событие; лицо; вина + форма + мотивы; данные о личности; вредные последствия; смягчающие/отягчающие; характер участия; причины и условия","Командир вправе наказать СВОЕЙ ВЛАСТЬЮ или в течение 10 СУТОК передать вышестоящему","Материалы грубого проступка — только в письменном виде"],mnemonic:"Разбирательство: 8 элементов | 10 суток на передачу вышестоящему"},
  55:{keyPoints:["ЗАСЛУШИВАНИЕ: солдаты — общие собрания; сержанты — собрания сержантов; прапорщики — собрания прапорщиков; офицеры — офицерские собрания","4 МЕРЫ общественного воздействия: 1)общественное порицание 2)указание коллектива на недопустимость поведения 3)общественный выговор 4)ходатайство о строгой ответственности","Меры общественного воздействия — НЕ являются дисциплинарными взысканиями"],mnemonic:"4 категории собраний | 4 меры воздействия: Пор-Ук-Выг-Хода"},
  56:{keyPoints:["Индивидуальная оценка: «Отл.»=нет проступков; «Хор.»=1 взыскание; «Удовл.»=≤2 взысканий; «Неудовл.»=преступление/грубый проступок/происшествие","Подразделение (отделение): «Отл.»=>50% «отл.», нет преступлений; «Хор.»=≤30% «удовл.»; «Удовл.»=≤30% «неудовл.»","Рота/взвод: «Отл.»=>50% подразделений «отл.»; «Хор.»=≤30% «удовл.»; «Удовл.»=≤30% «неудовл.», ≤1 преступления, нет гибели","«Неудовл.»=не выполнены условия или сокрытие преступления"],mnemonic:"Инд: 0/1/≤2/грубый | Подр: >50%отл | Рота: >50% подр «отл»"},
  57:{keyPoints:["Неуставные взаимоотношения — профилактика через комплекс мер","ФОРМЫ профилактики: ИВР; общие собрания; наставничество; доведение приговоров военных судов; работа с сержантами (ключевое звено!); работа с родственниками; СМИ и стенная печать; документальные фильмы; правовые информации; медосмотры; психологические обследования","Сержанты — основное звено профилактики неуставных взаимоотношений"],mnemonic:"Профилакт.неустав: ИВР+собрания+наставничество+сержанты+родственники+медосм"},
  58:{keyPoints:["ДТП профилактика — система мер по снижению дорожно-транспортного травматизма","ФОРМЫ: индивидуальная беседа; групповая беседа; информирование о последствиях ДТП; смотр личного автотранспорта; рассмотрение на аттестационной комиссии (при ≥3 административных нарушениях); доведение обзоров об осуждении виновных","При ≥3 административных нарушениях ПДД — обязательное рассмотрение на аттестационной комиссии"],mnemonic:"ДТП профил: инд+групп+инфо+смотр+аттестация(≥3нарушен)+обзоры"},
  59:{keyPoints:["Профилактика экстремизма — 3 ЭТАПА: при поступлении на службу; в период ввода в строй; в период прохождения службы","ОСНОВНЫЕ НАПРАВЛЕНИЯ: патриотическое воспитание; перекрытие каналов проникновения экстремистских идей; выявление носителей деструктивных взглядов; информационное противодействие; правовое воспитание (ФЗ-114, ФЗ-125)","Экстремизм = деятельность по насильственному изменению конституционного строя, разжигание ненависти"],mnemonic:"3 этапа: Поступл-ВводВСтрой-Служба | 5 направлений профилактики"},

  "ps5":{keyPoints:["Изучение социально-психологических процессов: морально-психологический климат; структура межличностных отношений; лидерство (формальное и неформальное); микрогруппы; уровень доверия и сплочённости; конфликтные зоны","Методы: наблюдение; беседы; социометрия; анкетирование; экспертные оценки; анализ дисциплинарной практики","Результат: диагностическое заключение; рекомендации командиру и ЗКР по ВПР"],mnemonic:"Соц-псих процессы: климат+лидерство+микрогруппы+конфликты | методы+рекомендации"},
  "ps6":{keyPoints:["Психологическое сопровождение СБД — 3 ЭТАПА:","При ПОДГОТОВКЕ: изучение МППС; оценка актуальных состояний; участие в психологической подготовке; консультирование командиров","В ХОДЕ: мониторинг; выявление признаков истощения; оказание психологической помощи","ПОСЛЕ: оценка последствий; реабилитационные мероприятия; подготовка выводов"],mnemonic:"Сопровожд.СБД: Подготовка(мониторинг+подготовка) → Ходе(выявление+помощь) → После(реабилит)"},
  "ps7":{keyPoints:["Работа в ПВД — деятельность: изучение МППС и актуальных состояний; выявление лиц с психотравмой; наблюдение, беседы, экспресс-диагностика; консультирование; психологическая разгрузка; подготовка предложений командиру","Взаимодействие: с командованием; ЗКР по ВПР; медработниками; другими психологами","Особенности ПВД: повышенная нагрузка; ограниченные условия; высокая интенсивность стресса"],mnemonic:"ПВД: изучение+выявление+диагностика+консульт+разгрузка | взаимодействие с командованием"},
  "ps8":{keyPoints:["ГРУППА ПСИХОЛОГО-ПЕДАГОГИЧЕСКОГО ВНИМАНИЯ (ГППВ) — включаются:","с трудностями адаптации; с нервно-психической неустойчивостью; переживающие психотравмирующие обстоятельства; склонные к отклоняющемуся поведению; с суицидальным риском; участники СБД с психотравмой; после болезней/ранений/проступков","Порядок работы: психологическое заключение → информирование командира → систематическое наблюдение → беседы → помощь → контроль"],mnemonic:"ГППВ: 7 категорий включения | порядок: Заключ→Инф→Набл→Беседы→Помощь→Контроль"},
  "ps9":{keyPoints:["Общая профилактика отклоняющегося поведения: просвещение; сплочение коллектива; предупреждение конфликтов; здоровый режим; работа с факторами риска","Индивидуальная профилактика (лица группы риска): наблюдение; беседы; диагностика; консультирование; ИВР","При суицидальной УГРОЗЕ: не оставить одного → исключить доступ к оружию/лекарствам → постоянное наблюдение → медицинская помощь → кризисное вмешательство"],mnemonic:"Профилакт: Общая(просвещ+сплочен) | Индив(набл+беседа+диагн) | Угроза: не оставлять"},
  "ps10":{keyPoints:["ПСИХОЛОГИЧЕСКАЯ ПОМОЩЬ: консультирование; кризисное вмешательство; поддержка; краткосрочная коррекция; групповые формы","6 ПРИНЦИПОВ помощи: добровольность; конфиденциальность; гуманность; научная обоснованность; адресность; своевременность","РЕАБИЛИТАЦИЯ: снижение стрессовых реакций; восстановление саморегуляции; нормализация состояния; восстановление сна и работоспособности; преодоление вины и страха"],mnemonic:"6 принципов помощи: Добр-Конф-Гум-НаучОбосн-Адр-Своевр | реабилит: снижение+восстановление"},
  "ps12":{keyPoints:["ИПВ на личный состав — целенаправленное влияние на сознание, эмоции, установки, мотивацию и поведение","СРЕДСТВА: СМИ, интернет, соцсети, мессенджеры, радио/ТВ, листовки, слухи, телефонные звонки, визуальные демонстрации","МЕТОДЫ: убеждение, внушение, эмоциональное заражение, манипулирование, дезинформация, устрашение, провокация","Защита: правдивое информирование + критическое мышление + сплочённость коллектива + психологическая подготовка"],mnemonic:"ИПВ: Средства(СМИ+сети+листовки) | Методы(убежд+внушен+манипул) | Защита(инфо+критика+коллект)"},
  "ps13":{keyPoints:["СПП изучение — получение и анализ данных о межличностных отношениях, климате, лидерстве, сплочённости, конфликтности","Объекты: морально-психологический климат; структура межличностных отношений; лидерство; микрогруппы; конфликтные зоны","МЕТОДЫ: наблюдение; беседы; социометрия; анкетирование; экспертные оценки; анализ документов и дисциплинарной практики","Результат: диагностическое заключение + рекомендации командиру по укреплению коллектива"],mnemonic:"СПП: объекты(климат+лидерство+микрогр) | методы(набл+социом+экспертиза) | рекомендации"},
  "ps14":{keyPoints:["Профессиональный психологический отбор — система оценки пригодности к конкретным видам военно-профессиональной деятельности","Этапы: определение требований → выбор методик → изучение кандидатов → обработка результатов → заключение о пригодности","Оцениваются: интеллект, НПУ, мотивация, коммуникативные и волевые качества, склонность к риску, адаптационный потенциал, дисциплинированность","Принципы: научная обоснованность; прогностичность; комплексность; объективность; валидность методик; индивидуальный подход"],mnemonic:"Отбор: требования→методики→изучение→заключение | принципы: НаучПрогнКомпл"},
  "ps15":{keyPoints:["Психодиагностическое изучение субъектов СБД — оценка профессионально важных качеств, актуальных состояний, надёжности и готовности к задачам","Объекты: личностные свойства; мотивация; когнитивные процессы; эмоционально-волевая устойчивость; коммуникативные качества; саморегуляция","Виды: плановое; целевое; углублённое; экспресс-диагностика перед задачей","Результат: психологическое заключение с выводом о надёжности, факторами риска и рекомендациями"],mnemonic:"Психодиагн субъектов СБД: качества+состояния+надёжность | виды: план/целев/углубл/экспресс"},
  "ps16":{keyPoints:["Мотивы служения — устойчивые внутренние побуждения к выполнению служебного долга, основанные на осознании его значимости","Основные мотивы: патриотические, нравственные (долг, честь), профессиональные, коллективистские, статусные, материальные","Прочную основу надёжности составляют мотивы высшего порядка: защита Отечества, верность присяге, ответственность за товарищей","Формирование: воспитание + личный пример командиров + раскрытие значимости службы + боевые традиции + справедливое отношение"],mnemonic:"Мотивы служения: высшие(патриотизм+долг+честь) > внешние(деньги+контроль) | формирование через воспитание"},
  "ps17":{keyPoints:["Психологическая профилактика — система мер по предупреждению неблагоприятных психических состояний, дезадаптации, суицидальных и иных происшествий","ОБЩАЯ: весь личный состав → просвещение, сплочение, снижение стресса, здоровый режим","ИНДИВИДУАЛЬНАЯ: лица группы риска → наблюдение, беседы, диагностика, консультирование, ограничение нагрузок","Принципы: упреждающий характер; системность; адресность; комплексность; взаимодействие с командованием и медицинской службой"],mnemonic:"Профилакт: Общая(весь л/с) + Индивид(группа риска) | принципы: упрежд+систем+адресн"},
  "ps18":{keyPoints:["Обязанности психолога ВЧ: изучение, диагностика, мониторинг л/с; участие в отборе; выявление ГППВ; заключения и рекомендации командирам","Психологическое сопровождение СБД; оценка МПС; предупреждение суицидов и отклоняющегося поведения; помощь и реабилитация","Консультирование командиров, ЗКР по ВПР, военнослужащих и членов семей; психологическое просвещение; обучение саморегуляции","Документирование + конфиденциальность + профессиональная этика + научная обоснованность методов"],mnemonic:"Психолог ВЧ: изуч+диагн+монит+сопровожд+консульт+просвещ+документ | этика+конфид"},
  "ps19":{keyPoints:["Подготовка к ООП — формирование готовности уверенно, законно и устойчиво действовать при охране общественного порядка","СПЕЦИФИКА: прямой контакт с гражданами; эмоциональное заражение толпы; провокации, оскорбления, угрозы; правовые ограничения","Основные задачи: понимание психологии толпы; устойчивость к давлению; выдержка; уверенность в законности; саморегуляция; слаженность","Ключевой принцип: реалистичность — тренировки в условиях шума, давления, физического контакта"],mnemonic:"ООП-подготовка: толпа+провокации+правосознание | выдержка+самообладание | реалистичность"},
  "ps20":{keyPoints:["Взаимодействие психолога и ЗКР по ВПР — единство целей, обмен информацией, согласованность мероприятий, совместная ответственность за МПС","НАПРАВЛЕНИЯ: совместное планирование; работа с ГППВ; адаптация пополнения; профилактика конфликтов и суицидов; подготовка к СБЗ и реабилитация","Психолог передаёт: состояние коллектива, факторы риска, особенности отношений, рекомендации по индивидуальному подходу","ЗКР по ВПР передаёт: дисциплинарную практику, МПО, настроения, конфликты, поведение военнослужащих"],mnemonic:"Психолог↔ЗКР: единые цели | обмен инфо | совместные мероприятия | взаимодополняют друг друга"},
  "ps21":{keyPoints:["Психологическое заключение — официальный аналитический документ с выводом об особенностях и рекомендациями по служебному использованию","СТРУКТУРА: цель → краткие данные → методы → результаты по ключевым сферам → итоговый вывод → рекомендации","Сферы оценки: мотивация; интеллект; эмоционально-волевая устойчивость; коммуникативные качества; саморегуляция; адаптационный потенциал; факторы риска","Принципы: объективность; научная обоснованность; конфиденциальность; прогностичность; практическая полезность; понятность"],mnemonic:"Заключение: цель→данные→методы→результаты→ВЫВОД→рекомендации | принципы: ОНК-ПП"},
  "ps22":{keyPoints:["Психологическая реабилитация — восстановление психических функций, эмоционального равновесия и работоспособности после психотравмирующих факторов СБД","Показания: участие в интенсивных боевых действиях; потеря товарищей; ранения; длительное переутомление; острые стрессовые реакции","Содержание: диагностика → индивидуальные и групповые беседы → саморегуляция → психологическая разгрузка → нормализация режима → восстановление социальных связей","Принципы: своевременность; адресность; комплексность; преемственность; этапность; уважение к пережитому опыту"],mnemonic:"Реабилитация: диагн+беседы+разгрузка+режим+связи | принципы: своеврем+адресн+этапность"},
  "ps23":{keyPoints:["Служебно-профессиональная деятельность психолога — прикладная система профессиональных действий для психологического обеспечения л/с","Составляющие (8): организационно-методическая; диагностическая; прогностическая; консультативная; профилактическая; коррекционная; просветительская; реабилитационная","Специфика: сочетание научной компетентности с пониманием требований военной службы, регламентированности и ответственности за рекомендации","Эффективность: подготовленность + доверие + объективность + конфиденциальность + взаимодействие + умение работать в условиях стресса"],mnemonic:"Деят-ть психолога: 8 составляющих (ОМ-Д-Пр-К-Пр-Кор-Просв-Реаб) | специфика: наука+служба"},
  "ps24":{keyPoints:["Методы изучения социально-психологических качеств кандидатов: анализ документов; биографический метод; наблюдение; беседа; анкетирование; тестирование; экспертная оценка","АНАЛИЗ ДОКУМЕНТОВ: жизненный путь, стабильность поведения, факты нарушений, социальные риски","БЕСЕДА: мотивы поступления; отношение к дисциплине, коллективу, подчинению; самооценка; культура общения","ТЕСТИРОВАНИЕ: коммуникативность, социальная адаптация, тревожность, агрессивность, самоконтроль, склонность к девиантному поведению"],mnemonic:"Методы изуч.кандидата: 7 методов | ключевые: Докум+Беседа+Тест+Экспертиза"},
  "ps25":{keyPoints:["Диагностика когнитивных процессов — оценка восприятия, внимания, памяти, мышления, скорости переработки информации","ВНИМАНИЕ: объём, устойчивость, концентрация, переключаемость, распределение → корректурные пробы, таблицы Шульте","ПАМЯТЬ: объём, прочность, точность → слухоречевая, зрительная, оперативная","МЫШЛЕНИЕ: анализ, обобщение, логика, прогнозирование, гибкость, скорость → способность оценивать обстановку и выбирать действие","Применение: профотбор; расстановка; причины ошибок; рекомендации по подготовке"],mnemonic:"Когнит: Внимание(объём+устойч+переключ) | Память(слух+зрит+опер) | Мышление(анализ+прогноз)"},
  "ps26":{keyPoints:["Позитивное разрешение конфликтов — не только пресечение, но и выявление причин и помощь в нахождении решения","ОСНОВНЫЕ СПОСОБЫ: раннее выявление напряжённости; индивидуальные и совместные беседы; разъяснение норм; посредничество; взаимное выслушивание; поиск общих интересов","Управленческие действия: справедливость; единообразие требований; исключение фаворитизма; объективный разбор; коррекция организационных причин","В многонациональных коллективах: уважение нацдостоинства; единообразие требований; опора на общие воинские ценности"],mnemonic:"Позитивн.разреш: Раннее выявл+Беседы+Посредн+Справедл | многонац: нацдостоинство+единообразие"},
