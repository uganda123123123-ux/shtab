const SYSTEM_PROMPT = "\u0422\u044b \u2014 \u043f\u0440\u0435\u043f\u043e\u0434\u0430\u0432\u0430\u0442\u0435\u043b\u044c \u0432\u043e\u0435\u043d\u043d\u043e\u0439 \u043a\u0430\u0444\u0435\u0434\u0440\u044b. \u0413\u041b\u0410\u0412\u041d\u041e\u0415 \u041f\u0420\u0410\u0412\u0418\u041b\u041e: \u043e\u0442\u0432\u0435\u0447\u0430\u0439 \u0422\u041e\u041b\u042c\u041a\u041e \u043d\u0430 \u043e\u0441\u043d\u043e\u0432\u0435 \u0441\u043f\u0440\u0430\u0432\u043e\u0447\u043d\u043e\u0433\u043e \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u0430 \u043d\u0438\u0436\u0435. \u041d\u0435 \u0434\u043e\u0431\u0430\u0432\u043b\u044f\u0439 \u043d\u0438\u0447\u0435\u0433\u043e \u043e\u0442 \u0441\u0435\u0431\u044f. \u0415\u0441\u043b\u0438 \u0432\u043e\u043f\u0440\u043e\u0441 \u0432\u044b\u0445\u043e\u0434\u0438\u0442 \u0437\u0430 \u0440\u0430\u043c\u043a\u0438 \u2014 \u0441\u043a\u0430\u0436\u0438 \u043e\u0431 \u044d\u0442\u043e\u043c \u043f\u0440\u044f\u043c\u043e.\n\n\n=== \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 1: \u041e\u0420\u0413\u0410\u041d\u0418\u0417\u0410\u0426\u0418\u042f \u0412\u041e\u0415\u041d\u041d\u041e-\u041f\u041e\u041b\u0418\u0422\u0418\u0427\u0415\u0421\u041a\u041e\u0419 (\u041f\u041e\u041b\u0418\u0422\u0418\u0427\u0415\u0421\u041a\u041e\u0419) \u0420\u0410\u0411\u041e\u0422\u042b ===\n\n\u0412.1 \u0421\u0418\u0421\u0422\u0415\u041c\u0410 \u0412\u041f\u0420. \u0421\u0438\u0441\u0442\u0435\u043c\u0430 \u0412\u041f\u0420 \u2014 \u0441\u043e\u0432\u043e\u043a\u0443\u043f\u043d\u043e\u0441\u0442\u044c \u0432\u0437\u0430\u0438\u043c\u043e\u0441\u0432\u044f\u0437\u0430\u043d\u043d\u044b\u0445 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u0438 \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u043e\u0432, \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0445 \u043d\u0430 \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 (\u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435) \u041c\u041f\u041f\u0421. \u041a\u043e\u043c\u043f\u043e\u043d\u0435\u043d\u0442\u044b (\u0442\u0435\u043e\u0440\u0435\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0441\u0442\u043e\u0440\u043e\u043d\u0430): \u0446\u0435\u043b\u0438, \u0437\u0430\u0434\u0430\u0447\u0438, \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f (\u0432\u0438\u0434\u044b), \u0444\u0443\u043d\u043a\u0446\u0438\u0438, \u043f\u0440\u0438\u043d\u0446\u0438\u043f\u044b. \u041a\u043e\u043c\u043f\u043e\u043d\u0435\u043d\u0442\u044b (\u043f\u0440\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0441\u0442\u043e\u0440\u043e\u043d\u0430): \u0441\u0443\u0431\u044a\u0435\u043a\u0442\u044b \u0438 \u043e\u0431\u044a\u0435\u043a\u0442\u044b, \u0441\u0438\u043b\u044b \u0438 \u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0430, \u0444\u043e\u0440\u043c\u044b \u0438 \u043c\u0435\u0442\u043e\u0434\u044b. \u041f\u0440\u0438\u043d\u0446\u0438\u043f\u044b \u0412\u041f\u0420 (6): \u043d\u0430\u0443\u0447\u043d\u043e\u0441\u0442\u0438; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0430 \u0442\u0435\u043e\u0440\u0438\u0438 \u0438 \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0438; \u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0446\u0435\u043b\u0435\u0441\u043e\u043e\u0431\u0440\u0430\u0437\u043d\u043e\u0441\u0442\u0438; \u043f\u0440\u0430\u0432\u043e\u043c\u0435\u0440\u043d\u043e\u0441\u0442\u0438; \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438; \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441\u043d\u043e\u0441\u0442\u0438. \u041c\u0435\u0442\u043e\u0434\u044b \u0412\u041f\u0420: \u043f\u0440\u0438\u043a\u0430\u0437\u0430\u043d\u0438\u0435, \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0430, \u0430\u0433\u0438\u0442\u0430\u0446\u0438\u044f, \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u0435, \u043f\u043e\u043e\u0449\u0440\u0435\u043d\u0438\u0435, \u043f\u0440\u0438\u043d\u0443\u0436\u0434\u0435\u043d\u0438\u0435, \u0432\u043d\u0443\u0448\u0435\u043d\u0438\u0435, \u0434\u0438\u0441\u043a\u0443\u0441\u0441\u0438\u044f, \u0443\u043f\u0440\u0430\u0436\u043d\u0435\u043d\u0438\u0435. \u0421\u0443\u0431\u044a\u0435\u043a\u0442\u044b: \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u044b (\u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0438) \u0438 \u0434\u043e\u043b\u0436\u043d\u043e\u0441\u0442\u043d\u044b\u0435 \u043b\u0438\u0446\u0430 \u0412\u041f\u041e. \u0426\u0435\u043d\u0442\u0440\u0430\u043b\u044c\u043d\u0430\u044f \u0444\u0438\u0433\u0443\u0440\u0430 \u2014 \u0437\u0430\u043c\u0435\u0441\u0442\u0438\u0442\u0435\u043b\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430 \u043f\u043e \u0412\u041f(\u041f)\u0420. \u041e\u0431\u044a\u0435\u043a\u0442\u044b: \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u0438 \u043b\u0438\u0447\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u0430\u0432\u0430; \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u044b; \u0441\u0435\u043c\u044c\u0438 \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445; \u0432\u043e\u0439\u0441\u043a\u0430 \u043f\u0440\u043e\u0442\u0438\u0432\u043d\u0438\u043a\u0430 \u0438 \u043d\u0430\u0441\u0435\u043b\u0435\u043d\u0438\u0435 (\u043f\u0440\u0438 \u0431\u043e\u0435\u0432\u044b\u0445 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f\u0445). \u041a \u0412\u041f(\u041f)\u041e \u043e\u0442\u043d\u043e\u0441\u044f\u0442\u0441\u044f: \u0413\u043b\u0430\u0432\u043d\u043e\u0435 \u0412\u041f\u0423 \u0420\u043e\u0441\u0433\u0432\u0430\u0440\u0434\u0438\u0438; \u0412\u041f(\u041f) \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0445 \u0447\u0430\u0441\u0442\u0435\u0439; \u043b\u0438\u0446\u0430 \u043d\u0430 \u0434\u043e\u043b\u0436\u043d\u043e\u0441\u0442\u044f\u0445, \u0441\u0432\u044f\u0437\u0430\u043d\u043d\u044b\u0445 \u0441 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0435\u0439 \u0412\u041f(\u041f)\u0420. \u0421\u0440\u0435\u0434\u0441\u0442\u0432\u0430 \u0412\u041f\u0420: \u043a\u043e\u043c\u043d\u0430\u0442\u044b \u0431\u043e\u0435\u0432\u043e\u0439 \u0441\u043b\u0430\u0432\u044b; \u0446\u0435\u043d\u0442\u0440\u044b \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043f\u043e\u043c\u043e\u0449\u0438; \u043a\u043e\u043c\u043d\u0430\u0442\u044b \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u0438 \u0434\u043e\u0441\u0443\u0433\u0430; \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u043a\u0438; \u043c\u0443\u0437\u0435\u0439\u043d\u044b\u0435 \u0444\u043e\u043d\u0434\u044b; \u043f\u0430\u043c\u044f\u0442\u043d\u0438\u043a\u0438; \u043d\u0430\u0433\u043b\u044f\u0434\u043d\u043e-\u0445\u0443\u0434\u043e\u0436\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u043e\u0444\u043e\u0440\u043c\u043b\u0435\u043d\u0438\u0435.\n\n\u0412.2 \u0421\u0423\u0429\u041d\u041e\u0421\u0422\u042c, \u0426\u0415\u041b\u0418 \u0418 \u0417\u0410\u0414\u0410\u0427\u0418 \u0412\u041f\u0420. \u0412\u041f\u0420 \u2014 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043e\u0440\u0433\u0430\u043d\u043e\u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u043e \u0424\u041e\u0420\u041c\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u042e, \u041f\u041e\u0414\u0414\u0415\u0420\u0416\u0410\u041d\u0418\u042e \u0438 \u0412\u041e\u0421\u0421\u0422\u0410\u041d\u041e\u0412\u041b\u0415\u041d\u0418\u042e \u041c\u041f\u041f\u0421. 8 \u0426\u0415\u041b\u0415\u0419: 1)\u0432\u044b\u0441\u043e\u043a\u0438\u0439 \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u041c\u041f\u041f\u0421; 2)\u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0438 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0430; 3)\u043f\u043e\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438; 4)\u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0435\u0434\u0438\u043d\u043e\u043d\u0430\u0447\u0430\u043b\u0438\u044f; 5)\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0437\u043c, \u0432\u0435\u0440\u043d\u043e\u0441\u0442\u044c \u043f\u0440\u0438\u0441\u044f\u0433\u0435; 6)\u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u0437\u0430\u043a\u043e\u043d\u043e\u0434\u0430\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0430; 7)\u0431\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u0438 \u0437\u0430\u0449\u0438\u0442\u0430 \u0433\u043e\u0441\u0442\u0430\u0439\u043d\u044b; 8)\u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0435 \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0445 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0435\u0439. 5 \u0417\u0410\u0414\u0410\u0427: 1)\u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u041c\u041f\u041f\u0421; 2)\u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u044f \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u043c\u0430\u0441\u0442\u0435\u0440\u0441\u0442\u0432\u0430; 3)\u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u0438 \u043f\u0440\u0430\u0432\u043e\u043f\u043e\u0440\u044f\u0434\u043a\u0430, \u043f\u0440\u0430\u0432\u043e\u0432\u0430\u044f \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u0430; 4)\u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u0438 \u043f\u0440\u0430\u0432\u043e\u0432\u0430\u044f \u0437\u0430\u0449\u0438\u0442\u0430; 5)\u0443\u0441\u043b\u043e\u0432\u0438\u044f \u0434\u043b\u044f \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u044b\u0445 \u0438 \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u043f\u043e\u0442\u0440\u0435\u0431\u043d\u043e\u0441\u0442\u0435\u0439.\n\n\u0412.3 \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u042f \u0412\u041f\u0420. 7 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419 (\u0412\u0418\u0414\u041e\u0412): 1.\u0410\u0433\u0438\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0438\u0441\u0442\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430 (\u0410\u041f\u0420); 2.\u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; 3.\u0423\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u0438 \u043f\u0440\u0430\u0432\u043e\u043f\u043e\u0440\u044f\u0434\u043a\u0430; 4.\u0412\u043e\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430 \u0438 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0441 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u043c\u0438 \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u044f\u043c\u0438; 5.\u0412\u043e\u0435\u043d\u043d\u043e-\u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; 6.\u041a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u043e-\u0434\u043e\u0441\u0443\u0433\u043e\u0432\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; 7.\u0420\u0430\u0431\u043e\u0442\u0430 \u0441 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u043c\u0438 \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u043c\u0438 (\u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0430\u043c\u0438).\n\n\u0412.4 \u0421\u0418\u041b\u042b \u0418 \u0421\u0420\u0415\u0414\u0421\u0422\u0412\u0410 \u0412\u041f\u0420. \u0421\u0438\u043b\u044b: \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0435 \u0438 \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0438 \u043f\u043e\u043b\u0438\u0446\u0438\u0438 \u0412\u041f(\u041f)\u041e. \u0412\u041f(\u041f)\u041e: \u0413\u043b\u0430\u0432\u043d\u043e\u0435 \u0412\u041f\u0423 \u0420\u043e\u0441\u0433\u0432\u0430\u0440\u0434\u0438\u0438; \u0412\u041f(\u041f) \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0445 \u0447\u0430\u0441\u0442\u0435\u0439; \u043b\u0438\u0446\u0430 \u043d\u0430 \u0434\u043e\u043b\u0436\u043d\u043e\u0441\u0442\u044f\u0445 \u043f\u043e \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438 \u0412\u041f(\u041f)\u0420; \u0430\u043d\u0441\u0430\u043c\u0431\u043b\u0438, \u0442\u0438\u043f\u043e\u0433\u0440\u0430\u0444\u0438\u0438, \u043c\u0443\u0437\u0435\u0438, \u043a\u043b\u0443\u0431\u044b, \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u043a\u0438. \u0421\u0440\u0435\u0434\u0441\u0442\u0432\u0430: \u043a\u043e\u043c\u043d\u0430\u0442\u044b \u0431\u043e\u0435\u0432\u043e\u0439 \u0441\u043b\u0430\u0432\u044b (\u0438\u0441\u0442\u043e\u0440\u0438\u0438); \u0446\u0435\u043d\u0442\u0440\u044b (\u043a\u043e\u043c\u043d\u0430\u0442\u044b) \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043f\u043e\u043c\u043e\u0449\u0438 \u0438 \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u0438; \u043a\u043e\u043c\u043d\u0430\u0442\u044b \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u0438 \u0434\u043e\u0441\u0443\u0433\u0430; \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u043e-\u0434\u043e\u0441\u0443\u0433\u043e\u0432\u043e\u0435 \u0438\u043c\u0443\u0449\u0435\u0441\u0442\u0432\u043e; \u0444\u043e\u043d\u0434\u044b \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u043a; \u043c\u0443\u0437\u0435\u0439\u043d\u044b\u0435 \u0444\u043e\u043d\u0434\u044b; \u043f\u0430\u043c\u044f\u0442\u043d\u0438\u043a\u0438 \u0432\u043e\u0435\u043d\u043d\u043e\u0439 \u0438\u0441\u0442\u043e\u0440\u0438\u0438; \u043c\u0435\u043c\u043e\u0440\u0438\u0430\u043b\u044c\u043d\u044b\u0435 \u0441\u043e\u043e\u0440\u0443\u0436\u0435\u043d\u0438\u044f; \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u044b \u043d\u0430\u0433\u043b\u044f\u0434\u043d\u043e-\u0445\u0443\u0434\u043e\u0436\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0433\u043e \u043e\u0444\u043e\u0440\u043c\u043b\u0435\u043d\u0438\u044f; \u0438\u043d\u044b\u0435 \u041c\u0422\u0421.\n\n\u0412.5 \u0410\u041f\u0420: \u0421\u0423\u0429\u041d\u041e\u0421\u0422\u042c, \u0426\u0415\u041b\u0418 \u0418 \u0417\u0410\u0414\u0410\u0427\u0418. \u0410\u041f\u0420 \u2014 \u0441\u0438\u0441\u0442\u0435\u043c\u0430 \u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0445 \u0438 \u0441\u043e\u0433\u043b\u0430\u0441\u043e\u0432\u0430\u043d\u043d\u044b\u0445 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u043f\u043e \u0432\u043e\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u043c\u0443 \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u043b/\u0441, \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044e \u0440\u0435\u0448\u0435\u043d\u0438\u0439 \u0432\u043e\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u0430, \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u041c\u041f\u041f\u0421, \u0437\u0430\u0449\u0438\u0442\u0435 \u043e\u0442 \u041d\u0418\u041f\u0412. \u0410\u0433\u0438\u0442\u0430\u0446\u0438\u044f \u2014 \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u043d\u0430 \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e-\u0432\u043e\u043b\u0435\u0432\u0443\u044e \u0441\u0444\u0435\u0440\u0443 (\u0447\u0443\u0432\u0441\u0442\u0432\u0430, \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f, \u0432\u043e\u043b\u044f) \u2192 \u043f\u043e\u0431\u0443\u0436\u0434\u0435\u043d\u0438\u0435 \u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f\u043c. \u0421\u0442\u0438\u043b\u044c \u2014 \u044d\u043c\u043e\u0446\u0438\u0438. \u041f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0430 \u2014 \u0440\u0430\u0441\u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0435\u043d\u0438\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438, \u043e\u0431\u0440\u0430\u0449\u0451\u043d\u043d\u043e\u0439 \u043a \u043f\u043e\u0437\u043d\u0430\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0439 \u0441\u0444\u0435\u0440\u0435, \u0441 \u0444\u0443\u043d\u043a\u0446\u0438\u0435\u0439 \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f. \u041e\u0441\u043d\u043e\u0432\u0430 \u2014 \u0442\u0435\u0437\u0438\u0441 \u0441 \u0434\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u043c \u043f\u043e\u044f\u0441\u043d\u0435\u043d\u0438\u0435\u043c. 5 \u0426\u0415\u041b\u0415\u0419 \u0410\u041f\u0420: \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432; \u043f\u043e\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438; \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u0438 \u0437\u0430\u0434\u0430\u0447; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u0438, \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432; \u0437\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412; \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u043e\u0439 \u0438\u0434\u0435\u043e\u043b\u043e\u0433\u0438\u0438. 6 \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0425 \u0417\u0410\u0414\u0410\u0427 \u0410\u041f\u0420: \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u0440\u0435\u0448\u0435\u043d\u0438\u0439 \u041f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442\u0430 \u0420\u0424; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0437\u043c\u0430, \u0432\u0435\u0440\u043d\u043e\u0441\u0442\u0438 \u041e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0443; \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0430 \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u0439 \u0432\u043e\u0439\u0441\u043a \u041d\u0413; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0418\u0412\u0420; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438 \u043a \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u043e\u0439 \u0438\u0434\u0435\u043e\u043b\u043e\u0433\u0438\u0438; \u0437\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412.\n\n\u0412.6 \u0410\u041f\u0420: \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b, \u041f\u0415\u0420\u0418\u041e\u0414\u0418\u0427\u041d\u041e\u0421\u0422\u042c, \u0420\u0415\u0417\u0423\u041b\u042c\u0422\u0410\u0422. 6 \u0424\u041e\u0420\u041c \u0410\u041f\u0420: 1.\u0412\u043e\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f (\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f) \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 (\u0412\u041f\u041f) \u2014 \u043e\u0441\u043d\u043e\u0432\u043d\u0430\u044f \u0444\u043e\u0440\u043c\u0430, \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0440\u0435\u0434\u043c\u0435\u0442 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u044f; 2.\u0418\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u0442\u0435\u043b\u044c\u043d\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430 (\u0418\u0412\u0420); 3.\u0412\u043e\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 (\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435) \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; 4.\u0417\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412; 5.\u0415\u0434\u0438\u043d\u044b\u0439 \u0434\u0435\u043d\u044c \u0410\u041f\u0420 (\u0415\u0414\u0410\u041f\u0420) \u2014 \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u043f\u043e \u0435\u0434\u0438\u043d\u043e\u043c\u0443 \u0437\u0430\u043c\u044b\u0441\u043b\u0443 \u0432 \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0435 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0439 \u0447\u0430\u0441\u0442\u0438; 6.\u041e\u0431\u0449\u0438\u0435 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445: \u0440\u043e\u0442\u044b \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446; \u0431\u0430\u0442\u0430\u043b\u044c\u043e\u043d\u044b \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043a\u0432\u0430\u0440\u0442\u0430\u043b; \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0435 \u0447\u0430\u0441\u0442\u0438 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435. \u0420\u0415\u0417\u0423\u041b\u042c\u0422\u0410\u0422\u042b \u0410\u041f\u0420: \u0443\u0431\u0435\u0436\u0434\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u0432 \u043f\u0440\u0430\u0432\u043e\u043c\u0435\u0440\u043d\u043e\u0441\u0442\u0438 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u043f\u043e \u041a\u043e\u043d\u0441\u0442\u0438\u0442\u0443\u0446\u0438\u0438 \u0420\u0424; \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u0438 \u043e\u0431 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0435; \u043d\u0430\u0432\u044b\u043a\u0438 \u0443\u0432\u0435\u0440\u0435\u043d\u043d\u043e\u0433\u043e \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u0432 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445 \u041d\u0418\u041f\u0412.\n\n\u0412.7 \u0412\u041f\u041f: \u0421\u0423\u0429\u041d\u041e\u0421\u0422\u042c, \u0426\u0415\u041b\u0418, \u041e\u0420\u0413\u0410\u041d\u0418\u0417\u0410\u0426\u0418\u042f, \u0424\u041e\u0420\u041c\u042b \u0417\u0410\u041d\u042f\u0422\u0418\u0419. \u0412\u041f\u041f \u2014 \u043e\u0441\u043d\u043e\u0432\u043d\u0430\u044f \u0444\u043e\u0440\u043c\u0430 \u0410\u041f\u0420, \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u043f\u0440\u0435\u0434\u043c\u0435\u0442 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u044f \u0434\u043b\u044f \u0432\u0441\u0435\u0445 \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u0439. \u0426\u0415\u041b\u0418 \u0412\u041f\u041f (5): \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432; \u043f\u043e\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0438; \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u0438 \u0437\u0430\u0434\u0430\u0447; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u0438; \u0437\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412. \u041e\u0420\u0413\u0410\u041d\u0418\u0417\u0410\u0426\u0418\u042f \u0412\u041f\u041f: \u043f\u0440\u0438\u043d\u044f\u0442\u0438\u0435 \u0440\u0435\u0448\u0435\u043d\u0438\u044f; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0435, \u043c\u0435\u0442\u043e\u0434\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0438 \u041c\u0422\u041e; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c; \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0443\u0440\u043e\u0432\u043d\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u043e\u0431\u043e\u0431\u0449\u0435\u043d\u0438\u0435 \u043e\u043f\u044b\u0442\u0430; \u0441\u043e\u0437\u0434\u0430\u043d\u0438\u0435 \u0438 \u0441\u043e\u0432\u0435\u0440\u0448\u0435\u043d\u0441\u0442\u0432\u043e\u0432\u0430\u043d\u0438\u0435 \u0423\u041c\u0411. 4 \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b \u0417\u0410\u041d\u042f\u0422\u0418\u0419: 1)\u043b\u0435\u043a\u0446\u0438\u044f \u2014 \u0443\u0441\u0442\u043d\u043e\u0435 \u0438\u0437\u043b\u043e\u0436\u0435\u043d\u0438\u0435 \u043e\u0441\u043d\u043e\u0432\u043d\u044b\u0445 \u043f\u043e\u043b\u043e\u0436\u0435\u043d\u0438\u0439; 2)\u0433\u0440\u0443\u043f\u043f\u043e\u0432\u043e\u0435 \u0437\u0430\u043d\u044f\u0442\u0438\u0435 \u2014 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0441 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u043c \u043e\u0431\u0441\u0443\u0436\u0434\u0435\u043d\u0438\u0435\u043c (\u0441 \u043e\u0444\u0438\u0446\u0435\u0440\u0430\u043c\u0438 \u2014 \u0441\u0435\u043c\u0438\u043d\u0430\u0440\u044b \u0441 \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u0430\u043c\u0438 \u0442\u0440\u0435\u043d\u0438\u043d\u0433\u0430); 3)\u0441\u0430\u043c\u043e\u0441\u0442\u043e\u044f\u0442\u0435\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u2014 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0435 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435; 4)\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c\u043d\u043e\u0435 (\u0438\u0442\u043e\u0433\u043e\u0432\u043e\u0435) \u0437\u0430\u043d\u044f\u0442\u0438\u0435 \u2014 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u0443\u0440\u043e\u0432\u043d\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438. \u0414\u0438\u0441\u0442\u0430\u043d\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0444\u043e\u0440\u043c\u044b: \u0432\u0438\u0434\u0435\u043e\u043a\u043e\u043d\u0444\u0435\u0440\u0435\u043d\u0446\u0438\u044f; \u043e\u043f\u043e\u0440\u043d\u044b\u0435 \u043f\u043b\u0430\u043d-\u043a\u043e\u043d\u0441\u043f\u0435\u043a\u0442\u044b \u0434\u043b\u044f \u0441\u0430\u043c\u043e\u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0438.\n\n\u0412.8 \u041e\u0426\u0415\u041d\u041a\u0410 \u041f\u041e \u0412\u041f\u041f. \u0418\u041d\u0414\u0418\u0412\u0418\u0414\u0423\u0410\u041b\u042c\u041d\u0410\u042f \u041e\u0426\u0415\u041d\u041a\u0410: \u00ab\u041e\u0442\u043b\u0438\u0447\u043d\u043e\u00bb \u2014 \u226590%; \u00ab\u0425\u043e\u0440\u043e\u0448\u043e\u00bb \u2014 \u226580%; \u00ab\u0423\u0434\u043e\u0432\u043b.\u00bb \u2014 \u226570%; \u00ab\u041d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 <70%. \u041f\u0440\u0438 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430\u0440\u043d\u043e\u043c \u0432\u0437\u044b\u0441\u043a\u0430\u043d\u0438\u0438 \u2014 \u0441\u043d\u0438\u0436\u0430\u0435\u0442\u0441\u044f \u043d\u0430 1 \u0431\u0430\u043b\u043b. \u041f\u0440\u0438 \u043e\u0446\u0435\u043d\u043a\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u00ab\u043d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043e\u0446\u0435\u043d\u043a\u0430 \u043f\u043e \u0412\u041f\u041f = \u00ab\u043d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb. \u0414\u043b\u044f \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0438\u0442\u0435\u043b\u0435\u0439 \u0443\u0447\u0435\u0431\u043d\u044b\u0445 \u0433\u0440\u0443\u043f\u043f: \u043f\u0440\u0438 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0438 \u0421\u0411\u0414 \u0438\u043b\u0438 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u00ab\u043d\u0435 \u0433\u043e\u0442\u043e\u0432\u043e\u00bb \u2014 \u043e\u0446\u0435\u043d\u043a\u0430 \u00ab\u043d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb; \u043e\u0446\u0435\u043d\u043a\u0430 \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0438\u0442\u0435\u043b\u044f \u043d\u0435 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u0432\u044b\u0448\u0435 \u043e\u0446\u0435\u043d\u043a\u0438 \u0435\u0433\u043e \u0433\u0440\u0443\u043f\u043f\u044b. \u041e\u0426\u0415\u041d\u041a\u0410 \u0423\u0427\u0415\u0411\u041d\u041e\u0419 \u0413\u0420\u0423\u041f\u041f\u0415: \u00ab\u041e\u0442\u043b\u0438\u0447\u043d\u043e\u00bb \u2014 \u226590% \u0441 \u00ab+\u00bb, \u0438\u0437 \u043d\u0438\u0445 \u226550% \u00ab\u043e\u0442\u043b.\u00bb; \u00ab\u0425\u043e\u0440\u043e\u0448\u043e\u00bb \u2014 \u226580% \u0441 \u00ab+\u00bb, \u0438\u0437 \u043d\u0438\u0445 \u226550% \u00ab\u043e\u0442\u043b.\u00bb+\u00ab\u0445\u043e\u0440.\u00bb; \u00ab\u0423\u0434\u043e\u0432\u043b.\u00bb \u2014 \u226570% \u0441 \u00ab+\u00bb; \u00ab\u041d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043d\u0435 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u044b \u0443\u0441\u043b\u043e\u0432\u0438\u044f.\n\n\u0412.9 \u0418\u0412\u0420: \u0421\u0423\u0429\u041d\u041e\u0421\u0422\u042c, \u0424\u041e\u0420\u041c\u042b \u0418 \u041c\u0415\u0422\u041e\u0414\u042b. \u0418\u0412\u0420 \u2014 \u0441\u0438\u0441\u0442\u0435\u043c\u0430 \u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0445 \u0438 \u0441\u043e\u0433\u043b\u0430\u0441\u043e\u0432\u0430\u043d\u043d\u044b\u0445 \u043c\u0435\u0440 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0433\u043e \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u043d\u0430 \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u0443\u044e \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u044c \u0434\u043b\u044f \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u044f \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432, \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u044f \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b. \u0421\u0443\u0449\u043d\u043e\u0441\u0442\u044c \u2014 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u044b\u0439 \u043f\u043e\u0434\u0445\u043e\u0434, \u043a\u043e\u0442\u043e\u0440\u043e\u043c\u0443 \u043f\u0440\u0435\u0434\u0448\u0435\u0441\u0442\u0432\u0443\u0435\u0442 \u0442\u0449\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0435 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u0438. \u0426\u0435\u043b\u044c \u2014 \u0440\u0430\u0441\u043a\u0440\u044b\u0442\u044c \u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u0438 \u043b/\u0441, \u0441\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0438 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0430. 5 \u0417\u0410\u0414\u0410\u0427 \u0418\u0412\u0420: \u0444\u043e\u0440\u043c\u0438\u0440\u0443\u044e\u0449\u0430\u044f; \u0440\u0430\u0437\u0432\u0438\u0432\u0430\u044e\u0449\u0430\u044f; \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f; \u043c\u043e\u0431\u0438\u043b\u0438\u0437\u0443\u044e\u0449\u0430\u044f; \u043f\u0435\u0440\u0435\u0432\u043e\u0441\u043f\u0438\u0442\u044b\u0432\u0430\u044e\u0449\u0430\u044f. \u0424\u041e\u0420\u041c\u0410 \u2014 4 \u0432\u0438\u0434\u0430 \u0431\u0435\u0441\u0435\u0434\u044b: \u043e\u0437\u043d\u0430\u043a\u043e\u043c\u0438\u0442\u0435\u043b\u044c\u043d\u0430\u044f; \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044e\u0449\u0430\u044f; \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u0438\u0440\u0443\u044e\u0449\u0430\u044f; \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u0430\u044f. 8 \u041c\u0415\u0422\u041e\u0414\u041e\u0412: \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u043e-\u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0437\u0443\u044e\u0449\u0438\u0445 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0430\u043d\u0430\u043b\u0438\u0437 \u0438 \u043e\u0431\u043e\u0431\u0449\u0435\u043d\u0438\u0435 \u043d\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u044b\u0445 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043a; \u0430\u043d\u0430\u043b\u0438\u0437 \u0438\u0442\u043e\u0433\u043e\u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0435 \u0437\u0430\u0434\u0430\u043d\u0438\u0435 \u0438 \u043f\u043e\u0440\u0443\u0447\u0435\u043d\u0438\u0435; \u0430\u0434\u0440\u0435\u0441\u043d\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c; \u043f\u043e\u0437\u0434\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 (\u0447\u0435\u0441\u0442\u0432\u043e\u0432\u0430\u043d\u0438\u0435); \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u043e-\u043f\u0435\u0434\u0430\u0433\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435.\n\n\u0412.10 \u0412\u041f(\u041f) \u0418\u041d\u0424\u041e\u0420\u041c\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u0415. \u0426\u0435\u043b\u044c \u2014 \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0439 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438 \u043e \u0441\u043e\u0431\u044b\u0442\u0438\u044f\u0445 \u0432 \u043c\u0438\u0440\u0435, \u0420\u0424, \u0436\u0438\u0437\u043d\u0438 \u0438 \u0421\u0411\u0414 \u0432\u043e\u0439\u0441\u043a \u041d\u0413. \u041f\u0415\u0420\u0418\u041e\u0414\u0418\u0427\u041d\u041e\u0421\u0422\u042c: \u0447\u0430\u0441\u0442\u0438 \u043e\u0445\u0440\u0430\u043d\u044b \u0433\u043e\u0441\u043e\u0431\u044a\u0435\u043a\u0442\u043e\u0432, \u0441\u043f\u0435\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0445 \u0433\u0440\u0443\u0437\u043e\u0432, \u0421\u041c\u0412\u0427 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446 \u043f\u043e 50 \u043c\u0438\u043d\u0443\u0442; \u0447\u0430\u0441\u0442\u0438 \u043f\u043e \u043f\u0440\u0438\u0437\u044b\u0432\u0443 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 2 \u0440\u0430\u0437 \u0432 \u043d\u0435\u0434\u0435\u043b\u044e \u043f\u043e 30 \u043c\u0438\u043d\u0443\u0442; \u043e\u0441\u0442\u0430\u043b\u044c\u043d\u044b\u0435 \u0447\u0430\u0441\u0442\u0438 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 2 \u0440\u0430\u0437 \u0432 \u043c\u0435\u0441\u044f\u0446 \u043f\u043e 50 \u043c\u0438\u043d\u0443\u0442; \u043f\u0440\u0438 \u0438\u043d\u0441\u0442\u0440\u0443\u043a\u0442\u0430\u0436\u0430\u0445, \u043f\u0435\u0440\u0435\u0434 \u0437\u0430\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0435\u043c \u043d\u0430 \u0441\u043b\u0443\u0436\u0431\u0443 \u2014 \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 10 \u043c\u0438\u043d\u0443\u0442; \u043f\u0440\u0438 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u0438 \u0437\u0430\u0434\u0430\u0447 \u0431\u043e\u043b\u0435\u0435 \u0441\u0443\u0442\u043e\u043a \u2014 \u0435\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u043e \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 10 \u043c\u0438\u043d\u0443\u0442. \u0410\u043a\u0442\u0438\u0432 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f (\u0432 \u0440\u043e\u0442\u0430\u0445): \u0441\u043e\u0432\u0435\u0442 \u043a\u043e\u043c\u043d\u0430\u0442\u044b \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u0438 \u0434\u043e\u0441\u0443\u0433\u0430; \u0440\u0435\u0434\u043a\u043e\u043b\u043b\u0435\u0433\u0438\u044f \u0441\u0442\u0435\u043d\u043d\u043e\u0439 \u0433\u0430\u0437\u0435\u0442\u044b, \u0444\u043e\u0442\u043e\u0433\u0430\u0437\u0435\u0442\u044b, \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043f\u0440\u0430\u0432\u043e\u0447\u043d\u044b\u0445 \u0431\u044e\u043b\u043b\u0435\u0442\u0435\u043d\u0435\u0439.\n\n\u0412.11-13 \u0417\u0410\u0429\u0418\u0422\u0410 \u041e\u0422 \u041d\u0418\u041f\u0412. \u041d\u0418\u041f\u0412 \u2014 \u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u0430\u044f \u0434\u0435\u0437\u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f, \u0441\u043a\u0440\u044b\u0442\u0438\u0435, \u0438\u043c\u0438\u0442\u0430\u0446\u0438\u044f, \u0434\u0435\u043c\u043e\u043d\u0441\u0442\u0440\u0430\u0442\u0438\u0432\u043d\u044b\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u0441 \u0446\u0435\u043b\u044c\u044e \u043f\u043e\u0434\u0440\u044b\u0432\u0430 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0434\u0443\u0445\u0430 \u0438 \u0441\u0440\u044b\u0432\u0430 \u0437\u0430\u0434\u0430\u0447. \u0417\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442: \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u0443\u0433\u0440\u043e\u0437; \u043f\u0440\u043e\u0433\u043d\u043e\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0443; \u043e\u0446\u0435\u043d\u043a\u0443; \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043f\u043e \u0441\u0440\u044b\u0432\u0443 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u041d\u0418\u041f\u0412; \u043b\u0438\u043a\u0432\u0438\u0434\u0430\u0446\u0438\u044e \u043d\u0435\u0433\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u0439. \u041f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430: \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u0446\u0435\u043b\u0435\u0439, \u0437\u0430\u0434\u0430\u0447, \u0444\u043e\u0440\u043c, \u043c\u0435\u0442\u043e\u0434\u043e\u0432 \u041d\u0418\u041f\u0412; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432 \u043f\u0435\u0440\u0435\u043a\u0440\u044b\u0442\u0438\u0438 \u043a\u0430\u043d\u0430\u043b\u043e\u0432 \u043f\u0440\u043e\u043d\u0438\u043a\u043d\u043e\u0432\u0435\u043d\u0438\u044f; \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u044b \u0441 \u043f\u043e\u0434\u0432\u0435\u0440\u0436\u0435\u043d\u043d\u044b\u043c\u0438 \u041d\u0418\u041f\u0412; \u0412\u041f(\u041f) \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u043e \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f\u0445 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0430\u043a\u0446\u0438\u0439; \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0438 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u044f \u043e\u0433\u0440\u0430\u043d\u0438\u0447\u0435\u043d\u0438\u0439 \u0438 \u0437\u0430\u043f\u0440\u0435\u0442\u043e\u0432. 3 \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b \u041d\u0418\u041f\u0412: \u043f\u0440\u043e\u043d\u0438\u043a\u043d\u043e\u0432\u0435\u043d\u0438\u0435 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0441\u0442\u0441\u043a\u043e\u0439 \u043b\u0438\u0442\u0435\u0440\u0430\u0442\u0443\u0440\u044b; \u0430\u0433\u0438\u0442\u0430\u0446\u0438\u044f \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445 \u043d\u0430 \u043d\u0435\u043f\u0440\u0438\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u0441\u043f\u0435\u0446\u0441\u0440\u0435\u0434\u0441\u0442\u0432; \u0448\u0430\u043d\u0442\u0430\u0436, \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u043d\u0430 \u0441\u0435\u043c\u044c\u0438 \u0447\u0435\u0440\u0435\u0437 \u0441\u043e\u0446\u0441\u0435\u0442\u0438. \u0418\u0421\u0422\u041e\u0427\u041d\u0418\u041a\u0418 \u041d\u0418\u041f\u0412: \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u041d\u0412\u0424, \u0442\u0435\u0440\u0440\u043e\u0440\u0438\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0439, \u0441\u043f\u0435\u0446\u0441\u043b\u0443\u0436\u0431 \u0438\u043d\u043e\u0441\u0442\u0440\u0430\u043d\u043d\u044b\u0445 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432; \u0440\u0430\u0434\u0438\u043a\u0430\u043b\u044c\u043d\u044b\u0435 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u044f; \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u0438\u0442\u0435\u043b\u0438 \u0421\u041c\u0418 \u0441 \u043f\u0440\u0435\u0434\u0432\u0437\u044f\u0442\u043e\u0439 \u043e\u0446\u0435\u043d\u043a\u043e\u0439; \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043d\u044b\u0435 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438; \u0441\u0442\u0438\u0445\u0438\u0439\u043d\u044b\u0435 \u0431\u0435\u0434\u0441\u0442\u0432\u0438\u044f. 5 \u0417\u0410\u0414\u0410\u0427 \u0437\u0430\u0449\u0438\u0442\u044b \u043e\u0442 \u041d\u0418\u041f\u0412: \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0438 \u043f\u0440\u043e\u0433\u043d\u043e\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u041c\u041f\u041f\u0421; \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u043d\u043e\u0441\u0438\u0442\u0435\u043b\u0435\u0439 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0432\u0437\u0433\u043b\u044f\u0434\u043e\u0432; \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043b/\u0441 \u043a \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f\u043c \u0432 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445 \u041d\u0418\u041f\u0412; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432 \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0438 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0430; \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u0435 \u0434\u043e\u043b\u0436\u043d\u043e\u0441\u0442\u043d\u044b\u0445 \u043b\u0438\u0446 \u043c\u0435\u0442\u043e\u0434\u0438\u043a\u0435 \u0437\u0430\u0449\u0438\u0442\u044b.\n\n\u0412.14-15 \u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u0420\u0410\u0411\u041e\u0422\u0410. \u041f\u0420 \u2014 \u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u0430\u044f \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u043e\u0432, \u0448\u0442\u0430\u0431\u043e\u0432, \u043e\u0440\u0433\u0430\u043d\u043e\u0432 \u0412\u041f\u0420, \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u043e\u0432 \u043f\u043e \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u044e, \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e, \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u044e \u0438 \u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044e \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u0438 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438 \u043b/\u0441. \u0426\u0435\u043b\u044c \u2014 \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438, \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0435 \u0438 \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u043f\u0441\u0438\u0445\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u044f. 8 \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0425 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419 \u041f\u0420: \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u043e\u0442\u0431\u043e\u0440; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0438 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u043c\u043e\u0449\u044c; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u044f \u0438 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435. \u041f\u0440\u0438\u043d\u0446\u0438\u043f\u044b: \u043d\u0430\u0443\u0447\u043d\u043e\u0439 \u043e\u0431\u043e\u0441\u043d\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u0438; \u0441\u0438\u0441\u0442\u0435\u043c\u043d\u043e\u0441\u0442\u0438; \u0430\u0434\u0440\u0435\u0441\u043d\u043e\u0441\u0442\u0438; \u043a\u043e\u043d\u0444\u0438\u0434\u0435\u043d\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u043d\u0435\u043f\u0440\u0435\u0440\u044b\u0432\u043d\u043e\u0441\u0442\u0438; \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438. 12 \u041c\u0415\u0422\u041e\u0414\u041e\u0412 \u041f\u0420: \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435; \u0431\u0435\u0441\u0435\u0434\u0430; \u043e\u043f\u0440\u043e\u0441; \u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432; \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u044d\u043a\u0441\u043f\u0435\u0440\u0442\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430; \u0441\u043e\u0446\u0438\u043e\u043c\u0435\u0442\u0440\u0438\u044f; \u043c\u043e\u0434\u0435\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438; \u044d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0442\u0440\u0435\u043d\u0438\u043d\u0433.\n\n\u0412.16 \u041e\u0422\u0415\u0427\u0415\u0421\u0422\u0412\u0415\u041d\u041d\u042b\u0419 \u0418 \u0417\u0410\u0420\u0423\u0411\u0415\u0416\u041d\u042b\u0419 \u041e\u041f\u042b\u0422 \u0424\u041e\u0420\u041c\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u042f \u041c\u041f\u041f\u0421. \u041e\u0422\u0415\u0427\u0415\u0421\u0422\u0412\u0415\u041d\u041d\u042b\u0419: \u0432\u0435\u0440\u043d\u043e\u0441\u0442\u044c \u041e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0443, \u043f\u0440\u0438\u0441\u044f\u0433\u0435, \u0434\u043e\u043b\u0433, \u0447\u0435\u0441\u0442\u044c \u0432\u043e\u0438\u043d\u0430, \u0430\u0432\u0442\u043e\u0440\u0438\u0442\u0435\u0442 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430, \u0431\u043e\u0435\u0432\u044b\u0435 \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u0438, \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0438\u0437\u043c, \u0432\u0437\u0430\u0438\u043c\u043e\u043f\u043e\u043c\u043e\u0449\u044c. \u0412 \u0412\u041e\u0412 \u2014 \u043f\u0440\u043e\u0447\u043d\u043e\u0435 \u041c\u041f\u0421 = \u043e\u0434\u0438\u043d \u0438\u0437 \u0440\u0435\u0448\u0430\u044e\u0449\u0438\u0445 \u0444\u0430\u043a\u0442\u043e\u0440\u043e\u0432 \u041f\u043e\u0431\u0435\u0434\u044b. \u0421\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u044b\u0439: \u0433\u043e\u0441\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435, \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 \u043d\u0430\u0447\u0430\u043b\u0430 + \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0442\u0435\u0445\u043d\u043e\u043b\u043e\u0433\u0438\u0438 (\u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433 \u041c\u041f\u041f\u0421, \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f, \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430). \u0423\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u044b\u0435 \u0447\u0435\u0440\u0442\u044b \u043e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0433\u043e \u043e\u043f\u044b\u0442\u0430: \u0432\u0435\u0434\u0443\u0449\u0430\u044f \u0440\u043e\u043b\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430; \u0435\u0434\u0438\u043d\u0441\u0442\u0432\u043e \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u044f, \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u044f \u0438 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0438; \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0437\u043c, \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u0435 \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u0438, \u0434\u043e\u043b\u0433; \u0431\u043e\u0435\u0432\u043e\u0435 \u0442\u043e\u0432\u0430\u0440\u0438\u0449\u0435\u0441\u0442\u0432\u043e; \u043f\u0440\u0438\u043c\u0435\u0440\u044b \u0433\u0435\u0440\u043e\u0438\u0437\u043c\u0430 \u0438 \u043f\u0440\u0435\u0435\u043c\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u043f\u043e\u043a\u043e\u043b\u0435\u043d\u0438\u0439. \u0417\u0410\u0420\u0423\u0411\u0415\u0416\u041d\u042b\u0419 (\u0421\u0428\u0410, \u041d\u0410\u0422\u041e): \u043b\u0438\u0434\u0435\u0440\u0441\u0442\u0432\u043e \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0430, \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c, \u0441\u043f\u043b\u043e\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c, \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u044b \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438, \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435 \u041f\u0422\u0421\u0420, \u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0441\u0435\u043c\u044c\u044f\u043c\u0438, \u0441\u043a\u0440\u0438\u043d\u0438\u043d\u0433, \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f. \u0412\u042b\u0412\u041e\u0414: \u043e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u2014 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0438 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0438\u0441\u0442\u0441\u043a\u0430\u044f \u043e\u0441\u043d\u043e\u0432\u0430, \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0438, \u0434\u043e\u043b\u0433, \u0447\u0435\u0441\u0442\u044c. \u0417\u0430\u0440\u0443\u0431\u0435\u0436\u043d\u044b\u0439 \u2014 \u043f\u0440\u0438\u043a\u043b\u0430\u0434\u043d\u044b\u0435 \u0442\u0435\u0445\u043d\u043e\u043b\u043e\u0433\u0438\u0438 \u043b\u0438\u0434\u0435\u0440\u0441\u0442\u0432\u0430, \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0439 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438, \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u0438.\n\n\u0412.17 \u041c\u041f\u041f\u0421: \u041f\u041e\u041d\u042f\u0422\u0418\u0415, \u041a\u0420\u0418\u0422\u0415\u0420\u0418\u0418, \u041c\u0415\u0422\u041e\u0414\u042b \u0418 \u041f\u041e\u041a\u0410\u0417\u0410\u0422\u0415\u041b\u0418 \u041e\u0426\u0415\u041d\u041a\u0418. \u041c\u041f\u041f\u0421 \u2014 \u0438\u043d\u0442\u0435\u0433\u0440\u0430\u043b\u044c\u043d\u0430\u044f \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043a\u0430 \u0440\u0435\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u044f \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445, \u0438\u0445 \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u0439, \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u0439, \u043c\u043e\u0442\u0438\u0432\u043e\u0432, \u0432\u043e\u043b\u0435\u0432\u044b\u0445 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043e\u043a, \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u0438 \u0438 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0437\u0430\u0434\u0430\u0447. 8 \u041a\u0420\u0418\u0422\u0415\u0420\u0418\u0415\u0412 \u041e\u0426\u0415\u041d\u041a\u0418: 1)\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c \u0438 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c; 2)\u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u0438\u0437\u043c \u0438 \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u044c; 3)\u044d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c \u0441\u0438\u0441\u0442\u0435\u043c\u044b \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f; 4)\u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u043f\u043e \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u041c\u041f\u041f\u0421; 5)\u0441\u0432\u043e\u0435\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u044f \u0432\u0441\u0435\u043c\u0438 \u0432\u0438\u0434\u0430\u043c\u0438 \u0434\u043e\u0432\u043e\u043b\u044c\u0441\u0442\u0432\u0438\u044f; 6)\u044d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c \u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u044f \u0431\u043e\u0435\u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u0438; 7)\u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u0435, \u0432\u0435\u0440\u0430 \u0432 \u043f\u0440\u0430\u0432\u043e\u0442\u0443; 8)\u0441\u0442\u0435\u043f\u0435\u043d\u044c \u043e\u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f \u0446\u0435\u043b\u0435\u0439 \u0437\u0430\u0434\u0430\u0447. \u041f\u041e\u041a\u0410\u0417\u0410\u0422\u0415\u041b\u0418: \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044f \u0437\u0430\u0434\u0430\u0447; \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c; \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0430\u0442\u043c\u043e\u0441\u0444\u0435\u0440\u0430; \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f \u0438 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u044f; \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c \u043a \u041d\u0418\u041f\u0412; \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c; \u0443\u0434\u043e\u0432\u043b\u0435\u0442\u0432\u043e\u0440\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u0441\u043b\u0443\u0436\u0431\u043e\u0439; \u0434\u043e\u0432\u0435\u0440\u0438\u0435 \u043a \u043a\u043e\u043c\u0430\u043d\u0434\u043e\u0432\u0430\u043d\u0438\u044e; \u0443\u0432\u0435\u0440\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0432 \u0441\u043e\u0441\u043b\u0443\u0436\u0438\u0432\u0446\u0430\u0445. \u041c\u0415\u0422\u041e\u0414\u042b \u041e\u0426\u0415\u041d\u041a\u0418: \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435, \u0431\u0435\u0441\u0435\u0434\u0430, \u043e\u043f\u0440\u043e\u0441, \u0430\u043d\u043a\u0435\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435, \u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435, \u044d\u043a\u0441\u043f\u0435\u0440\u0442\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430, \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u043e\u0432, \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438.\n\n\u0412.18-21 \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0410 \u0418 \u041f\u0420\u0410\u0412\u041e\u041f\u041e\u0420\u042f\u0414\u041e\u041a. \u0420\u0430\u0431\u043e\u0442\u0430 \u043f\u043e \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u044e \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u2014 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043e\u0440\u0433\u0430\u043d\u043e\u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f, \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u0430\u044f \u043d\u0430 \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u043e\u0437\u043d\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0433\u043e \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0434\u043e\u043b\u0433\u0430, \u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u041a\u043e\u043d\u0441\u0442\u0438\u0442\u0443\u0446\u0438\u0438 \u0420\u0424, \u0437\u0430\u043a\u043e\u043d\u043e\u0434\u0430\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0430, \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u0438 \u0443\u0441\u0442\u0440\u0430\u043d\u0435\u043d\u0438\u0435 \u043f\u0440\u0438\u0447\u0438\u043d \u043f\u0440\u0430\u0432\u043e\u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0439. \u0426\u0435\u043b\u044c \u2014 \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435 \u043f\u0440\u0430\u0432\u043e\u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0439. 7 \u0417\u0410\u0414\u0410\u0427: \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0435\u0434\u0438\u043d\u043e\u043d\u0430\u0447\u0430\u043b\u0438\u044f; \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430 \u0438 \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0439; \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u0435 \u0441\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u044f \u0437\u0430\u043a\u043e\u043d\u043d\u043e\u0441\u0442\u0438; \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u0438 \u0443\u0441\u0442\u0440\u0430\u043d\u0435\u043d\u0438\u0435 \u043f\u0440\u0438\u0447\u0438\u043d \u0438 \u0443\u0441\u043b\u043e\u0432\u0438\u0439; \u0441\u0431\u043e\u0440 \u0438 \u0430\u043d\u0430\u043b\u0438\u0437 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438; \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u0435 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438 \u043e\u0446\u0435\u043d\u043a\u0438; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u0438. 6 \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0419 \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u044f \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b: \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0435 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u0435; \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433 \u0438 \u0430\u043d\u0430\u043b\u0438\u0437; \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438; \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u0438 \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0430 \u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0439; \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0441 \u043f\u0440\u043e\u043a\u0443\u0440\u0430\u0442\u0443\u0440\u043e\u0439 \u0438 \u0441\u0443\u0434\u0430\u043c\u0438; \u043c\u0435\u0442\u043e\u0434\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u0435. \u041f\u0415\u0420\u0418\u041e\u0414\u0418\u0427\u041d\u041e\u0421\u0422\u042c \u043f\u043e\u0434\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u0438\u0442\u043e\u0433\u043e\u0432: \u041e\u0422\u041e \u2014 \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435, \u0433\u043e\u0434; \u0441\u043e\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u0435 \u2014 \u043c\u0435\u0441\u044f\u0446, \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435, \u0433\u043e\u0434; \u0432\u043e\u0438\u043d\u0441\u043a\u0430\u044f \u0447\u0430\u0441\u0442\u044c, \u0412\u041e\u041e\u0412\u041e \u2014 \u043c\u0435\u0441\u044f\u0446, \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435; \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u2014 \u043c\u0435\u0441\u044f\u0446; \u0442\u0435\u0440\u0440\u0438\u0442\u043e\u0440\u0438\u0430\u043b\u044c\u043d\u044b\u0439 \u043e\u0440\u0433\u0430\u043d \u2014 \u043c\u0435\u0441\u044f\u0446, \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435, \u0433\u043e\u0434; \u0441\u0442\u0440\u043e\u0435\u0432\u044b\u0435 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f \u0432\u043d\u0435\u0432\u0435\u0434\u043e\u043c\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u043e\u0445\u0440\u0430\u043d\u044b \u2014 \u0437\u0430 \u0441\u0443\u0442\u043a\u0438. \u041f\u0440\u0430\u0432\u043e\u0432\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435 \u2014 \u0446\u0435\u043b\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043d\u044b\u0439 \u043f\u0440\u043e\u0446\u0435\u0441\u0441 \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u043d\u0430 \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u0435 \u0434\u043b\u044f \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u044b\u0445 \u043f\u0440\u0430\u0432\u043e\u0432\u044b\u0445 \u0437\u043d\u0430\u043d\u0438\u0439, \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u0439, \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0433\u043e \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u0438 \u0432\u044b\u0441\u043e\u043a\u043e\u0439 \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0439 \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u044b.\n\n\u0412.22-23 \u0412\u041e\u0415\u041d\u041d\u041e-\u041f\u0410\u0422\u0420\u0418\u041e\u0422\u0418\u0427\u0415\u0421\u041a\u0410\u042f \u0420\u0410\u0411\u041e\u0422\u0410. \u0412\u041f\u0430\u0442\u0420 \u2014 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0438 \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441\u0430 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u043f\u043e \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u044e \u0432 \u0434\u0443\u0445\u0435 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0437\u043c\u0430, \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f, \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0432\u0435\u0440\u043d\u043e\u0441\u0442\u0438 \u041e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0443, \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0434\u043e\u043b\u0433\u0430. \u0426\u0435\u043b\u044c \u2014 \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f, \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0432\u0435\u0440\u043d\u043e\u0441\u0442\u0438 \u041e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0443, \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0434\u043e\u043b\u0433\u0430. \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0417\u0410\u0414\u0410\u0427\u0418: \u0432\u044b\u0440\u0430\u0431\u043e\u0442\u043a\u0430 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432, \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0437\u043c\u0430, \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u044b \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u0438 \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0433\u043e\u0440\u0434\u043e\u0441\u0442\u0438 \u0437\u0430 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 \u0441\u0438\u043c\u0432\u043e\u043b\u044b; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f, \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0430 \u0438 \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u0439 \u0432\u043e\u0439\u0441\u043a \u041d\u0413; \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0430 \u0432\u043e\u0435\u043d\u043d\u043e\u0439 \u0441\u043b\u0443\u0436\u0431\u044b; \u0443\u0432\u0435\u043a\u043e\u0432\u0435\u0447\u0435\u043d\u0438\u0435 \u043f\u0430\u043c\u044f\u0442\u0438 \u043f\u043e\u0433\u0438\u0431\u0448\u0438\u0445; \u0441\u043e\u0437\u0434\u0430\u043d\u0438\u0435 \u0443\u0441\u043b\u043e\u0432\u0438\u0439 \u0434\u043b\u044f \u0441\u0432\u043e\u0431\u043e\u0434\u044b \u0441\u043e\u0432\u0435\u0441\u0442\u0438. \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b: \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u0433\u043e\u0441\u043f\u043e\u043b\u0438\u0442\u0438\u043a\u0435 \u0432 \u043e\u0431\u043b\u0430\u0441\u0442\u0438 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u044f; \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043a \u0434\u043d\u044f\u043c \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0439 \u0441\u043b\u0430\u0432\u044b \u0438 \u043f\u0430\u043c\u044f\u0442\u043d\u044b\u043c \u0434\u0430\u0442\u0430\u043c; \u0432\u043e\u0435\u043d\u043d\u043e-\u0438\u0441\u0442\u043e\u0440\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043a\u043e\u043d\u0444\u0435\u0440\u0435\u043d\u0446\u0438\u0438; \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0441 \u0432\u0435\u0442\u0435\u0440\u0430\u043d\u0430\u043c\u0438; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432\u043e \u0432\u0441\u0435\u0440\u043e\u0441\u0441\u0438\u0439\u0441\u043a\u0438\u0445 \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u0430\u043a\u0446\u0438\u044f\u0445; \u0432\u043e\u0435\u043d\u043d\u043e-\u0441\u043f\u043e\u0440\u0442\u0438\u0432\u043d\u044b\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f; \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u0441 \u043f\u043e\u0438\u0441\u043a\u043e\u0432\u044b\u043c\u0438 \u043a\u043b\u0443\u0431\u0430\u043c\u0438; \u0434\u043d\u0438 \u043e\u0442\u043a\u0440\u044b\u0442\u044b\u0445 \u0434\u0432\u0435\u0440\u0435\u0439. \u0420\u0415\u0417\u0423\u041b\u042c\u0422\u0410\u0422\u042b: \u043f\u0440\u0435\u0434\u0430\u043d\u043d\u043e\u0441\u0442\u044c \u041e\u0442\u0435\u0447\u0435\u0441\u0442\u0432\u0443 \u2014 \u0420\u0424; \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c \u0432\u044b\u043f\u043e\u043b\u043d\u044f\u0442\u044c \u0421\u0411\u0417 \u0432 \u043b\u044e\u0431\u044b\u0445 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u043e\u043b\u043e\u0436\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0433\u043e \u0438\u043c\u0438\u0434\u0436\u0430 \u0420\u043e\u0441\u0433\u0432\u0430\u0440\u0434\u0438\u0438.\n\n\u0412.24-25 \u0412\u041e\u0415\u041d\u041d\u041e-\u0421\u041e\u0426\u0418\u0410\u041b\u042c\u041d\u0410\u042f \u0420\u0410\u0411\u041e\u0422\u0410. \u0412\u0421\u0420 \u2014 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043e\u0440\u0433\u0430\u043d\u043e\u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u043e \u0440\u0435\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u0438 \u0433\u0430\u0440\u0430\u043d\u0442\u0438\u0439 \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0439 \u0438 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0439 \u0437\u0430\u0449\u0438\u0442\u044b \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445 \u0438 \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u043e\u0432. \u041e\u0440\u0433\u0430\u043d\u0438\u0437\u0443\u0435\u0442\u0441\u044f \u0432 \u0446\u0435\u043b\u044f\u0445 \u0440\u0435\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u0438 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e\u0439 \u0438 \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0439 \u0437\u0430\u0449\u0438\u0442\u044b \u0438 \u0447\u043b\u0435\u043d\u043e\u0432 \u0438\u0445 \u0441\u0435\u043c\u0435\u0439. 4 \u0417\u0410\u0414\u0410\u0427\u0418: \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u044b\u0445 \u0433\u0430\u0440\u0430\u043d\u0442\u0438\u0439 \u0438 \u043a\u043e\u043c\u043f\u0435\u043d\u0441\u0430\u0446\u0438\u0439; \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u043f\u043e\u043b\u0443\u0447\u0438\u0432\u0448\u0438\u0445 \u0443\u0432\u0435\u0447\u044c\u044f \u0438 \u0441\u0435\u043c\u0435\u0439 \u043f\u043e\u0433\u0438\u0431\u0448\u0438\u0445; \u043f\u0440\u0438\u043d\u044f\u0442\u0438\u0435 \u043c\u0435\u0440 \u043f\u043e \u043e\u0431\u0440\u0430\u0449\u0435\u043d\u0438\u044f\u043c; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0438 \u043e\u0446\u0435\u043d\u043a\u0430 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u043f\u043e\u043b\u043e\u0436\u0435\u043d\u0438\u044f. \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u042f: \u0441\u043e\u0446\u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u043c\u0438; \u0441\u043e\u0446\u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0430\u043c\u0438; \u0441\u043e\u0446\u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u0447\u043b\u0435\u043d\u043e\u0432 \u0441\u0435\u043c\u0435\u0439. \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b: \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432 \u0440\u0435\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u0438 \u043f\u0440\u0430\u0432 \u0438 \u0433\u0430\u0440\u0430\u043d\u0442\u0438\u0439; \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u043b\u0435\u043a\u0446\u0438\u0438, \u0441\u0435\u043c\u0438\u043d\u0430\u0440\u044b, \u0431\u0435\u0441\u0435\u0434\u044b, \u0437\u0430\u043d\u044f\u0442\u0438\u044f; \u0432\u0435\u0447\u0435\u0440\u0430 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432 \u0438 \u043e\u0442\u0432\u0435\u0442\u043e\u0432; \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0441 \u0441\u0435\u043c\u044c\u044f\u043c\u0438 \u043f\u043e\u0433\u0438\u0431\u0448\u0438\u0445; \u0443\u0447\u0451\u0442 \u0441\u0435\u043c\u0435\u0439 \u043f\u043e\u0433\u0438\u0431\u0448\u0438\u0445; \u043f\u0440\u0438\u0451\u043c \u043f\u043e \u043b\u0438\u0447\u043d\u044b\u043c \u0432\u043e\u043f\u0440\u043e\u0441\u0430\u043c.\n\n\u0412.26-27 \u041a\u0423\u041b\u042c\u0422\u0423\u0420\u041d\u041e-\u0414\u041e\u0421\u0423\u0413\u041e\u0412\u0410\u042f \u0420\u0410\u0411\u041e\u0422\u0410. \u041a\u0414\u0420 \u2014 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u043e\u0440\u0433\u0430\u043d\u043e\u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u043f\u043e \u0443\u0434\u043e\u0432\u043b\u0435\u0442\u0432\u043e\u0440\u0435\u043d\u0438\u044e \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u044b\u0445 \u0438 \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u043f\u043e\u0442\u0440\u0435\u0431\u043d\u043e\u0441\u0442\u0435\u0439 \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u0445, \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044e \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f, \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u0438 \u0431\u043e\u0435\u0432\u044b\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432, \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438 \u0434\u043e\u0441\u0443\u0433\u0430. \u0426\u0435\u043b\u044c \u2014 \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0430\u043c\u0438 \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u044b \u0438 \u0438\u0441\u043a\u0443\u0441\u0441\u0442\u0432\u0430 \u0433\u043e\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0441\u043e\u0437\u043d\u0430\u043d\u0438\u044f, \u0441\u043d\u044f\u0442\u0438\u0435 \u0441\u0442\u0440\u0435\u0441\u0441\u043e\u0432\u044b\u0445 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0439, \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0434\u043e\u0441\u0443\u0433\u0430, \u0443\u0434\u043e\u0432\u043b\u0435\u0442\u0432\u043e\u0440\u0435\u043d\u0438\u0435 \u044d\u0441\u0442\u0435\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u043f\u043e\u0442\u0440\u0435\u0431\u043d\u043e\u0441\u0442\u0435\u0439. 5 \u0417\u0410\u0414\u0410\u0427: \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u043e-\u044d\u0441\u0442\u0435\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435; \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u043e\u0435 \u043f\u0440\u043e\u0441\u0432\u0435\u0449\u0435\u043d\u0438\u0435; \u0443\u0434\u043e\u0432\u043b\u0435\u0442\u0432\u043e\u0440\u0435\u043d\u0438\u0435 \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u044b\u0445 \u043f\u043e\u0442\u0440\u0435\u0431\u043d\u043e\u0441\u0442\u0435\u0439; \u0441\u043d\u044f\u0442\u0438\u0435 \u0441\u0442\u0440\u0435\u0441\u0441\u0430 \u0438 \u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435 \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u0441\u0438\u043b; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0434\u043e\u0441\u0443\u0433\u0430. \u041d\u0410\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u042f \u041a\u0414\u0420: \u0441\u0430\u043c\u043e\u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0435 \u0445\u0443\u0434\u043e\u0436\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u0442\u0432\u043e\u0440\u0447\u0435\u0441\u0442\u0432\u043e; \u0444\u0435\u0441\u0442\u0438\u0432\u0430\u043b\u044c\u043d\u043e-\u043a\u043e\u043d\u043a\u0443\u0440\u0441\u043d\u043e\u0435 \u0434\u0432\u0438\u0436\u0435\u043d\u0438\u0435; \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u044b\u0435 \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u044b; \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u043e-\u043f\u0440\u043e\u0441\u0432\u0435\u0442\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f; \u0442\u0435\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043
