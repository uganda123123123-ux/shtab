// ─── СБОРКА СИСТЕМНОГО ПРОМПТА ────────────────────────────────────────────
// Цель: давать модели МИНИМУМ необходимого контекста для конкретного вопроса,
// чтобы а) не было галлюцинаций, б) ответ был быстрым (меньше токенов).

function glossaryBlock() {
  var lines = ["ГЛОССАРИЙ (источник истины — используй ТОЛЬКО эти расшифровки):"];
  Object.keys(GLOSSARY).forEach(function(k){
    lines.push(k + " = " + GLOSSARY[k]);
  });
  return lines.join("\n");
}

function baseRules() {
  return "Ты — преподаватель ВПР Росгвардии. ЖЁСТКИЕ ПРАВИЛА:\n" +
    "1. Отвечай ТОЛЬКО по материалу ниже и по глоссарию. Ничего не выдумывай.\n" +
    "2. НИКОГДА не придумывай расшифровки аббревиатур. Бери их ТОЛЬКО из ГЛОССАРИЯ.\n" +
    "3. Если аббревиатуры нет ни в глоссарии, ни в материале — ответь: «нет данных в материале».\n" +
    "4. Будь краток. Используй сокращения из глоссария (МППС, л/с, всл., сотр., рук-ль, ком-р, подр-е, м-я и т.д.).\n" +
    "5. Структурируй: нумерация, выделение цифр и терминов.\n" +
    "6. Кейсы начинай с «▣ СИТУАЦИЯ:». Мнемоники после символа ◈.";
}

// Извлекаем из запроса значимые слова и аббревиатуры
function queryKeywords(q) {
  if (!q) return [];
  var words = (q.toLowerCase().match(/[а-яёa-z0-9()\/-]{3,}/g) || []);
  var abbrs = (q.match(/\b[А-ЯA-Z][А-ЯA-Z()]{1,}\b/g) || []).map(function(a){return a.toLowerCase();});
  // дедуп
  var seen = {}, out = [];
  words.concat(abbrs).forEach(function(w){ if(!seen[w]){seen[w]=1;out.push(w);} });
  // отсекаем мусорные слова
  var stop = {"что":1,"как":1,"это":1,"для":1,"при":1,"или":1,"все":1,"его":1,"был":1,"был":1,"тема":1,"вопрос":1,"расшифруй":1,"объясни":1,"задай":1,"составь":1,"придумай":1,"мне":1};
  return out.filter(function(w){ return !stop[w]; });
}

// Делим SYSTEM_PROMPT на секции по маркерам "В.N" / "В.МПN" / "В.ПСN"
function splitSections() {
  return SYSTEM_PROMPT.split(/\n\n(?=В\.[0-9МПС])/);
}

// Возвращает top-N секций по числу совпадений со словами запроса
function findRelevantSections(q, maxSections) {
  var kws = queryKeywords(q);
  if (kws.length === 0) return "";
  var sections = splitSections();
  var scored = sections.map(function(s){
    var sLower = s.toLowerCase();
    var score = 0;
    kws.forEach(function(w){
      var idx = -1;
      while ((idx = sLower.indexOf(w, idx + 1)) !== -1) score++;
    });
    return {text: s, score: score};
  });
  scored.sort(function(a, b){ return b.score - a.score; });
  var top = scored.slice(0, maxSections || 2).filter(function(x){ return x.score > 0; });
  if (top.length === 0) return "";
  return top.map(function(x){ return x.text; }).join("\n\n");
}

function buildPrompt(tid, userQuery) {
  var head = baseRules() + "\n\n" + glossaryBlock();

  // Если задана конкретная тема с готовыми keyPoints — даём ТОЛЬКО её
  var d = TOPIC_DETAILS[tid];
  if (d) {
    return head + "\n\nТЕМА #" + tid + ":\n" + d.keyPoints.join("\n") +
           "\nМнемоника: " + d.mnemonic;
  }

  // Тема есть в CLUSTERS, но без TOPIC_DETAILS — берём её название
  // плюс релевантные секции из общей базы по словам запроса
  var topicTitle = "";
  for (var ci = 0; ci < CLUSTERS.length; ci++) {
    var t = CLUSTERS[ci].topics.find(function(t){ return String(t.id) === String(tid); });
    if (t) { topicTitle = "ТЕМА #" + tid + ": " + t.title + "\n\n"; break; }
  }

  var relevant = findRelevantSections(userQuery, 2);
  // Если ничего релевантного не нашли — даём короткий хвост базы (4000 симв
  // вместо 12000), чтобы не раздувать промпт впустую.
  if (!relevant) relevant = SYSTEM_PROMPT.slice(0, 4000);

  return head + "\n\n" + topicTitle + relevant;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function allTopicsFor(discKey) {
  var ids = DISC[discKey] ? DISC[discKey].ids : null;
  var result = [];
  CLUSTERS.forEach(function(c) {
    if (!ids || ids.indexOf(c.id) >= 0) {
      c.topics.forEach(function(t) {
        result.push(Object.assign({}, t, {clusterColor: c.color, clusterLabel: c.label}));
      });
    }
  });
  return result;
}

function mdInline(text) {

}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  var _tab = useState("quiz"); var tab = _tab[0]; var setTab = _tab[1];
  var _selC = useState(null); var selC = _selC[0]; var setSelC = _selC[1];
  var _selT = useState(null); var selT = _selT[0]; var setSelT = _selT[1];
  var _msgs = useState([{role:"assistant",content:"Здравия желаю!\n\nЯ отвечаю **ТОЛЬКО** по справочному материалу и глоссарию аббревиатур.\nЕсли чего-то нет в материале — отвечу «нет данных», а не выдумаю.\n\nВведите ключ OpenRouter в шапке, затем задайте вопрос или выберите тему."}]);
  var msgs = _msgs[0]; var setMsgs = _msgs[1];
  var _inp = useState(""); var inp = _inp[0]; var setInp = _inp[1];
  var _loading = useState(false); var loading = _loading[0]; var setLoading = _loading[1];
  var _apiKey = useState(""); var apiKey = _apiKey[0]; var setApiKey = _apiKey[1];
  var _keyInput = useState(""); var keyInput = _keyInput[0]; var setKeyInput = _keyInput[1];
  var _examIdx = useState(0); var examIdx = _examIdx[0]; var setExamIdx = _examIdx[1];
  var endRef = useRef(null);

  useEffect(function(){
    if (endRef.current) endRef.current.scrollIntoView({behavior:'smooth'});
  }, [msgs]);

  var send = useCallback(function() {
    var txt = inp.trim();
    if (!txt || loading) return;
    if (!window.SAVED_KEY) { alert('Введите ключ OpenRouter сверху!'); return; }
    setInp("");
    setMsgs(function(p){ return p.concat([{role:"user",content:txt}]); });
    setLoading(true);
    var history = msgs.map(function(m){ return {role:m.role,content:m.content}; });
    // buildPrompt сам решает: брать ли конкретную тему или искать релевантные
    // секции по словам запроса. Это в 3–5 раз меньше токенов на вход, чем
    // прежний SYSTEM_PROMPT.slice(0,12000), и устраняет галлюцинации
    // аббревиатур за счёт обязательного глоссария.
    var sysPrompt = buildPrompt(window._curTopicId, txt);
    fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+window.SAVED_KEY},
      body:JSON.stringify({model:window.SAVED_MODEL||"openrouter/free",max_tokens:800,
        messages:[{role:"system",content:sysPrompt}].concat(history).concat([{role:"user",content:txt}])})
    })
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
    .then(function(res){
      if (!res.ok) throw new Error((res.d.error&&res.d.error.message)||JSON.stringify(res.d).slice(0,200));
      var reply = (res.d.choices&&res.d.choices[0]&&res.d.choices[0].message&&res.d.choices[0].message.content) || "Пустой ответ.";
      setMsgs(function(p){ return p.concat([{role:"assistant",content:reply}]); });
      setLoading(false);
    })
    .catch(function(err){
      setMsgs(function(p){ return p.concat([{role:"assistant",content:"Ошибка: "+err.message}]); });
      setLoading(false);
    });
  }, [inp, loading, msgs]);

  function goAI(q) { setInp(q); setTab("tutor"); }

  var tabs = [
    ["quiz","📋 Вопросы"],
    ["map","🗺 Карта знаний"],
    ["patterns","⬡ Связи"],
    ["tutor","◈ ИИ-тьютор"],
  ];

  return e('div',{style:{minHeight:'100vh',background:'#0a0c10',display:'flex',flexDirection:'column'}},
    // Header
    e('header',{style:{background:'#0f1218',borderBottom:'1px solid #1e2530',position:'sticky',top:0,zIndex:100}},
      e('div',{style:{maxWidth:1200,margin:'0 auto',padding:'9px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
        e('div',{style:{display:'flex',alignItems:'center',gap:12}},
          e('span',{style:{fontSize:22,color:'#c8a84b'}},'⬡'),
          e('div',null,
            e('div',{style:{fontSize:16,fontWeight:700,letterSpacing:4,color:'#c8a84b'}},'ШТАБ'),
            e('div',{style:{fontSize:10,color:'#5a6478',letterSpacing:2}},'ГМЭ · ВПР · '+CLUSTERS.reduce(function(s,c){return s+c.topics.length;},0)+' тем')
          )
        ),
        e('nav',{style:{display:'flex',gap:5,flexWrap:'wrap'}},
          tabs.map(function(t){
            return e('button',{key:t[0],className:'btn'+(tab===t[0]?' active':''),onClick:function(){setTab(t[0]);setSelC(null);setSelT(null);}},t[1]);
          })
        )
      ),
      // Key banner
      !apiKey ? e('div',{style:{background:'#c8a84b15',borderBottom:'1px solid #c8a84b44',padding:'8px 18px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
        e('span',{style:{fontSize:12,color:'#c8a84b',whiteSpace:'nowrap'}},'◈ OpenRouter:'),
        e('input',{placeholder:'sk-or-v1-...',onChange:function(ev){setKeyInput(ev.target.value);},
          style:{flex:1,minWidth:150}}),
        e('select',{onChange:function(ev){window.SAVED_MODEL=ev.target.value;},style:{minWidth:140}},
          FREE_MODELS.map(function(m){ return e('option',{key:m[0],value:m[0]},m[1]); })
        ),
        e('button',{onClick:function(){if(keyInput.trim()){window.SAVED_KEY=keyInput.trim();setApiKey(keyInput.trim());}},
          style:{background:'#c8a84b',border:'none',borderRadius:4,color:'#0a0c10',padding:'6px 14px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit',whiteSpace:'nowrap'}}, 'Войти'),
        e('a',{href:'https://openrouter.ai/keys',target:'_blank',style:{fontSize:11,color:'#5a6478',textDecoration:'none',whiteSpace:'nowrap'}},'Ключ →')
      ) :
      e('div',{style:{background:'#4bc89c11',borderBottom:'1px solid #4bc89c33',padding:'6px 18px',display:'flex',gap:8,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap'}},
        e('span',{style:{fontSize:11,color:'#4bc89c'}},'✓ ИИ-тьютор подключён · '+apiKey.slice(0,16)+'…'),
        e('div',{style:{display:'flex',gap:6,alignItems:'center'}},
          e('select',{onChange:function(ev){window.SAVED_MODEL=ev.target.value;},style:{fontSize:11,padding:'3px 6px'}},
            FREE_MODELS.map(function(m){ return e('option',{key:m[0],value:m[0]},m[1]); })
          ),
          e('button',{className:'btn',style:{fontSize:11},onClick:function(){setApiKey('');window.SAVED_KEY='';}}, 'Сменить ключ')
        )
      )
    ),
    // Main
    e('div',{style:{flex:1,maxWidth:1200,margin:'0 auto',width:'100%',padding:'18px 18px',boxSizing:'border-box'}},
      tab==='quiz'     ? e(QuizView, {onAI:goAI}) : null,
      tab==='map' && !selT ? e(MapView,  {clusters:CLUSTERS,sel:selC,onSel:setSelC,onTopic:function(t,cid){setSelT(t);setSelC(cid);}}) : null,
      tab==='map' &&  selT ? e(TopicView,{topic:selT,cluster:CLUSTERS.find(function(c){return c.id===selC;}),onBack:function(){setSelT(null);},onAI:goAI}) : null,
      tab==='patterns' ? e(PatternsView,{onAI:goAI}) : null,
      tab==='tutor'    ? e(TutorView,   {msgs:msgs,inp:inp,loading:loading,setInp:setInp,send:send,endRef:endRef,apiKey:apiKey,examIdx:examIdx,setExamIdx:setExamIdx}) : null
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
