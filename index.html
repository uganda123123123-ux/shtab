2. «Военная психология»
3. «Психологическое обеспечение служебной деятельности»

Ключевые паттерны материала:
- Все 7 направлений ВПР: сущность → цели → задачи → формы → результаты

- Шкала оценки везде: 90%/80%/70% = отл/хор/удовл
- При СБЗ всегда 3 периода: подготовка / в ходе / по завершении
- 13 этапов алгоритма ЗКР по ВПР

Твои задачи:
- Объяснять сложные понятия с примерами и схемами
- Составлять кейсы-ситуации («Вы ЗКР по ВПР. Ситуация: ...»)
- Проверять знания вопросами

- Создавать мнемоники для запоминания

Используй структуру: ключевые термины выдели →, схемы строй с номерами, кейсы начинай с «▣ СИТУАЦИЯ:». Будь конкретным — ссылайся на проценты, вопросы, пункты наставления.`;

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]                   = useState("map");
  const [selCluster, setSelCluster]     = useState(null);
  const [selTopic, setSelTopic]         = useState(null);
  const [msgs, setMsgs]                 = useState([{ role:"assistant", content:'Здравия желаю! Я ваш ИИ-тьютор по ВПР.\n\nЗадайте любой вопрос по материалу — объясню, разберу по схеме, дам кейс или проверю знания.\n\nПопробуйте:\n• «Объясни систему ВПР»\n• «Чем агитация отличается от пропаганды?»\n• «Дай кейс: ЗКР получает задачу»\n• «Проверь меня по теме 17 (МППС)»\n• «Все 4 вида беседы ИВР одной схемой»' }]);
  const [input, setInput]               = useState("");
  const [loading, setLoading]           = useState(false);
  const chatEnd                         = useRef(null);

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const sendMsg = useCallback(async () => {
    if (!input.trim() || loading) return;
    const txt = input.trim();
    setInput("");
    setMsgs(prev => [...prev, { role:"user", content:txt }]);
    setLoading(true);
    try {
      const history = msgs.map(m => ({ role:m.role, content:m.content }));
      const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${API_KEY}` },
        body:JSON.stringify({ model:MODEL, max_tokens:1200,
          messages:[{ role:"system", content:SYSTEM_PROMPT }, ...history, { role:"user", content:txt }] })
      });
      const d = await r.json();
      const reply = d.choices?.[0]?.message?.content || d.error?.message || "Ошибка ответа.";
      setMsgs(prev => [...prev, { role:"assistant", content:reply }]);
    } catch(e) {
      setMsgs(prev => [...prev, { role:"assistant", content:"⚠️ Ошибка соединения: " + e.message }]);
    }
    setLoading(false);
  }, [input, loading, msgs]);

  const goTutor = (q) => { setInput(q); setTab("tutor"); };

  const S = styles;
  return (
    <div style={S.root}>
      {/* HEADER */}
      <header style={S.header}>
        <div style={S.hInner}>
          <div style={S.logo}>
            <span style={{fontSize:26,color:"#c8a84b"}}>⬡</span>
            <div>
              <div style={{fontSize:18,fontWeight:700,letterSpacing:4,color:"#c8a84b"}}>ШТАБ</div>
              <div style={{fontSize:10,color:"#5a6478",letterSpacing:2}}>Подготовка к ГМЭ · ВПР · {CLUSTERS.reduce((s,c)=>s+c.topics.length,0)} тем</div>
            </div>
          </div>
          <nav style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["map","🗺 Карта знаний"],["patterns","⬡ Когнитивные связи"],["tutor","◈ ИИ-тьютор"]].map(([id,lbl]) => (
              <button key={id} className="nav-btn" onClick={()=>{setTab(id);setSelCluster(null);setSelTopic(null);}}
                style={{...S.navBtn,...(tab===id?S.navActive:{})}}>
                {lbl}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {/* MAIN */}
      <div style={S.main}>
        {tab==="map" && !selTopic &&
          <MapView clusters={CLUSTERS} sel={selCluster} onSel={setSelCluster} onTopic={(t,c)=>{setSelTopic(t);setSelCluster(c);}} />}
        {tab==="map" && selTopic &&
          <TopicView topic={selTopic} cluster={CLUSTERS.find(c=>c.id===selCluster)} onBack={()=>setSelTopic(null)} onAI={goTutor} details={TOPIC_DETAILS[selTopic.id]} />}
        {tab==="patterns" &&
          <PatternsView patterns={PATTERNS} onAI={goTutor} />}
        {tab==="tutor" &&
          <TutorView msgs={msgs} input={input} loading={loading} setInput={setInput} send={sendMsg} chatEnd={chatEnd} />}
      </div>
    </div>
  );
}
