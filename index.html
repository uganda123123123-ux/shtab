2\u0435\u0447\u0435\u0440\u0430 \u043a \u0434\u043d\u044f\u043c \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0439 \u0441\u043b\u0430\u0432\u044b; \u043a\u0438\u043d\u043e-, \u0432\u0438\u0434\u0435\u043e-, \u0440\u0430\u0434\u0438\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0430; \u0431\u0438\u0431\u043b\u0438\u043e\u0442\u0435\u0447\u043d\u043e\u0435 \u043e\u0431\u0441\u043b\u0443\u0436\u0438\u0432\u0430\u043d\u0438\u0435; \u043c\u0443\u0437\u0435\u0439\u043d\u043e\u0435 \u0434\u0435\u043b\u043e; \u043a\u0440\u0443\u0436\u043a\u043e\u0432\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0441 \u0443\u0447\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u044f\u043c\u0438 \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u044b. \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u0424\u041e\u0420\u041c\u042b: \u043a\u043e\u043d\u0446\u0435\u0440\u0442\u044b, \u0442\u0435\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0432\u0435\u0447\u0435\u0440\u0430, \u0441\u043f\u0435\u043a\u0442\u0430\u043a\u043b\u0438, \u043a\u0443\u043b\u044c\u0442\u0443\u0440\u043d\u044b\u0435 \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u044b, \u0443\u0441\u0442\u043d\u044b\u0435 \u0436\u0443\u0440\u043d\u0430\u043b\u044b, \u0434\u0435\u043c\u043e\u043d\u0441\u0442\u0440\u0430\u0446\u0438\u044f \u043a\u0438\u043d\u043e, \u044d\u043a\u0441\u043a\u0443\u0440\u0441\u0438\u0438, \u0447\u0438\u0442\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0435 \u043a\u043e\u043d\u0444\u0435\u0440\u0435\u043d\u0446\u0438\u0438, \u0432\u0438\u043a\u0442\u043e\u0440\u0438\u043d\u044b, \u0441\u043c\u043e\u0442\u0440\u044b-\u043a\u043e\u043d\u043a\u0443\u0440\u0441\u044b, \u0444\u0435\u0441\u0442\u0438\u0432\u0430\u043b\u0438, \u0432\u044b\u0441\u0442\u0430\u0432\u043a\u0438, \u043a\u0440\u0443\u0436\u043a\u0438 \u0438 \u0441\u0435\u043a\u0446\u0438\u0438.\n\n\u0412.28-29 \u0420\u0410\u0411\u041e\u0422\u0410 \u0421 \u0412\u0415\u0420\u0423\u042e\u0429\u0418\u041c\u0418. \u0426\u0435\u043b\u044c \u2014 \u0443\u0434\u043e\u0432\u043b\u0435\u0442\u0432\u043e\u0440\u0435\u043d\u0438\u0435 \u0434\u0443\u0445\u043e\u0432\u043d\u044b\u0445 \u043f\u043e\u0442\u0440\u0435\u0431\u043d\u043e\u0441\u0442\u0435\u0439, \u043e\u0442\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0433\u043e \u043a\u0443\u043b\u044c\u0442\u0430, \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0445 \u043e\u0441\u043d\u043e\u0432. 3 \u0417\u0410\u0414\u0410\u0427\u0418: \u0441\u043e\u0437\u0434\u0430\u043d\u0438\u0435 \u0443\u0441\u043b\u043e\u0432\u0438\u0439 \u0434\u043b\u044f \u0441\u0432\u043e\u0431\u043e\u0434\u044b \u0432\u0435\u0440\u043e\u0438\u0441\u043f\u043e\u0432\u0435\u0434\u0430\u043d\u0438\u044f \u0441 \u0443\u0447\u0451\u0442\u043e\u043c \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0435\u0439 \u0441\u043b\u0443\u0436\u0431\u044b; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0439 \u043e \u0440\u0435\u043b\u0438\u0433\u0438\u0438, \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u0441\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0432 \u043e\u043a\u0430\u0437\u0430\u043d\u0438\u0438 \u0434\u0443\u0445\u043e\u0432\u043d\u043e\u0439 \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0438. \u0412\u0417\u0410\u0418\u041c\u041e\u0414\u0415\u0419\u0421\u0422\u0412\u0418\u0415 \u0421 \u0420\u0415\u041b\u0418\u0413\u0418\u041e\u0417\u041d\u042b\u041c\u0418 \u041e\u0411\u042a\u0415\u0414\u0418\u041d\u0415\u041d\u0418\u042f\u041c\u0418 \u2014 \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f: \u0441\u043e\u0437\u0434\u0430\u043d\u0438\u0435 \u0443\u0441\u043b\u043e\u0432\u0438\u0439 \u0434\u043b\u044f \u0432\u0435\u0440\u043e\u0438\u0441\u043f\u043e\u0432\u0435\u0434\u0430\u043d\u0438\u044f; \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0438 \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0445 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0435\u0439; \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043f\u0440\u043e\u0441\u0432\u0435\u0442\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043d\u0440\u0430\u0432\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u044f; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438. \u0424\u041e\u0420\u041c\u042b \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f: \u0440\u0430\u0431\u043e\u0447\u0438\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0438 \u043a\u043e\u043e\u0440\u0434\u0438\u043d\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0435 \u0441\u043e\u0432\u0435\u0449\u0430\u043d\u0438\u044f; \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u043d\u044b\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u0440\u0435\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u0438 \u043f\u0440\u0430\u0432\u0430 \u043d\u0430 \u0432\u0435\u0440\u043e\u0438\u0441\u043f\u043e\u0432\u0435\u0434\u0430\u043d\u0438\u0435; \u0434\u0443\u0445\u043e\u0432\u043d\u043e-\u043f\u0440\u043e\u0441\u0432\u0435\u0442\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430; \u0430\u043d\u0430\u043b\u0438\u0437 \u0440\u0435\u043b\u0438\u0433\u0438\u043e\u0437\u043d\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438.\n\n\u0412.30-31 \u0423\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0415 \u0418 \u041f\u041b\u0410\u041d\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u0415 \u0412\u041f\u0420. \u0423\u041f\u0420\u0410\u0412\u041b\u0415\u041d\u0418\u0415 \u0412\u041f\u0420 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442: \u043e\u0446\u0435\u043d\u043a\u0443 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u043f\u0440\u0438\u043d\u044f\u0442\u0438\u0435 \u0440\u0435\u0448\u0435\u043d\u0438\u0439; \u043f\u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0443 (\u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435) \u0437\u0430\u0434\u0430\u0447; \u043f\u043b\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044e \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f; \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u043e \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u043e\u0439; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0438 \u043f\u043e\u043c\u043e\u0449\u044c; \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u043e \u0412\u041f(\u041f)\u041e. \u0412\u0418\u0414\u042b \u041f\u041b\u0410\u041d\u041e\u0412: \u043f\u0435\u0440\u0441\u043f\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0435 \u2014 \u041e\u0422\u041e: \u043f\u043e\u043b\u0443\u0433\u043e\u0434\u0438\u0435; \u0441\u043e\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u0435 \u0438 \u0442\u0435\u0440\u0440\u0438\u0442\u043e\u0440\u0438\u0430\u043b\u044c\u043d\u044b\u0439 \u043e\u0440\u0433\u0430\u043d: \u043a\u0432\u0430\u0440\u0442\u0430\u043b; \u0442\u0435\u043a\u0443\u0449\u0438\u0435 \u2014 \u043d\u0430 \u043c\u0435\u0441\u044f\u0446; \u0446\u0435\u043b\u0435\u0432\u044b\u0435 \u2014 \u043d\u0430 \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u0443\u044e \u0421\u0411\u0417, \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u044e, \u0443\u0447\u0435\u043d\u0438\u0435. \u0412 \u0420\u041e\u0422\u0415 \u0440\u0430\u0437\u0440\u0430\u0431\u0430\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f: \u043f\u043b\u0430\u043d \u0412\u041f\u0420 \u043d\u0430 \u043c\u0435\u0441\u044f\u0446 (\u043f\u043e \u0434\u043d\u044f\u043c); \u043f\u043b\u0430\u043d \u0412\u041f\u0420 \u043d\u0430 \u043f\u0435\u0440\u0438\u043e\u0434 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044f \u0437\u0430\u0434\u0430\u0447\u0438. \u0414\u043b\u044f \u043a\u0430\u0440\u0430\u0443\u043b\u0435 (\u0431\u043e\u043b\u0435\u0435 \u0441\u0443\u0442\u043e\u043a) \u2014 \u043f\u043b\u0430\u043d \u0412\u041f\u0420; \u043c\u0435\u043d\u0435\u0435 \u0441\u0443\u0442\u043e\u043a \u2014 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u043e\u0435 \u0437\u0430\u0434\u0430\u043d\u0438\u0435 \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0443. \u041f\u041b\u0410\u041d \u0412\u041f\u0420 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442 \u0440\u0430\u0437\u0434\u0435\u043b\u044b: \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u0412\u041f\u0420 \u0441\u0442\u0430\u0440\u0448\u0435\u0433\u043e \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0430; \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f\u043c \u0412\u041f\u0420; \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u0441 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0438\u043c\u0438 \u043e\u0440\u0433\u0430\u043d\u0430\u043c\u0438.\n\n\u0412.32-34 \u0412\u041f\u0420 \u041f\u0420\u0418 \u0412\u042b\u041f\u041e\u041b\u041d\u0415\u041d\u0418\u0418 \u0421\u0411\u0417. 3 \u041f\u0415\u0420\u0418\u041e\u0414\u0410: \u043f\u0440\u0438 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0435 \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0437\u0430\u0434\u0430\u0447\u0438; \u0432 \u0445\u043e\u0434\u0435 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044f; \u043f\u043e \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0438\u0438. \u041e\u0421\u041e\u0411\u0415\u041d\u041d\u041e\u0421\u0422\u0418 \u0412\u041f\u0420 \u043f\u0440\u0438 \u0421\u0411\u0417 \u043e\u0431\u0443\u0441\u043b\u043e\u0432\u043b\u0435\u043d\u044b: \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u043c\u0438 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u043c\u0438 \u0440\u0430\u0437\u043c\u0435\u0449\u0435\u043d\u0438\u044f; \u0443\u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0442\u043e\u0432\u0430\u043d\u043d\u043e\u0441\u0442\u044c\u044e \u0421\u0438\u0421 \u0412\u041f\u0420; \u041c\u041f\u041f\u0421 \u043b/\u0441. \u0412\u041f\u0420 \u043f\u0440\u0438 \u0411\u0415\u0417\u041e\u041f\u0410\u0421\u041d\u041e\u0421\u0422\u0418 \u0412\u041e\u0415\u041d\u041d\u041e\u0419 \u0421\u041b\u0423\u0416\u0411\u042b: \u043f\u0440\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0410\u041f\u0420 \u0434\u043b\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u044f \u0437\u0434\u043e\u0440\u043e\u0432\u043e\u0439 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0440\u0430\u0431\u043e\u0442\u044b \u043f\u043e \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u044e \u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0439 \u0443\u0441\u0442\u0430\u0432\u043d\u044b\u0445 \u043f\u0440\u0430\u0432\u0438\u043b \u0432\u0437\u0430\u0438\u043c\u043e\u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0439; \u0440\u0430\u0431\u043e\u0442\u0430 \u043f\u043e \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u043c \u043f\u0440\u043e\u0438\u0441\u0448\u0435\u0441\u0442\u0432\u0438\u044f\u043c; \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u0435 \u043c\u043e\u0440\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u043a\u0430\u0447\u0435\u0441\u0442\u0432; \u043a\u043e\u043e\u0440\u0434\u0438\u043d\u0430\u0446\u0438\u044f \u043f\u043e \u0441\u0442\u0440\u0430\u0445\u043e\u0432\u0430\u043d\u0438\u044e \u0436\u0438\u0437\u043d\u0438 \u0438 \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u044f \u043f\u043e\u0441\u0442\u0440\u0430\u0434\u0430\u0432\u0448\u0438\u0445; \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0441 \u043f\u0440\u043e\u043a\u0443\u0440\u0430\u0442\u0443\u0440\u043e\u0439 \u0438 \u0441\u0443\u0434\u0430\u043c\u0438. \u0412\u041f\u0420 \u0412 \u041a\u0410\u0420\u0410\u0423\u041b\u0415: \u0437\u0430\u0434\u0430\u0447\u0438 \u2014 \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u0437\u043d\u0430\u0447\u0438\u043c\u043e\u0441\u0442\u0438 \u0437\u0430\u0434\u0430\u0447 \u043f\u043e \u043e\u0445\u0440\u0430\u043d\u0435; \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432, \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u044f\u044e\u0449\u0438\u0445 \u0431\u043e\u0435\u0432\u0443\u044e \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438; \u0432\u0441\u0435\u0441\u0442\u043e\u0440\u043e\u043d\u043d\u0435\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043d\u0430\u0431\u043b\u044e\u0434\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u0438 \u0442\u0430\u043a\u0442\u0430. \u0412\u041f\u0420 \u0432 \u043a\u0430\u0440\u0430\u0443\u043b\u0435 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442: \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b; \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u044e \u043d\u0430 \u043f\u043e\u0432\u044b\u0448\u0435\u043d\u0438\u0435 \u0431\u0434\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0441\u043e\u043f\u0440\u043e\u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435.\n\n\u0412.35 \u041e\u0411\u042f\u0417\u0410\u041d\u041d\u041e\u0421\u0422\u0418 \u0417\u041a\u0420\u0412\u041f\u0420. \u0417\u041a\u0420 \u043f\u043e \u0412\u041f\u0420 \u043e\u0442\u0432\u0435\u0447\u0430\u0435\u0442: \u0437\u0430 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044e \u0438 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0412\u041f\u0420; \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435, \u041c\u041f\u041f\u0421, \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0443, \u0412\u041f\u041f \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435. \u041e\u0441\u043d\u043e\u0432\u043d\u0430\u044f \u0444\u043e\u0440\u043c\u0430 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u2014 \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u043a\u0430\u0436\u0434\u044b\u043c \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u043c. \u041f\u043e\u0434\u0447\u0438\u043d\u044f\u0435\u0442\u0441\u044f \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0443 \u0440\u043e\u0442\u044b, \u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u043f\u0440\u044f\u043c\u044b\u043c \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u043e\u043c \u0432\u0441\u0435\u0433\u043e \u043b\u0438\u0447\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u0430\u0432\u0430. \u041e\u0421\u041d\u041e\u0412\u041d\u042b\u0415 \u041e\u0411\u042f\u0417\u0410\u041d\u041d\u041e\u0421\u0422\u0418: \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u043e\u0432\u044b\u0432\u0430\u0442\u044c \u0438 \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u044c \u0412\u041f\u0420; \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u044f\u0442\u044c \u0440\u0435\u0448\u0435\u043d\u0438\u044f \u041f\u0440\u0435\u0437\u0438\u0434\u0435\u043d\u0442\u0430 \u0420\u0424; \u043b\u0438\u0447\u043d\u043e \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u044c \u0412\u041f\u041f \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435; \u0432\u0441\u0435\u0441\u0442\u043e\u0440\u043e\u043d\u043d\u0435 \u0437\u043d\u0430\u0442\u044c \u043b\u0438\u0447\u043d\u044b\u0439 \u0441\u043e\u0441\u0442\u0430\u0432, \u0441\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u0442\u044c \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0443\u044e \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043a\u0443 \u0440\u043e\u0442\u044b; \u043e\u0431\u0443\u0447\u0430\u0442\u044c \u043e\u0444\u0438\u0446\u0435\u0440\u043e\u0432, \u043f\u0440\u0430\u043f\u043e\u0440\u0449\u0438\u043a\u043e\u0432 \u0438 \u0441\u0435\u0440\u0436\u0430\u043d\u0442\u043e\u0432 \u043c\u0435\u0442\u043e\u0434\u0438\u043a\u0435 \u0418\u0412\u0420; \u0443\u0447\u0430\u0441\u0442\u0432\u043e\u0432\u0430\u0442\u044c \u0432 \u043f\u043e\u0434\u0432\u0435\u0434\u0435\u043d\u0438\u0438 \u0438\u0442\u043e\u0433\u043e\u0432; \u0430\u043d\u0430\u043b\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b; \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u044c \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u044e \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b; \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442\u044c \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0435 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u0435; \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0438\u0442\u044c \u0440\u043e\u0442\u043d\u043e\u0439 \u0445\u0443\u0434\u043e\u0436\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0439 \u0441\u0430\u043c\u043e\u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c\u044e; \u0441\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u043e\u0432\u0430\u0442\u044c \u0440\u0430\u0431\u043e\u0442\u0435 \u0441 \u0432\u0435\u0440\u0443\u044e\u0449\u0438\u043c\u0438; \u043e\u0441\u0443\u0449\u0435\u0441\u0442\u0432\u043b\u044f\u0442\u044c \u043f\u043e\u0434\u0431\u043e\u0440 \u0430\u043a\u0442\u0438\u0432\u0430; \u0437\u043d\u0430\u0442\u044c \u043d\u0443\u0436\u0434\u044b \u043b/\u0441; \u0434\u043e\u043a\u043b\u0430\u0434\u044b\u0432\u0430\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0443 \u0440\u043e\u0442\u044b \u0438 \u0417\u041a \u0431\u0430\u0442\u0430\u043b\u044c\u043e\u043d\u0430 \u043f\u043e \u0412\u041f\u0420.\n\n\u0412.36 \u0410\u041b\u0413\u041e\u0420\u0418\u0422\u041c \u0417\u041a\u0420 \u041f\u041e \u0412\u041f\u0420 \u2014 13 \u042d\u0422\u0410\u041f\u041e\u0412. 1.\u0423\u044f\u0441\u043d\u0435\u043d\u0438\u0435 \u0437\u0430\u0434\u0430\u0447\u0438 \u2014 \u0446\u0435\u043b\u044c \u0438 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439, \u0437\u0430\u043c\u044b\u0441\u0435\u043b \u0441\u0442\u0430\u0440\u0448\u0435\u0433\u043e, \u043c\u0435\u0441\u0442\u043e \u0441\u0432\u043e\u0438\u0445 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0439, \u0437\u0430\u0434\u0430\u0447\u0438 \u043f\u043e \u0412\u041f\u0420 \u0432\u044b\u0448\u0435\u0441\u0442\u043e\u044f\u0449\u0438\u0445, \u0441\u0440\u043e\u043a\u0438 \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438. 2.\u041e\u0446\u0435\u043d\u043a\u0430 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u2014 \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f, \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0447\u0435\u0441\u043a\u0430\u044f, \u043e\u043f\u0435\u0440\u0430\u0442\u0438\u0432\u043d\u0430\u044f \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430; \u041c\u041f\u041f\u0421 \u043b/\u0441; \u0421\u0438\u0421 \u0412\u041f\u0420. 3.\u041f\u0440\u043e\u0433\u043d\u043e\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u0438 \u041c\u041f\u041f\u0421 \u2014 \u043f\u0440\u0435\u0432\u0435\u043d\u0442\u0438\u0432\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430 \u043d\u0435\u0433\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u0444\u0430\u043a\u0442\u043e\u0440\u043e\u0432, \u0438\u0445 \u0443\u043f\u0440\u0435\u0436\u0434\u0435\u043d\u0438\u0435. 4.\u0420\u0430\u0441\u0447\u0451\u0442 \u0432\u0440\u0435\u043c\u0435\u043d\u0438 \u2014 \u043e\u0431\u044a\u0451\u043c \u0432\u0440\u0435\u043c\u0435\u043d\u0438, \u0433\u0440\u0430\u0444\u0438\u043a \u0440\u0430\u0431\u043e\u0442\u044b, \u043c\u0435\u0442\u043e\u0434\u044b (\u043f\u043e\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439, \u043f\u0430\u0440\u0430\u043b\u043b\u0435\u043b\u044c\u043d\u044b\u0439). 5.\u041f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043f\u0440\u0435\u0434\u043b\u043e\u0436\u0435\u043d\u0438\u0439 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0443 \u043d\u0430 \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044e \u0412\u041f\u0420. 6.\u041f\u0440\u0438\u043d\u044f\u0442\u0438\u0435 \u0440\u0435\u0448\u0435\u043d\u0438\u044f. 7.\u041f\u043b\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439 \u0412\u041f\u0420. 8.\u041f\u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 (\u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435) \u0437\u0430\u0434\u0430\u0447 \u043f\u043e\u0434\u0447\u0438\u043d\u0451\u043d\u043d\u044b\u043c (\u0440\u0430\u0441\u043f\u043e\u0440\u044f\u0436\u0435\u043d\u0438\u0435\u043c: \u0432\u044b\u0432\u043e\u0434\u044b \u0438\u0437 \u043e\u0446\u0435\u043d\u043a\u0438; \u0437\u0430\u0434\u0430\u0447\u0438 \u0438 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f; \u0441\u0440\u043e\u043a\u0438; \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0434\u043e\u043d\u0435\u0441\u0435\u043d\u0438\u0439; \u0441\u0440\u043e\u043a \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438). 9.\u041e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u044f \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f. 10.\u0420\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u043e \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u043e\u0439 \u043f\u043e\u0434\u0447\u0438\u043d\u0451\u043d\u043d\u044b\u0445 \u2014 \u0443\u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0442\u043e\u0432\u0430\u043d\u0438\u0435 \u0412\u041f(\u041f)\u041e; \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u0435 \u041c\u0422\u0421; \u0440\u0430\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u043f\u043e \u0431\u043e\u0435\u0432\u043e\u043c\u0443 \u043f\u043e\u0440\u044f\u0434\u043a\u0443; \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435. 11.\u041a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0438 \u043f\u043e\u043c\u043e\u0449\u044c \u2014 \u0441\u0431\u043e\u0440 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438; \u043e\u043a\u0430\u0437\u0430\u043d\u0438\u0435 \u043f\u043e\u043c\u043e\u0449\u0438; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044f. 12.\u041d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u0440\u0443\u043a\u043e\u0432\u043e\u0434\u0441\u0442\u0432\u043e \u0412\u041f(\u041f)\u041e \u043f\u0440\u0438 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u0438 \u0437\u0430\u0434\u0430\u0447 \u2014 \u043c\u0430\u043d\u0435\u0432\u0440 \u0441\u0438\u043b\u0430\u043c\u0438; \u0443\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0443\u0441\u0442\u043e\u0439\u0447\u0438\u0432\u043e\u0441\u0442\u044c; \u0437\u0430\u0449\u0438\u0442\u0430 \u043e\u0442 \u041d\u0418\u041f\u0412; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u0439. 13.\u0414\u043e\u043a\u043b\u0430\u0434 \u043e \u043f\u0440\u043e\u0434\u0435\u043b\u0430\u043d\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u0435.\n\n\u0412.37-39 \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0418 \u041e\u0426\u0415\u041d\u041a\u0418, \u041f\u0420\u0415\u0414\u041b\u041e\u0416\u0415\u041d\u0418\u0419 \u0418 \u041f\u041b\u0410\u041d\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u042f. \u041e\u0426\u0415\u041d\u041a\u0410 \u041e\u0411\u0421\u0422\u0410\u041d\u041e\u0412\u041a\u0418 \u2014 3 \u0431\u043b\u043e\u043a\u0430: 1)\u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f, \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0447\u0435\u0441\u043a\u0430\u044f, \u043e\u043f\u0435\u0440\u0430\u0442\u0438\u0432\u043d\u0430\u044f \u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u0430\u044f \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430; 2)\u041c\u041f\u041f\u0421 \u043b\u0438\u0447\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u0430\u0432\u0430; 3)\u0421\u0438\u0421 \u0412\u041f\u0420 \u0441\u0432\u043e\u0438\u0445 \u0438 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044e\u0449\u0438\u0445 \u043e\u0440\u0433\u0430\u043d\u043e\u0432. \u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0438: \u0434\u043e\u043a\u043b\u0430\u0434\u044b \u043f\u043e\u0434\u0447\u0438\u043d\u0451\u043d\u043d\u044b\u0445 \u0412\u041f(\u041f)\u041e, \u0434\u0430\u043d\u043d\u044b\u0435 \u0440\u0430\u0437\u0432\u0435\u0434\u043a\u0438, \u0430\u043d\u0430\u043b\u0438\u0437 \u0421\u041c\u0418, \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433 \u0441\u043e\u0446\u0441\u0435\u0442\u0435\u0439, \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f \u043e\u0442 \u043c\u0435\u0441\u0442\u043d\u043e\u0433\u043e \u043d\u0430\u0441\u0435\u043b\u0435\u043d\u0438\u044f. \u041f\u0420\u0415\u0414\u041b\u041e\u0416\u0415\u041d\u0418\u042f \u0412 \u0420\u0415\u0428\u0415\u041d\u0418\u0415 \u2014 7 \u041f\u0423\u041d\u041a\u0422\u041e\u0412: 1)\u0432\u044b\u0432\u043e\u0434\u044b \u0438\u0437 \u043e\u0446\u0435\u043d\u043a\u0438 \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438; 2)\u0446\u0435\u043b\u0438 \u0438 \u0437\u0430\u0434\u0430\u0447\u0438 \u0412\u041f\u0420 (\u043f\u0440\u0438 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0435, \u0432 \u0445\u043e\u0434\u0435, \u043f\u043e\u0441\u043b\u0435); 3)\u043e\u0441\u043d\u043e\u0432\u043d\u044b\u0435 \u043c\u0435\u0440\u043e\u043f\u0440\u0438\u044f\u0442\u0438\u044f \u043f\u043e \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f\u043c; 4)\u043f\u0440\u0438\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u0421\u0438\u0421 \u0412\u041f\u0420; 5)\u0432\u043e\u043f\u0440\u043e\u0441\u044b \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f; 6)\u0432\u043e\u043f\u0440\u043e\u0441\u044b \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0435\u043d\u0438\u044f \u043f\u0435\u0447\u0430\u0442\u043d\u044b\u043c\u0438 \u0438\u0437\u0434\u0430\u043d\u0438\u044f\u043c\u0438 \u0438 \u041c\u0422\u0421; 7)\u043e\u0441\u043d\u043e\u0432\u044b \u043e\u0440\u0433\u0430\u043d\u0438\u0437\u0430\u0446\u0438\u0438 \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f. \u041f\u0420\u0418\u041d\u0426\u0418\u041f\u042b \u041f\u041b\u0410\u041d\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u042f (4): \u043d\u0430\u0443\u0447\u043d\u043e\u0441\u0442\u044c; \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441\u043d\u044b\u0439 \u043f\u043e\u0434\u0445\u043e\u0434; \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u0441\u0442\u044c \u0438 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u0434\u0438\u0444\u0444\u0435\u0440\u0435\u043d\u0446\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u044b\u0439 \u043f\u043e\u0434\u0445\u043e\u0434.\n\n\u0412.40-43 \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0418 \u0417\u0410\u041d\u042f\u0422\u0418\u0419 \u041f\u041e \u0412\u041f\u041f. \u041f\u041b\u0410\u041d-\u041a\u041e\u041d\u0421\u041f\u0415\u041a\u0422 \u2014 \u0441\u043e\u0441\u0442\u043e\u0438\u0442 \u0438\u0437 \u043f\u0440\u0435\u0430\u043c\u0431\u0443\u043b\u044b \u0438 3 \u0447\u0430\u0441\u0442\u0435\u0439: \u0432\u0441\u0442\u0443\u043f\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0439, \u043e\u0441\u043d\u043e\u0432\u043d\u043e\u0439, \u0437\u0430\u043a\u043b\u044e\u0447\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0439. \u041f\u0420\u0415\u0410\u041c\u0411\u0423\u041b\u0410: \u0442\u0435\u043c\u0430 \u0438 \u0443\u0447\u0435\u0431\u043d\u044b\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u044b; \u0443\u0447\u0435\u0431\u043d\u044b\u0435 \u0438 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0446\u0435\u043b\u0438; \u043c\u0435\u0441\u0442\u043e \u0438 \u0444\u043e\u0440\u043c\u0430 \u0437\u0430\u043d\u044f\u0442\u0438\u044f; \u0440\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u0432\u0440\u0435\u043c\u0435\u043d\u0438; \u0441\u043f\u0438\u0441\u043e\u043a \u043b\u0438\u0442\u0435\u0440\u0430\u0442\u0443\u0440\u044b \u0438 \u0432\u0438\u0434\u0435\u043e\u0444\u0438\u043b\u044c\u043c\u043e\u0432. \u041e\u0421\u041d\u041e\u0412\u041d\u0410\u042f \u0427\u0410\u0421\u0422\u042c: \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043d\u0438\u044f \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0434\u0435\u043c\u043e\u043d\u0441\u0442\u0440\u0430\u0446\u0438\u043e\u043d\u043d\u044b\u0445 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u043e\u0432 (\u0441\u043b\u0430\u0439\u0434\u044b, \u0432\u0438\u0434\u0435\u043e, \u0430\u0443\u0434\u0438\u043e, \u043f\u043b\u0430\u043a\u0430\u0442\u044b, \u0440\u0430\u0437\u0434\u0430\u0442\u043e\u0447\u043d\u044b\u0439 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b); \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u043e-\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0440\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u0430; \u0432\u044b\u0432\u043e\u0434\u044b; \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c\u043d\u044b\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u044b; \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044b \u043f\u043e \u0441\u043f\u0435\u0446\u0438\u0444\u0438\u043a\u0435 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f. \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0410 \u041f\u0420\u041e\u0412\u0415\u0414\u0415\u041d\u0418\u042f: \u0432\u0432\u043e\u0434\u043d\u0430\u044f \u0447\u0430\u0441\u0442\u044c (\u043f\u0440\u0438\u0451\u043c \u0434\u043e\u043a\u043b\u0430\u0434\u0430, \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u043b/\u0441, \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u0442\u0435\u043c\u044b/\u0446\u0435\u043b\u0435\u0439/\u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432/\u0430\u043a\u0442\u0443\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u0438/\u043b\u0438\u0442\u0435\u0440\u0430\u0442\u0443\u0440\u044b, \u0442\u0435\u043a\u0443\u0449\u0438\u0439 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c); \u043e\u0441\u043d\u043e\u0432\u043d\u0430\u044f \u0447\u0430\u0441\u0442\u044c (\u043d\u0430\u0437\u0432\u0430\u043d\u0438\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u0430, \u0430\u043a\u0442\u0443\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u044c, \u0441\u043e\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435); \u043c\u0435\u0442\u043e\u0434\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043f\u0440\u0438\u0451\u043c\u044b (\u043f\u0440\u0438\u0432\u043b\u0435\u0447\u0435\u043d\u0438\u0435 \u043f\u043e\u043c\u043e\u0449\u043d\u0438\u043a\u043e\u0432, \u043e\u043f\u0440\u043e\u0441, \u043a\u0430\u0440\u0442\u044b, \u043e\u0431\u0440\u0430\u0442\u043d\u0430\u044f \u0441\u0432\u044f\u0437\u044c, \u0437\u0430\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0435, \u043a\u0440\u0435\u0430\u0442\u0438\u0432\u043d\u044b\u0435 \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u044b). \u041e\u0426\u0415\u041d\u041a\u0410 \u2014 \u0442\u0435 \u0436\u0435 \u043f\u043e\u0440\u043e\u0433\u0438 90/80/70%, \u0447\u0442\u043e \u0438 \u0432 \u0432\u043e\u043f\u0440\u043e\u0441\u0435 8.\n\n\u0412.44-49 \u0418\u0412\u0420: \u0414\u041e\u041a\u0423\u041c\u0415\u041d\u0422\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u0415 \u0418 4 \u0412\u0418\u0414\u0410 \u0411\u0415\u0421\u0415\u0414\u042b. \u0414\u041e\u041a\u0423\u041c\u0415\u041d\u0422\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u0415: \u0441\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0441\u043f\u0438\u0441\u043a\u0430 \u043b/\u0441 \u043f\u043e \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f\u043c; \u043f\u043b\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0418\u0412\u0420 (\u0431\u0430\u0442\u0430\u043b\u044c\u043e\u043d \u2014 \u043d\u0430 \u043c\u0435\u0441\u044f\u0446; \u0443\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043f\u043e\u043b\u043a\u0430, \u0441\u043e\u0435\u0434\u0438\u043d\u0435\u043d\u0438\u044f \u2014 \u043d\u0430 \u043a\u0432\u0430\u0440\u0442\u0430\u043b); \u0443\u0447\u0451\u0442 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u0432 \u043a\u0430\u0440\u0442\u0435 \u0418\u0412\u0420. \u041f\u0415\u0420\u0418\u041e\u0414\u0418\u0427\u041d\u041e\u0421\u0422\u042c: \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u044b \u043e\u0442\u0434\u0435\u043b\u0435\u043d\u0438\u0439 \u2014 \u043f\u043e\u0441\u0442\u043e\u044f\u043d\u043d\u043e (\u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435), \u0435\u0436\u0435\u043d\u0435\u0434\u0435\u043b\u044c\u043d\u044b\u0439 \u0434\u043e\u043a\u043b\u0430\u0434; \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u044b \u0432\u0437\u0432\u043e\u0434\u043e\u0432 \u0438 \u0417\u041a\u0420 \u043f\u043e \u0412\u041f\u0420 \u0441 \u0441\u043e\u043b\u0434\u0430\u0442\u0430\u043c\u0438 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446; \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u044b \u0440\u043e\u0442 \u0441 \u043f\u0440\u0430\u043f\u043e\u0440\u0449\u0438\u043a\u0430\u043c\u0438 \u0438 \u0441\u0435\u0440\u0436\u0430\u043d\u0442\u0430\u043c\u0438 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043a\u0432\u0430\u0440\u0442\u0430\u043b; \u0441 \u043f\u0440\u0438\u0437\u044b\u0432\u043d\u0438\u043a\u0430\u043c\u0438 \u2014 \u22652 \u0440\u0430\u0437\u0430 \u043d\u0430 \u0443\u0447\u0435\u0431\u043d\u043e\u043c \u0441\u0431\u043e\u0440\u0435, \u0437\u0430\u0442\u0435\u043c \u0435\u0436\u0435\u043c\u0435\u0441\u044f\u0447\u043d\u043e; \u0441 \u0432\u043d\u043e\u0432\u044c \u043f\u0440\u0438\u043d\u044f\u0442\u044b\u043c\u0438 \u043f\u043e \u043a\u043e\u043d\u0442\u0440\u0430\u043a\u0442\u0443 \u2014 \u22651 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446 \u0432 \u043f\u0435\u0440\u0432\u044b\u0439 \u0433\u043e\u0434; \u0441 \u043d\u043e\u0441\u0438\u0442\u0435\u043b\u044f\u043c\u0438 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0432\u0437\u0433\u043b\u044f\u0434\u043e\u0432 \u2014 \u043f\u0440\u0438 \u043f\u043e\u043b\u0443\u0447\u0435\u043d\u0438\u0438 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438, \u0437\u0430\u0442\u0435\u043c \u0435\u0436\u0435\u043a\u0432\u0430\u0440\u0442\u0430\u043b\u044c\u043d\u043e; \u0441 \u043d\u0430\u0440\u0443\u0448\u0438\u0442\u0435\u043b\u044f\u043c\u0438 \u2014 \u0432 \u0442\u0435\u0447\u0435\u043d\u0438\u0435 3 \u0434\u043d\u0435\u0439 \u043f\u043e\u0441\u043b\u0435 \u0440\u0430\u0441\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u044f.\n\n\u0421\u0422\u0420\u0423\u041a\u0422\u0423\u0420\u0410 \u041b\u042e\u0411\u041e\u0419 \u0411\u0415\u0421\u0415\u0414\u042b (\u043e\u0434\u0438\u043d\u0430\u043a\u043e\u0432\u0430 \u0434\u043b\u044f \u0432\u0441\u0435\u0445 4 \u0432\u0438\u0434\u043e\u0432, 4 \u0447\u0430\u0441\u0442\u0438):\n1.\u041f\u041e\u0414\u0413\u041e\u0422\u041e\u0412\u0418\u0422\u0415\u041b\u042c\u041d\u0410\u042f \u0427\u0410\u0421\u0422\u042c \u2014 \u0438\u0437\u0443\u0447\u0438\u0442\u044c \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044e \u043e \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0435\u043c, \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0438\u0442\u044c \u0437\u0430\u0434\u0430\u0447\u0438, \u043f\u0440\u0435\u0434\u043f\u043e\u043b\u0430\u0433\u0430\u0435\u043c\u044b\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442, \u043f\u043e\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432. \u0424\u0430\u043a\u0442\u043e\u0440\u044b \u0434\u043b\u044f \u0438\u0437\u0443\u0447\u0435\u043d\u0438\u044f: \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u044b, \u0432\u0437\u0433\u043b\u044f\u0434\u044b, \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f; \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043e \u043f\u0435\u0440\u0441\u043f\u0435\u043a\u0442\u0438\u0432\u0430\u0445; \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0430; \u043a\u0440\u0443\u0433 \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u043e\u0432 \u0434\u043e \u0441\u043b\u0443\u0436\u0431\u044b; \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0435 \u043a \u0441\u043b\u0443\u0436\u0431\u0435; \u0434\u043e\u0441\u0443\u0433; \u0441\u0435\u043c\u0435\u0439\u043d\u044b\u0435 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f; \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u0435.\n2.\u0412\u0412\u041e\u0414\u041d\u0410\u042f \u0427\u0410\u0421\u0422\u042c \u2014 \u0437\u0430\u0438\u043d\u0442\u0435\u0440\u0435\u0441\u043e\u0432\u0430\u0442\u044c, \u043f\u0440\u0438\u0432\u043b\u0435\u0447\u044c \u043a \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u0443, \u0441\u043d\u044f\u0442\u044c \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435 \u0438 \u043d\u0430\u0441\u0442\u043e\u0440\u043e\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u044c. \u0421\u043f\u043e\u0441\u043e\u0431\u044b \u0441\u043d\u0438\u0436\u0435\u043d\u0438\u044f \u0431\u0430\u0440\u044c\u0435\u0440\u0430: \u043d\u0430\u0437\u0432\u0430\u0442\u044c \u043f\u043e \u0438\u043c\u0435\u043d\u0438 \u0438 \u043e\u0442\u0447\u0435\u0441\u0442\u0432\u0443; \u0441\u043a\u0430\u0437\u0430\u0442\u044c \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u0442\u0451\u043f\u043b\u044b\u0445 \u0441\u043b\u043e\u0432; \u0441\u043f\u0440\u043e\u0441\u0438\u0442\u044c \u043e \u0434\u0435\u043b\u0430\u0445, \u0441\u0435\u043c\u044c\u0435; \u0432\u044b\u0440\u0430\u0437\u0438\u0442\u044c \u043f\u0440\u0438\u0437\u043d\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c \u0437\u0430 \u043e\u0442\u043a\u0440\u043e\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c.\n3.\u041e\u0421\u041d\u041e\u0412\u041d\u041e\u0419 \u042d\u0422\u0410\u041f \u2014 \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0434\u0438\u0430\u043b\u043e\u0433: \u043e\u0431\u0449\u0438\u0435 \u043e\u0442\u043a\u0440\u044b\u0442\u044b\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u044b \u2192 \u0447\u0430\u0441\u0442\u043d\u044b\u0435 \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u044b\u0435; \u0443\u0431\u0435\u0434\u0438\u0442\u044c, \u043f\u043e\u0432\u043b\u0438\u044f\u0442\u044c \u043d\u0430 \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435. \u0412\u0435\u0440\u0431\u0430\u043b\u044c\u043d\u043e\u0435 \u0438 \u043d\u0435\u0432\u0435\u0440\u0431\u0430\u043b\u044c\u043d\u043e\u0435 \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435. \u041f\u0440\u0430\u0432\u0438\u043b\u0430: \u0441\u043b\u0443\u0448\u0430\u0442\u044c \u0431\u043e\u043b\u044c\u0448\u0435; \u043f\u0440\u043e\u044f\u0432\u043b\u044f\u0442\u044c \u0443\u0432\u0430\u0436\u0435\u043d\u0438\u0435; \u043d\u0435 \u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c, \u0447\u0442\u043e \u0441\u043e\u0431\u0435\u0441\u0435\u0434\u043d\u0438\u043a \u043d\u0435 \u043f\u0440\u0430\u0432.\n4.\u0417\u0410\u0412\u0415\u0420\u0428\u0410\u042e\u0429\u0410\u042f \u0424\u0410\u0417\u0410 \u2014 \u0441\u043e\u0437\u0434\u0430\u0442\u044c \u0445\u043e\u0440\u043e\u0448\u0435\u0435 \u0432\u043f\u0435\u0447\u0430\u0442\u043b\u0435\u043d\u0438\u0435, \u043e\u0441\u043b\u0430\u0431\u0438\u0442\u044c \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435, \u0432\u044b\u0440\u0430\u0437\u0438\u0442\u044c \u043f\u0440\u0438\u0437\u043d\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u044c, \u0441\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c \u043a \u0434\u0430\u043b\u044c\u043d\u0435\u0439\u0448\u0435\u0439 \u0440\u0430\u0431\u043e\u0442\u0435.\n\n\u0423\u041d\u0418\u041a\u0410\u041b\u042c\u041d\u042b\u0415 \u0426\u0415\u041b\u0418 4 \u0412\u0418\u0414\u041e\u0412 \u0411\u0415\u0421\u0415\u0414\u042b (\u0435\u0434\u0438\u043d\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u0440\u0430\u0437\u043b\u0438\u0447\u0438\u0435 \u043c\u0435\u0436\u0434\u0443 \u043d\u0438\u043c\u0438):\n\u2014 \u041e\u0417\u041d\u0410\u041a\u041e\u041c\u0418\u0422\u0415\u041b\u042c\u041d\u0410\u042f: \u043b\u0438\u0447\u043d\u043e \u043f\u043e\u0437\u043d\u0430\u043a\u043e\u043c\u0438\u0442\u044c\u0441\u044f \u0441 \u0432\u043e\u0435\u043d\u043d\u043e\u0441\u043b\u0443\u0436\u0430\u0449\u0438\u043c; \u0440\u0430\u0437\u044a\u044f\u0441\u043d\u0438\u0442\u044c \u0432\u0430\u0440\u0438\u0430\u043d\u0442\u044b \u0434\u043e\u043b\u0436\u043d\u043e\u0433\u043e \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u0432 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0435; \u0440\u0430\u0441\u043a\u0440\u044b\u0442\u044c \u043e\u0441\u043d\u043e\u0432\u043d\u044b\u0435 \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u043d\u044b\u0435 \u043e\u0440\u0438\u0435\u043d\u0442\u0438\u0440\u044b \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430; \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043f\u043e\u0437\u0438\u0442\u0438\u0432\u043d\u044b\u0435 \u043f\u0440\u0438\u043c\u0435\u0440\u044b \u0421\u0411\u0414.\n\u2014 \u041f\u041e\u0414\u0414\u0415\u0420\u0416\u0418\u0412\u0410\u042e\u0429\u0410\u042f: \u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e \u0432\u0430\u0436\u043d\u044b\u0435 \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0430 \u043f\u0443\u0442\u0451\u043c \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u043d\u043e\u0433\u043e \u043e\u0431\u0441\u0443\u0436\u0434\u0435\u043d\u0438\u044f \u043f\u0435\u0440\u0441\u043f\u0435\u043a\u0442\u0438\u0432 \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u043e\u0433\u043e, \u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0438 \u0441\u043b\u0443\u0436\u0435\u0431\u043d\u043e\u0433\u043e \u0440\u043e\u0441\u0442\u0430; \u043e\u043f\u043e\u0440\u0430 \u043d\u0430 \u043f\u043e\u043b\u043e\u0436\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0435; \u043c\u0435\u0442\u043e\u0434\u044b \u043f\u043e\u043e\u0449\u0440\u0435\u043d\u0438\u044f \u0438 \u0441\u0442\u0438\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.\n\u2014 \u041a\u041e\u0420\u0420\u0415\u041a\u0422\u0418\u0420\u0423\u042e\u0429\u0410\u042f: \u043f\u0440\u0435\u0434\u043b\u043e\u0436\u0438\u0442\u044c \u0432\u0430\u0440\u0438\u0430\u043d\u0442\u044b \u043f\u0440\u0435\u043e\u0434\u043e\u043b\u0435\u043d\u0438\u044f \u0441\u043b\u043e\u0436\u043d\u043e\u0441\u0442\u0435\u0439, \u043c\u0435\u0448\u0430\u044e\u0449\u0438\u0445 \u0432 \u043f\u043e\u0432\u0441\u0435\u0434\u043d\u0435\u0432\u043d\u043e\u0439 \u0421\u0411\u0414; \u0440\u0430\u0441\u043a\u0440\u044b\u0442\u044c \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e\u0441\u0442\u0438 \u043f\u043e \u0438\u0441\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044e \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u043c\u0435\u0442\u043e\u0434\u044b \u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f, \u043a\u0440\u0438\u0442\u0438\u043a\u0438 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u0438 \u043f\u043e\u0441\u0442\u0443\u043f\u043a\u043e\u0432.\n\u2014 \u041f\u0420\u0415\u0414\u0423\u041f\u0420\u0415\u0414\u0418\u0422\u0415\u041b\u042c\u041d\u0410\u042f: \u043f\u0440\u0435\u0434\u0443\u043f\u0440\u0435\u0434\u0438\u0442\u044c \u043e\u0431 \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u0438 \u0437\u0430 \u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0435 \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0439; \u043e\u0431\u0440\u0430\u0442\u0438\u0442\u044c \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u043d\u0430 \u043d\u0435\u043e\u0442\u0432\u0440\u0430\u0442\u0438\u043c\u043e\u0441\u0442\u044c \u043d\u0430\u043a\u0430\u0437\u0430\u043d\u0438\u044f; \u043f\u0440\u0438\u043d\u0443\u0434\u0438\u0442\u044c \u043a \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044e \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0439, \u0434\u0430\u0436\u0435 \u0435\u0441\u043b\u0438 \u043d\u0435 \u0433\u043e\u0442\u043e\u0432 \u043f\u0440\u0438\u043d\u044f\u0442\u044c \u043d\u043e\u0440\u043c\u044b.\n\n\u0412.50 \u0412\u041f(\u041f) \u0418\u041d\u0424\u041e\u0420\u041c\u0418\u0420\u041e\u0412\u0410\u041d\u0418\u0415: \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0410 \u041f\u0420\u041e\u0412\u0415\u0414\u0415\u041d\u0418\u042f. \u0421\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0430 (6 \u0431\u043b\u043e\u043a\u043e\u0432): 1)\u043d\u0430\u0438\u0431\u043e\u043b\u0435\u0435 \u0437\u043d\u0430\u0447\u0438\u043c\u0430\u044f (\u0440\u0435\u0437\u043e\u043d\u0430\u043d\u0441\u043d\u0430\u044f) \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f; 2)\u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e-\u043f\u043e\u043b\u0438\u0442\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u0438 \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0447\u0435\u0441\u043a\u0430\u044f \u043e\u0431\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u0437\u0430 \u0440\u0443\u0431\u0435\u0436\u043e\u043c; 3)\u043d\u0430\u0438\u0431\u043e\u043b\u0435\u0435 \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0435 \u0441\u043e\u0431\u044b\u0442\u0438\u044f \u0432 \u0441\u0442\u0440\u0430\u043d\u0435; 4)\u0441\u0432\u043e\u0434\u043a\u0430 \u0421\u0412\u041e; 5)\u043d\u0430\u0438\u0431\u043e\u043b\u0435\u0435 \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0435 \u0441\u043e\u0431\u044b\u0442\u0438\u044f \u0432 \u0420\u043e\u0441\u0433\u0432\u0430\u0440\u0434\u0438\u0438; 6)\u043d\u0430\u0438\u0431\u043e\u043b\u0435\u0435 \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u0435 \u0441\u043e\u0431\u044b\u0442\u0438\u044f \u0432 \u0412\u041e\u041e\u0412\u041e (\u0447\u0430\u0441\u0442\u0438, \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0438). \u0422\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u044f \u043a \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0430\u043c: \u0442\u043e\u043b\u044c\u043a\u043e \u043b\u0435\u0433\u0430\u043b\u044c\u043d\u044b\u0435, \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u0430\u044f \u0438 \u0434\u043e\u0441\u0442\u043e\u0432\u0435\u0440\u043d\u0430\u044f.\n\n\u0412.51 \u0421\u0422\u0415\u041d\u041d\u0410\u042f \u041f\u0415\u0427\u0410\u0422\u042c. \u0421\u0442\u0435\u043d\u043d\u0430\u044f \u0433\u0430\u0437\u0435\u0442\u0430 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446 (\u0444\u043e\u0440\u043c\u0430\u0442 \u04101, 4\u20135 \u0437\u0430\u043c\u0435\u0442\u043e\u043a, \u043d\u0430\u0437\u0432\u0430\u043d\u0438\u0435, \u043d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f, \u0444\u0430\u043c\u0438\u043b\u0438\u0438 \u0440\u0435\u0434\u043a\u043e\u043b\u043b\u0435\u0433\u0438\u0438, \u0434\u0430\u0442\u0430, \u043d\u043e\u043c\u0435\u0440). \u0424\u043e\u0442\u043e\u0433\u0430\u0437\u0435\u0442\u0430 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 2 \u043c\u0435\u0441\u044f\u0446\u0430. \u0418\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e-\u0441\u043f\u0440\u0430\u0432\u043e\u0447\u043d\u044b\u0439 \u0431\u044e\u043b\u043b\u0435\u0442\u0435\u043d\u044c \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043a\u0432\u0430\u0440\u0442\u0430\u043b. \u0411\u043e\u0435\u0432\u044b\u0435 \u043b\u0438\u0441\u0442\u043a\u0438 (\u0432\u0437\u0432\u043e\u0434\u043d\u044b\u0435) \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043d\u0435\u0434\u0435\u043b\u044e (\u0432 \u043a\u0430\u0440\u0430\u0443\u043b\u0435 \u2014 \u043d\u0435 \u043c\u0435\u043d\u0435\u0435 1 \u0440\u0430\u0437\u0430 \u0437\u0430 \u0441\u043b\u0443\u0436\u0431\u0443), \u0444\u043e\u0440\u043c\u0430\u0442 \u04103-\u04104, 2\u20133 \u0437\u0430\u043c\u0435\u0442\u043a\u0438, \u043d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435 \u0432\u0437\u0432\u043e\u0434\u0430, \u0434\u0430\u0442\u0430, \u0444\u0430\u043c\u0438\u043b\u0438\u044f \u0440\u0435\u0434\u0430\u043a\u0442\u043e\u0440\u0430. \u041b\u0438\u0441\u0442\u043e\u043a-\u043c\u043e\u043b\u043d\u0438\u044f \u2014 \u0440\u0430\u0437\u043d\u043e\u0432\u0438\u0434\u043d\u043e\u0441\u0442\u044c \u0431\u043e\u0435\u0432\u043e\u0433\u043e \u043b\u0438\u0441\u0442\u043a\u0430, \u043e\u043f\u0435\u0440\u0430\u0442\u0438\u0432\u043d\u043e\u0435 \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043a\u0440\u0430\u0442\u043a\u043e\u0439 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438. \u0420\u0430\u0434\u0438\u043e\u0433\u0430\u0437\u0435\u0442\u0430 \u0432\u043e\u0438\u043d\u0441\u043a\u043e\u0439 \u0447\u0430\u0441\u0442\u0438 \u2014 \u043d\u0435 \u0440\u0435\u0436\u0435 1 \u0440\u0430\u0437\u0430 \u0432 \u043c\u0435\u0441\u044f\u0446. \u0420\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0435 \u043d\u0430 \u0432\u044b\u043f\u0443\u0441\u043a \u0434\u0430\u0451\u0442 \u0417\u041a\u0420 \u043f\u043e \u0412\u041f\u0420 (\u0441\u0442\u0435\u043d\u0433\u0430\u0437\u0435\u0442\u0430) \u0438 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440 \u0432\u0437\u0432\u043e\u0434\u0430 (\u0431\u043e\u0435\u0432\u043e\u0439 \u043b\u0438\u0441\u0442\u043e\u043a).\n\n\u0412.52-56 \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0418 \u041f\u041e \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u0415. \u041e\u0411\u041d\u0410\u0420\u0423\u0416\u0415\u041d\u0418\u0415 \u041f\u0420\u0410\u0412\u041e\u041d\u0410\u0420\u0423\u0428\u0415\u041d\u0418\u042f: 1)\u043f\u0440\u0435\u0441\u0435\u0447\u044c; 2)\u0434\u043e\u043b\u043e\u0436\u0438\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0443; 3)\u043f\u0440\u043e\u0432\u0435\u0441\u0442\u0438 \u0440\u0430\u0437\u0431\u0438\u0440\u0430\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e (\u0432\u044b\u044f\u0441\u043d\u0438\u0442\u044c: \u0441\u043e\u0431\u044b\u0442\u0438\u0435 \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u0430; \u0432\u0438\u043d\u0443, \u0444\u043e\u0440\u043c\u0443, \u043c\u043e\u0442\u0438\u0432\u044b; \u0434\u0430\u043d\u043d\u044b\u0435 \u043e \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u0438; \u0432\u0440\u0435\u0434\u043d\u044b\u0435 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f; \u0441\u043c\u044f\u0433\u0447\u0430\u044e\u0449\u0438\u0435/\u043e\u0442\u044f\u0433\u0447\u0430\u044e\u0449\u0438\u0435 \u043e\u0431\u0441\u0442\u043e\u044f\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0430; \u043f\u0440\u0438\u0447\u0438\u043d\u044b \u0438 \u0443\u0441\u043b\u043e\u0432\u0438\u044f). \u041f\u041e\u0414\u0412\u0415\u0414\u0415\u041d\u0418\u0415 \u0418\u0422\u041e\u0413\u041e\u0412 \u0412 \u0420\u041e\u0422\u0415: \u043f\u0435\u0440\u0435\u0434 \u043f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u043e\u0439 \u2014 \u0441\u0432\u0435\u0440\u043a\u0430 \u0441 \u0412\u041f(\u041f)\u0420 \u0447\u0430\u0441\u0442\u0438. \u0414\u043e\u043a\u043b\u0430\u0434 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442: \u043e\u0431\u0449\u0435\u0435 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u044b \u0441 \u043d\u0430\u0440\u0430\u0441\u0442\u0430\u044e\u0449\u0438\u043c \u0438\u0442\u043e\u0433\u043e\u043c; \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u044c \u0432\u043e\u0435\u043d\u043d\u043e\u0439 \u0441\u043b\u0443\u0436\u0431\u044b; \u0430\u0434\u043c\u0438\u043d\u0438\u0441\u0442\u0440\u0430\u0442\u0438\u0432\u043d\u0430\u044f \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c; \u0432\u0437\u0432\u043e\u0434\u044b \u0441 \u0443\u043b\u0443\u0447\u0448\u0435\u043d\u0438\u0435\u043c/\u0443\u0445\u0443\u0434\u0448\u0435\u043d\u0438\u0435\u043c; \u043f\u043e\u043e\u0449\u0440\u0435\u043d\u0438\u044f; \u0437\u0430\u0434\u0430\u0447\u0438 \u043d\u0430 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u043f\u0435\u0440\u0438\u043e\u0434. \u0420\u0410\u0417\u0411\u0418\u0420\u0410\u0422\u0415\u041b\u042c\u0421\u0422\u0412\u041e: \u043f\u0440\u043e\u0432\u043e\u0434\u0438\u0442 \u043d\u0435\u043f\u043e\u0441\u0440\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440 \u0438\u043b\u0438 \u043d\u0430\u0437\u043d\u0430\u0447\u0435\u043d\u043d\u043e\u0435 \u043b\u0438\u0446\u043e (\u2265 \u0432\u043e\u0438\u043d\u0441\u043a\u0438\u043c \u0437\u0432\u0430\u043d\u0438\u0435\u043c \u043d\u0430\u0440\u0443\u0448\u0438\u0442\u0435\u043b\u044f); \u0443\u0441\u0442\u0430\u043d\u0430\u0432\u043b\u0438\u0432\u0430\u0435\u0442\u0441\u044f: \u0441\u043e\u0431\u044b\u0442\u0438\u0435; \u043b\u0438\u0446\u043e; \u0432\u0438\u043d\u0430, \u0444\u043e\u0440\u043c\u0430, \u043c\u043e\u0442\u0438\u0432\u044b; \u0434\u0430\u043d\u043d\u044b\u0435 \u043e \u043b\u0438\u0447\u043d\u043e\u0441\u0442\u0438; \u0432\u0440\u0435\u0434\u043d\u044b\u0435 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f; \u0441\u043c\u044f\u0433\u0447\u0430\u044e\u0449\u0438\u0435/\u043e\u0442\u044f\u0433\u0447\u0430\u044e\u0449\u0438\u0435 \u043e\u0431\u0441\u0442\u043e\u044f\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u0430; \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440 \u0443\u0447\u0430\u0441\u0442\u0438\u044f (\u043f\u0440\u0438 \u0433\u0440\u0443\u043f\u043f\u043e\u0432\u043e\u043c \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u0435); \u043f\u0440\u0438\u0447\u0438\u043d\u044b \u0438 \u0443\u0441\u043b\u043e\u0432\u0438\u044f. \u041a\u043e\u043c\u0430\u043d\u0434\u0438\u0440 \u0432\u043f\u0440\u0430\u0432\u0435 \u043d\u0430\u043a\u0430\u0437\u0430\u0442\u044c \u0441\u0432\u043e\u0435\u0439 \u0432\u043b\u0430\u0441\u0442\u044c\u044e \u0418\u041b\u0418 \u0432 \u0442\u0435\u0447\u0435\u043d\u0438\u0435 10 \u0441\u0443\u0442\u043e\u043a \u043f\u0435\u0440\u0435\u0434\u0430\u0442\u044c \u0432\u044b\u0448\u0435\u0441\u0442\u043e\u044f\u0449\u0435\u043c\u0443. \u041c\u0430\u0442\u0435\u0440\u0438\u0430\u043b\u044b \u0433\u0440\u0443\u0431\u043e\u0433\u043e \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u0430 \u2014 \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0438\u0441\u044c\u043c\u0435\u043d\u043d\u043e. \u0417\u0410\u0421\u041b\u0423\u0428\u0418\u0412\u0410\u041d\u0418\u0415 \u041d\u0410 \u0421\u041e\u0411\u0420\u0410\u041d\u0418\u0418: \u0441\u043e\u043b\u0434\u0430\u0442\u044b \u2014 \u043d\u0430 \u043e\u0431\u0449\u0438\u0445 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f\u0445; \u0441\u0435\u0440\u0436\u0430\u043d\u0442\u044b \u2014 \u043d\u0430 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f\u0445 \u0441\u0435\u0440\u0436\u0430\u043d\u0442\u043e\u0432; \u043f\u0440\u0430\u043f\u043e\u0440\u0449\u0438\u043a\u0438 \u2014 \u043d\u0430 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f\u0445 \u043f\u0440\u0430\u043f\u043e\u0440\u0449\u0438\u043a\u043e\u0432; \u043e\u0444\u0438\u0446\u0435\u0440\u044b \u2014 \u043d\u0430 \u043e\u0444\u0438\u0446\u0435\u0440\u0441\u043a\u0438\u0445 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f\u0445. \u041c\u0435\u0440\u044b: \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0435 \u043f\u043e\u0440\u0438\u0446\u0430\u043d\u0438\u0435; \u0443\u043a\u0430\u0437\u0430\u043d\u0438\u0435 \u043a\u043e\u043b\u043b\u0435\u043a\u0442\u0438\u0432\u0430 \u043d\u0430 \u043d\u0435\u0434\u043e\u043f\u0443\u0441\u0442\u0438\u043c\u043e\u0441\u0442\u044c \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u0432\u044b\u0433\u043e\u0432\u043e\u0440; \u0445\u043e\u0434\u0430\u0442\u0430\u0439\u0441\u0442\u0432\u043e \u043e \u0441\u0442\u0440\u043e\u0433\u043e\u0439 \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u0438. \u041e\u0426\u0415\u041d\u041a\u0410 \u0414\u0418\u0421\u0426\u0418\u041f\u041b\u0418\u041d\u042b: \u0418\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f: \u00ab\u041e\u0442\u043b.\u00bb \u2014 \u043d\u0435\u0442 \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u043e\u0432, \u043d\u0435\u0442 \u0432\u0437\u044b\u0441\u043a\u0430\u043d\u0438\u0439; \u00ab\u0425\u043e\u0440.\u00bb \u2014 1 \u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430\u0440\u043d\u043e\u0435 \u0432\u0437\u044b\u0441\u043a\u0430\u043d\u0438\u0435; \u00ab\u0423\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043d\u0435 \u0431\u043e\u043b\u0435\u0435 2 \u0432\u0437\u044b\u0441\u043a\u0430\u043d\u0438\u0439; \u00ab\u041d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0435/\u0433\u0440\u0443\u0431\u044b\u0439 \u0434\u0438\u0441\u0446.\u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043e\u043a/\u043f\u0440\u043e\u0438\u0441\u0448\u0435\u0441\u0442\u0432\u0438\u0435. \u041f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0435 (\u043e\u0442\u0434\u0435\u043b\u0435\u043d\u0438\u0435): \u00ab\u041e\u0442\u043b.\u00bb \u2014 >50% \u00ab\u043e\u0442\u043b.\u00bb, \u043e\u0441\u0442\u0430\u043b\u044c\u043d\u044b\u0435 \u043d\u0435 \u043d\u0438\u0436\u0435 \u00ab\u0443\u0434\u043e\u0432\u043b.\u00bb, \u043d\u0435\u0442 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0439 \u0438 \u0433\u0440\u0443\u0431\u044b\u0445 \u043f\u0440\u043e\u0441\u0442\u0443\u043f\u043a\u043e\u0432; \u00ab\u0425\u043e\u0440.\u00bb \u2014 \u226430% \u00ab\u0443\u0434\u043e\u0432\u043b.\u00bb, \u043d\u0435\u0442 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0439 \u0438 \u043f\u0440\u043e\u0438\u0441\u0448\u0435\u0441\u0442\u0432\u0438\u0439; \u00ab\u0423\u0434\u043e\u0432\u043b.\u00bb \u2014 \u226430% \u00ab\u043d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb; \u00ab\u041d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043d\u0435 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u044b \u0443\u0441\u043b\u043e\u0432\u0438\u044f. \u0420\u043e\u0442\u0430/\u0432\u0437\u0432\u043e\u0434: \u00ab\u041e\u0442\u043b.\u00bb \u2014 >50% \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0439 \u00ab\u043e\u0442\u043b.\u00bb; \u00ab\u0425\u043e\u0440.\u00bb \u2014 \u226430% \u00ab\u0443\u0434\u043e\u0432\u043b.\u00bb; \u00ab\u0423\u0434\u043e\u0432\u043b.\u00bb \u2014 \u226430% \u00ab\u043d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb, \u22641 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u044f, \u043d\u0435\u0442 \u0433\u0438\u0431\u0435\u043b\u0438; \u00ab\u041d\u0435\u0443\u0434\u043e\u0432\u043b.\u00bb \u2014 \u043d\u0435 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u044b \u0443\u0441\u043b\u043e\u0432\u0438\u044f \u0438\u043b\u0438 \u0441\u043e\u043a\u0440\u044b\u0442\u0438\u0435 \u043f\u0440\u0435\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u044f.\n\n\u0412.57-70 \u0421\u041f\u0415\u0426\u0418\u0410\u041b\u042c\u041d\u042b\u0415 \u041c\u0415\u0422\u041e\u0414\u0418\u041a\u0418. \u0412.57 \u041d\u0415\u0423\u0421\u0422\u0410\u0412\u041d\u042b\u0415 \u0412\u0417\u0410\u0418\u041c\u041e\u041e\u0422\u041d\u041e\u0428\u0415\u041d\u0418\u042f. \u0424\u043e\u0440\u043c\u044b \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0438: \u0418\u0412\u0420; \u043e\u0431\u0449\u0438\u0435 \u0441\u043e\u0431\u0440\u0430\u043d\u0438\u044f; \u043d\u0430\u0441\u0442\u0430\u0432\u043d\u0438\u0447\u0435\u0441\u0442\u0432\u043e; \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043f\u0440\u0438\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0432\u043e\u0435\u043d\u043d\u044b\u0445 \u0441\u0443\u0434\u043e\u0432; \u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0441\u0435\u0440\u0436\u0430\u043d\u0442\u0430\u043c\u0438; \u0440\u0430\u0431\u043e\u0442\u0430 \u0441 \u0440\u043e\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u0438\u043a\u0430\u043c\u0438; \u0421\u041c\u0418 \u0438 \u0441\u0442\u0435\u043d\u043d\u0430\u044f \u043f\u0435\u0447\u0430\u0442\u044c; \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u0430\u043b\u044c\u043d\u044b\u0435 \u0444\u0438\u043b\u044c\u043c\u044b; \u043f\u0440\u0430\u0432\u043e\u0432\u044b\u0435 \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438; \u043c\u0435\u0434\u0438\u0446\u0438\u043d\u0441\u043a\u0438\u0435 \u043e\u0441\u043c\u043e\u0442\u0440\u044b; \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u043e\u0431\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u044f. \u0412.58 \u0414\u0422\u041f. \u0424\u043e\u0440\u043c\u044b \u043f\u0440\u043e\u0444\u0438\u043b\u0430\u043a\u0442\u0438\u043a\u0438: \u0438\u043d\u0434\u0438\u0432\u0438\u0434\u0443\u0430\u043b\u044c\u043d\u0430\u044f \u0431\u0435\u0441\u0435\u0434\u0430; \u0433\u0440\u0443\u043f\u043f\u043e\u0432\u0430\u044f \u0431\u0435\u0441\u0435\u0434\u0430; \u0438\u043d\u0444\u043e\u0440\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043e \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f\u0445 \u0414\u0422\u041f; \u0441\u043c\u043e\u0442\u0440 \u043b\u0438\u0447\u043d\u043e\u0433\u043e \u0430\u0432\u0442\u043e\u0442\u0440\u0430\u043d\u0441\u043f\u043e\u0440\u0442\u0430; \u0440\u0430\u0441\u0441\u043c\u043e\u0442\u0440\u0435\u043d\u0438\u0435 \u043d\u0430 \u0430\u0442\u0442\u0435\u0441\u0442\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0439 \u043a\u043e\u043c\u0438\u0441\u0441\u0438\u0438 (\u043f\u0440\u0438 \u22653 \u0430\u0434\u043c\u0438\u043d\u0438\u0441\u0442\u0440\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u044f\u0445); \u0434\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u0435 \u043e\u0431\u0437\u043e\u0440\u043e\u0432 \u043e\u0431 \u043e\u0441\u0443\u0436\u0434\u0435\u043d\u0438\u0438. \u0412.59 \u042d\u041a\u0421\u0422\u0420\u0415\u041c\u0418\u0417\u041c. \u0422\u0440\u0438 \u044d\u0442\u0430\u043f\u0430: \u043f\u0440\u0438 \u043f\u043e\u0441\u0442\u0443\u043f\u043b\u0435\u043d\u0438\u0438 \u043d\u0430 \u0441\u043b\u0443\u0436\u0431\u0443; \u0432 \u043f\u0435\u0440\u0438\u043e\u0434 \u0432\u0432\u043e\u0434\u0430 \u0432 \u0441\u0442\u0440\u043e\u0439 (\u0438\u0441\u043f\u044b\u0442\u0430\u0442\u0435\u043b\u044c\u043d\u043e\u0433\u043e \u0441\u0440\u043e\u043a\u0430); \u0432 \u043f\u0435\u0440\u0438\u043e\u0434 \u043f\u0440\u043e\u0445\u043e\u0436\u0434\u0435\u043d\u0438\u044f \u0441\u043b\u0443\u0436\u0431\u044b. \u041e\u0441\u043d\u043e\u0432\u043d\u044b\u0435 \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f: \u043f\u0430\u0442\u0440\u0438\u043e\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435; \u043f\u0435\u0440\u0435\u043a\u0440\u044b\u0442\u0438\u0435 \u043a\u0430\u043d\u0430\u043b\u043e\u0432 \u043f\u0440\u043e\u043d\u0438\u043a\u043d\u043e\u0432\u0435\u043d\u0438\u044f \u0438\u0434\u0435\u0439 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0438\u0437\u043c\u0430; \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u043d\u043e\u0441\u0438\u0442\u0435\u043b\u0435\u0439 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0432\u0437\u0433\u043b\u044f\u0434\u043e\u0432; \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u043e\u043d\u043d\u043e\u0435 \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u043f\u0440\u043e\u043f\u0430\u0433\u0430\u043d\u0434\u0435; \u043f\u0440\u0430\u0432\u043e\u0432\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435. \u0412.60 \u041d\u0410\u0420\u041a\u041e\u041c\u0410\u041d\u0418\u042f \u0418 \u0410\u041b\u041a\u041e\u0413\u041e\u041b\u0418\u0417\u041c. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438: \u0440\u0435\u0437\u043a\u0438\u0435 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u0437\u0430\u0442\u043e\u0440\u043c\u043e\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0438\u043b\u0438 \u0447\u0440\u0435\u0437\u043c\u0435\u0440\u043d\u043e\u0435 \u0432\u043e\u0437\u0431\u0443\u0436\u0434\u0435\u043d\u0438\u0435; \u043d\u0430\u0440\u0443\u0448\u0435\u043d\u0438\u0435 \u043a\u043e\u043e\u0440\u0434\u0438\u043d\u0430\u0446\u0438\u0438; \u0431\u0435\u0441\u0441\u043e\u043d\u043d\u0438\u0446\u0430 \u0438\u043b\u0438 \u0441\u043e\u043d\u043b\u0438\u0432\u043e\u0441\u0442\u044c; \u0443\u0445\u0443\u0434\u0448\u0435\u043d\u0438\u0435 \u0432\u043d\u0435\u0448\u043d\u0435\u0433\u043e \u0432\u0438\u0434\u0430; \u0441\u043b\u0435\u0434\u044b \u0438\u043d\u044a\u0435\u043a\u0446\u0438\u0439; \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u0437\u0440\u0430\u0447\u043a\u043e\u0432; \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0435 \u0437\u0430\u043f\u0430\u0445\u0430 \u0430\u043b\u043a\u043e\u0433\u043e\u043b\u044f \u043f\u0440\u0438 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0430\u0445 \u043e\u043f\u044c\u044f\u043d\u0435\u043d\u0438\u044f; \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u0430\u0431\u0441\u0442\u0438\u043d\u0435\u043d\u0442\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u044f. \u041a\u043e\u0441\u0432\u0435\u043d\u043d\u044b\u0435: \u0448\u043f\u0440\u0438\u0446\u044b, \u0436\u0433\u0443\u0442\u044b, \u0430\u043c\u043f\u0443\u043b\u044b, \u0437\u0430\u043a\u043e\u043f\u0447\u0435\u043d\u043d\u0430\u044f \u043f\u043e\u0441\u0443\u0434\u0430, \u043f\u0440\u043e\u043f\u0430\u0436\u0430 \u043c\u0435\u0434\u043f\u0440\u0435\u043f\u0430\u0440\u0430\u0442\u043e\u0432. \u0412.61 \u041a\u041e\u0420\u0420\u0423\u041f\u0426\u0418\u042f. \u0410\u043b\u0433\u043e\u0440\u0438\u0442\u043c: \u043f\u0440\u0438\u043d\u0438\u043c\u0430\u0442\u044c \u043f\u043e\u0441\u0435\u0442\u0438\u0442\u0435\u043b\u0435\u0439 \u043f\u0440\u0438 \u0434\u0440\u0443\u0433\u0438\u0445 \u043b\u0438\u0446\u0430\u0445; \u043d\u0435 \u0434\u043e\u043f\u0443\u0441\u043a\u0430\u0442\u044c \u043e\u043f\u0440\u043e\u043c\u0435\u0442\u0447\u0438\u0432\u044b\u0445 \u0432\u044b\u0441\u043a\u0430\u0437\u044b\u0432\u0430\u043d\u0438\u0439; \u0443\u0431\u0440\u0430\u0442\u044c \u0441 \u0440\u0430\u0431\u043e\u0447\u0435\u0433\u043e \u0441\u0442\u043e\u043b\u0430 \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u044b \u043f\u043e\u0434 \u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u043c\u043e\u0436\u043d\u043e \u043d\u0435\u0437\u0430\u043c\u0435\u0442\u043d\u043e \u043f\u043e\u043b\u043e\u0436\u0438\u0442\u044c \u0434\u0435\u043d\u044c\u0433\u0438; \u043f\u0440\u0438 \u043f\u043e\u043f\u044b\u0442\u043a\u0435 \u043f\u0435\u0440\u0435\u0434\u0430\u0442\u044c \u0434\u0435\u043d\u044c\u0433\u0438 \u2014 \u0433\u0440\u043e\u043c\u043a\u043e \u0438 \u043d\u0435\u0434\u0432\u0443\u0441\u043c\u044b\u0441\u043b\u0435\u043d\u043d\u043e \u043e\u0442\u043a\u0430\u0437\u0430\u0442\u044c; \u0432\u043d\u0438\u043c\u0430\u0442\u0435\u043b\u044c\u043d\u043e \u0432\u044b\u0441\u043b\u0443\u0448\u0430\u0442\u044c \u0438 \u0437\u0430\u043f\u043e\u043c\u043d\u0438\u0442\u044c \u0443\u0441\u043b\u043e\u0432\u0438\u044f; \u0431\u043e\u043b\u044c\u0448\u0435 \u00ab\u0440\u0430\u0431\u043e\u0442\u0430\u0442\u044c \u043d\u0430 \u043f\u0440\u0438\u0451\u043c\u00bb; \u043f\u0440\u0438 \u043e\u0431\u043d\u0430\u0440\u0443\u0436\u0435\u043d\u0438\u0438 \u043d\u0435\u0437\u043d\u0430\u043a\u043e\u043c\u043e\u0433\u043e \u043f\u0440\u0435\u0434\u043c\u0435\u0442\u0430 \u2014 \u043d\u0435 \u0442\u0440\u043e\u0433\u0430\u0442\u044c, \u043e\u0433\u0440\u0430\u043d\u0438\u0447\u0438\u0442\u044c \u0434\u043e\u0441\u0442\u0443\u043f, \u0441\u043e\u043e\u0431\u0449\u0438\u0442\u044c \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0443; \u0432\u0441\u0435 \u043f\u0440\u0435\u0434\u043b\u043e\u0436\u0435\u043d\u0438\u044f \u0432\u0437\u044f\u0442\u043a\u0438 \u2014 \u0432 \u043f\u0438\u0441\u044c\u043c\u0435\u043d\u043d\u043e\u043c \u0432\u0438\u0434\u0435 \u043d\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0443; \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u0447\u0435\u0441\u043a\u0438 \u043d\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0430\u0442\u044c\u0441\u044f \u0432\u043d\u0435 \u043e\u0444\u0438\u0441\u0430; \u0437\u0430\u043f\u0440\u0435\u0442\u0438\u0442\u044c \u0440\u043e\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u0438\u043a\u0430\u043c \u043f\u0440\u0438\u043d\u0438\u043c\u0430\u0442\u044c \u0446\u0435\u043d\u043d\u043e\u0441\u0442\u0438. \u0412.62 \u0421\u041e\u0426\u0418\u0410\u041b\u042c\u041d\u041e-\u041f\u0421\u0418\u0425\u041e\u041b\u041e\u0413\u0418\u0427\u0415\u0421\u041a\u0418\u0419 \u041f\u041e\u0420\u0422\u0420\u0415\u0422. \u0426\u0435\u043b\u044c \u2014 \u0446\u0435\u043b\u043e\u0441\u0442\u043d\u043e\u0435 \u043f\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043e \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u0438, \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0435 \u0441\u0438\u043b\u044c\u043d\u044b\u0445 \u0438 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0445 \u0441\u0442\u043e\u0440\u043e\u043d, \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u0433\u0440\u0443\u043f\u043f \u0440\u0438\u0441\u043a\u0430, \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0430\u0446\u0438\u0438. \u0421\u043e\u0434\u0435\u0440\u0436\u0438\u0442: \u0441\u043e\u0446\u0438\u0430\u043b\u044c\u043d\u043e-\u0434\u0435\u043c\u043e\u0433\u0440\u0430\u0444\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043a\u0438; \u0441\u043b\u0443\u0436\u0435\u0431\u043d\u043e-\u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u0430\u044f \u0445\u0430\u0440\u0430\u043a\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043a\u0430; \u043c\u0435\u0436\u043b\u0438\u0447\u043d\u043e\u0441\u0442\u043d\u044b\u0435 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f; \u041c\u041f\u041f\u0421; \u0433\u0440\u0443\u043f\u043f\u044b \u043f\u043e\u0432\u044b\u0448\u0435\u043d\u043d\u043e\u0433\u043e \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u044f; \u0432\u043d\u0435\u0448\u043d\u0438\u0435 \u0444\u0430\u043a\u0442\u043e\u0440\u044b; \u0432\u044b\u0432\u043e\u0434\u044b \u0438 \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0430\u0446\u0438\u0438. \u0414\u0438\u043d\u0430\u043c\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u2014 \u043f\u0435\u0440\u0438\u043e\u0434\u0438\u0447\u0435\u0441\u043a\u0438 \u0443\u0442\u043e\u0447\u043d\u044f\u0435\u0442\u0441\u044f. \u0412.63 \u041e\u0426\u0415\u041d\u041a\u0410 \u041c\u041f\u041f\u0421. \u0410\u043d\u043a\u0435\u0442\u0430 \u21161: 5 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432 \u00d7 5 \u0432\u0430\u0440\u0438\u0430\u043d\u0442\u043e\u0432 (1\u20135 \u0431\u0430\u043b\u043b\u043e\u0432), \u0441\u0443\u043c\u043c\u0430 \u00f7 5 = \u043e\u0446\u0435\u043d\u043a\u0430. \u0423\u0440\u043e\u0432\u043d\u0438: 4\u20135 = \u0432\u044b\u0441\u043e\u043a\u0438\u0439; 3\u20134 = \u0443\u0434\u043e\u0432\u043b.; 2,5\u20133 = \u043d\u0438\u0437\u043a\u0438\u0439; 1\u20132,5 = \u043d\u0435\u0443\u0434\u043e\u0432\u043b. \u0410\u043d\u043a\u0435\u0442\u0430 \u21162: 10 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u0432, 10-\u0431\u0430\u043b\u043b\u044c\u043d\u0430\u044f \u0448\u043a\u0430\u043b\u0430. \u0412 %: 70\u2013100 = \u0432\u044b\u0441\u043e\u043a\u0438\u0439; 50\u201370 = \u0443\u0434\u043e\u0432\u043b.; 30\u201350 = \u043d\u0438\u0437\u043a\u0438\u0439; 10\u201330 = \u043d\u0435\u0443\u0434\u043e\u0432\u043b. \u0422\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0435: \u043e\u043f\u0440\u043e\u0441\u0438\u0442\u044c \u226530% \u043b/\u0441, \u0440\u0430\u0432\u043d\u043e\u043c\u0435\u0440\u043d\u043e \u043f\u043e \u0432\u0441\u0435\u043c \u043f\u043e\u0434\u0440\u0430\u0437\u0434\u0435\u043b\u0435\u043d\u0438\u044f\u043c \u0438 \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f\u043c. 3 \u043c\u0435\u0442\u043e\u0434\u0430 \u043e\u0446\u0435\u043d\u043a\u0438 \u041c\u041f\u041f\u0421: \u0430\u043d\u043a\u0435\u0442\u043d\u044b\u0439 \u043e\u043f\u0440\u043e\u0441 (\u043d\u0430\u0438\u0431\u043e\u043b\u0435\u0435 \u043d\u0430\u0434\u0451\u0436\u043d\u044b\u0439); \u044d\u043a\u0441\u043f\u0435\u0440\u0442\u043d\u0430\u044f \u043e\u0446\u0435\u043d\u043a\u0430; \u044d\u043c\u043f\u0438\u0440\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u043c\u0435\u0442\u043e\u0434 (\u043f\u043e \u043f\u0440\u043e\u044f\u0432\u043b\u0435\u043d\u0438\u044f\u043c \u0432 \u0434\u0435\u044f\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442: \u00ab\u043f\u043e\u0437\u0432\u043e\u043b\u044f\u0435\u0442 \u0432\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u044c\u00bb / \u00ab\u043d\u0435 \u043f\u043e\u0437\u0432\u043e\u043b\u044f\u0435\u0442 \u0432\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u044c\u00bb). \u0412.64 \u041f\u0421\u0418\u0425\u041e\u0413\u0415\u041d\u041d\u042b\u0415 \u041f\u041e\u0422\u0415\u0420\u0418. \u0412\u044b\u0441\u043e\u043a\u0430\u044f \u0438\u043d\u0442\u0435\u043d\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c: 6% \u043e\u0442 \u0447\u0438\u0441\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u0438; \u0421\u0440\u0435\u0434\u043d\u044f\u044f: 5%; \u041d\u0438\u0437\u043a\u0430\u044f: 4%. 80% \u2014 \u043a\u0440\u0430\u0442\u043a\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e \u0432\u044b\u0431\u044b\u0432\u0448\u0438\u0435 (\u043c\u0438\u043d\u0443\u0442\u044b) \u2014 \u0412 \u0421\u0427\u0401\u0422 \u041f\u041e\u0422\u0415\u0420\u042c \u041d\u0415 \u0412\u041a\u041b\u042e\u0427\u0410\u042e\u0422\u0421\u042f. 20% \u2014 \u0441\u043e\u0431\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u043f\u043e\u0442\u0435\u0440\u0438 (>1\u20132 \u0447\u0430\u0441\u0430): 65% \u0432\u0435\u0440\u043d\u0443\u0442\u0441\u044f \u0437\u0430 \u0441\u0443\u0442\u043a\u0438; 10% \u2014 \u0434\u043e 2 \u0441\u0443\u0442\u043e\u043a; 25% \u2014 \u044d\u0432\u0430\u043a\u0443\u0430\u0446\u0438\u044f \u043d\u0430 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u044d\u0442\u0430\u043f \u0440\u0435\u0430\u0431\u0438\u043b\u0438\u0442\u0430\u0446\u0438\u0438. \u041f\u0440\u0438\u043c\u0435\u0440 \u0440\u0430\u0441\u0447\u0451\u0442\u0430: 600 \u0447\u0435\u043b., \u0432\u044b\u0441\u043e\u043a\u0430\u044f \u2192 36 \u0447\u0435\u043b. \u043f\u0441\u0438\u0445\u043e\u0433\u0435\u043d\u043d\u044b\u0445 \u2192 29 \u043a\u0440\u0430\u0442\u043a\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u044b\u0445 (\u043d\u0435 \u0441\u0447\u0438\u0442\u0430\u0442\u044c) \u2192 7 \u0441\u043e\u0431\u0441\u0442\u0432\u0435\u043d\u043d\u043e \u043f\u043e\u0442\u0435\u0440\u0438 \u2192 \u0438\u0437 7: ~5 \u0432\u0435\u0440\u043d\u0443\u0442\u0441\u044f \u0437\u0430 \u0441\u0443\u0442\u043a\u0438, ~1 \u0434\u043e 2 \u0441\u0443\u0442\u043e\u043a, ~2 \u044d\u0432\u0430\u043a\u0443\u0438\u0440\u0443\u044e\u0442\u0441\u044f. \u0412.65 \u0414\u041e\u041f\u0423\u0421\u041a \u0412 \u041a\u0410\u0420\u0410\u0423\u041b\u0415. \u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u043d\u0435\u0431\u043b\u0430\u0433\u043e\u043f\u0440\u0438\u044f\u0442\u043d\u043e\u0433\u043e \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u044f: \u0440\u0435\u0437\u043a\u043e\u0435 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0435 \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f; \u0437\u0430\u0442\u043e\u0440\u043c\u043e\u0436\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0438\u043b\u0438 \u0432\u043e\u0437\u0431\u0443\u0436\u0434\u0435\u043d\u0438\u0435; \u0442\u0440\u0435\u0432\u043e\u0433\u0430, \u0441\u0442\u0440\u0430\u0445, \u043f\u043e\u0434\u0430\u0432\u043b\u0435\u043d\u043d\u043e\u0441\u0442\u044c; \u0430\u0433\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u043e\u0441\u0442\u044c; \u0440\u0430\u0441\u0441\u0435\u044f\u043d\u043d\u043e\u0441\u0442\u044c; \u043d\u0435\u0430\u0434\u0435\u043a\u0432\u0430\u0442\u043d\u044b\u0435 \u0432\u044b\u0441\u043a\u0430\u0437\u044b\u0432\u0430\u043d\u0438\u044f; \u0431\u0435\u0441\u0441\u043e\u043d\u043d\u0438\u0446\u0430, \u0438\u0441\u0442\u043e\u0449\u0435\u043d\u0438\u0435; \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u043e\u043f\u044c\u044f\u043d\u0435\u043d\u0438\u044f; \u0441\u0443\u0438\u0446\u0438\u0434\u0430\u043b\u044c\u043d\u044b\u0435 \u043c\u044b\u0441\u043b\u0438 \u0438 \u0432\u044b\u0441\u043a\u0430\u0437\u044b\u0432\u0430\u043d\u0438\u044f; \u0442\u044f\u0436\u0451\u043b\u044b\u0435 \u043f\u0435\u0440\u0435\u0436\u0438\u0432\u0430\u043d\u0438\u044f \u0438\u0437-\u0437\u0430 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432. \u041f\u0440\u0438 \u0432\u044b\u044f\u0432\u043b\u0435\u043d\u0438\u0438: \u043d\u0435\u043c\u0435\u0434\u043b\u0435\u043d\u043d\u043e \u0434\u043e\u043b\u043e\u0436\u0438\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u0438\u0440\u0443; \u043e\u0442\u044
